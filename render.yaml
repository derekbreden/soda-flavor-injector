databases:
  - name: homesodamachine-db
    plan: basic-256mb
    postgresMajorVersion: "16"

services:
  - type: web
    name: homesodamachine
    runtime: node
    plan: starter
    region: oregon
    branch: main
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: homesodamachine-db
          property: connectionString
      - key: NODE_ENV
        value: production
