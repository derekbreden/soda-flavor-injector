databases:
  - name: homesodamachine-db
    plan: basic-256mb
    postgresMajorVersion: "16"

services:
  - type: web
    name: homesodamachine
    runtime: node
    plan: starter
    region: oregon
    branch: main
    buildCommand: npm install --omit=dev
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: homesodamachine-db
          property: connectionString
      - key: NODE_ENV
        value: production
      # Firebase Cloud Messaging — set values in the Render dashboard.
      # Web config (public — embedded in client bundle):
      - key: FIREBASE_API_KEY
        sync: false
      - key: FIREBASE_AUTH_DOMAIN
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_STORAGE_BUCKET
        sync: false
      - key: FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: FIREBASE_APP_ID
        sync: false
      - key: FIREBASE_VAPID_KEY
        sync: false
      # Server-side credential — full service-account.json as a string:
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
