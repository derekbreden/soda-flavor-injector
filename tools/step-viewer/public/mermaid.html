<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="/dev/manifest.webmanifest">
<link rel="icon" type="image/png" sizes="32x32" href="/dev/pwa-icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="64x64" href="/dev/pwa-icons/favicon-64.png">
<link rel="apple-touch-icon" sizes="152x152" href="/dev/pwa-icons/apple-touch-icon-152.png">
<link rel="apple-touch-icon" sizes="167x167" href="/dev/pwa-icons/apple-touch-icon-167.png">
<link rel="apple-touch-icon" sizes="180x180" href="/dev/pwa-icons/apple-touch-icon-180.png">
<link rel="apple-touch-icon" href="/dev/pwa-icons/apple-touch-icon-180.png">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Home Soda Machine">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Home Soda Machine</title>
<style>
:root {
  --bg: #1a1a2e;
  --surface: #232342;
  --surface-2: #2a2a4a;
  --border: #3a3a5a;
  --text: #ffffff;
  --text-2: #999999;
  --text-3: #595959;
  --accent: #4488ff;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

/* Site nav (shared with home / blog / dev viewer) */
.site-nav {
  display: flex;
  gap: 24px;
  padding: calc(env(safe-area-inset-top, 0px) + 10px) 20px 10px;
  font-size: 14px;
  line-height: 1.5;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  flex-shrink: 0;
}
.site-nav a {
  color: var(--text-2);
  text-decoration: none;
  letter-spacing: 0.01em;
}
.site-nav a:hover { color: var(--text); }
.site-nav a.active { color: var(--text); font-weight: 600; }

#layout {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* Sidebar */
#sidebar {
  width: 240px;
  min-width: 240px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  padding-bottom: env(safe-area-inset-bottom, 0px);
  padding-left: env(safe-area-inset-left, 0px);
}
#sidebar h2 {
  padding: 16px;
  font-size: 14px;
  font-weight: 600;
  color: var(--text-2);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border-bottom: 1px solid var(--border);
}
.file-item {
  padding: 10px 16px;
  font-size: 13px;
  cursor: pointer;
  border-bottom: 1px solid var(--surface-2);
  transition: background 0.1s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--text);
}
.file-item:hover { background: var(--surface-2); }
.file-item.active { background: var(--surface-2); color: var(--text); }
.file-item .dir {
  color: var(--text-2);
  font-size: 11px;
  display: block;
  margin-bottom: 2px;
}

/* Main area */
#main {
  flex: 1;
  position: relative;
  overflow: hidden;
  cursor: grab;
  touch-action: none;
}
#main.dragging { cursor: grabbing; }

#diagram-container {
  position: absolute;
  transform-origin: 0 0;
}

/* Mermaid theme overrides */
#diagram-container svg {
  display: block;
}

#status {
  position: fixed;
  bottom: calc(env(safe-area-inset-bottom, 0px) + 16px);
  right: calc(env(safe-area-inset-right, 0px) + 16px);
  background: rgba(35,35,66,0.85);
  border: 1px solid var(--border);
  color: var(--text-2);
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 12px;
  backdrop-filter: blur(4px);
  z-index: 10;
}

#zoom-display {
  position: fixed;
  top: calc(env(safe-area-inset-top, 0px) + 16px);
  right: calc(env(safe-area-inset-right, 0px) + 16px);
  background: rgba(35,35,66,0.85);
  border: 1px solid var(--border);
  color: var(--text-2);
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 13px;
  backdrop-filter: blur(4px);
  z-index: 10;
}

#empty-state {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: var(--text-3);
  font-size: 15px;
}
</style>
</head>
<body>

<nav class="site-nav" id="site-nav" aria-label="Primary">
  <a href="/" data-nav="home">Home</a>
  <a href="/blog" data-nav="updates">Updates</a>
  <a href="/dev" data-nav="prints">Prints</a>
  <a href="/dev/diagrams" data-nav="diagrams" class="active">Diagrams</a>
</nav>

<div id="layout">
  <div id="sidebar">
    <h2>Diagrams</h2>
    <div id="file-list"></div>
  </div>

  <div id="main">
    <div id="diagram-container"></div>
    <div id="empty-state">Select a diagram</div>
    <div id="zoom-display" style="display:none">100%</div>
    <div id="status">connecting...</div>
  </div>
</div>

<script type="module">
import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";

mermaid.initialize({
  startOnLoad: false,
  theme: "dark",
  themeVariables: {
    darkMode: true,
    background: "#1a1a2e",
    primaryColor: "#2a2a4a",
    primaryTextColor: "#ffffff",
    primaryBorderColor: "#3a3a5a",
    lineColor: "#999999",
    secondaryColor: "#232342",
    tertiaryColor: "#1a1a2e",
    fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif",
    fontSize: "14px",
  },
  flowchart: {
    htmlLabels: true,
    curve: "basis",
    padding: 12,
  },
});

// --- Site nav ---
// Same prefix-detection as the main viewer so Prints / Diagrams hrefs
// work in both production (/dev/...) and dev (/...).
(() => {
  const NAV_PREFIX = location.pathname.startsWith("/dev") ? "/dev" : "";
  for (const a of document.querySelectorAll("#site-nav a[data-nav]")) {
    const which = a.dataset.nav;
    if (which === "prints") a.href = NAV_PREFIX || "/";
    if (which === "diagrams") a.href = `${NAV_PREFIX}/diagrams`;
  }
})();

// --- State ---
let allFiles = [];
let currentFile = null;
let currentContent = null;

// Pan/zoom state
let scale = 1;
let panX = 0;
let panY = 0;
const activePointers = new Map();          // pointerId -> {x, y}
let dragStart = null;                       // { startX, startY, panX, panY } when single-finger
let pinchStart = null;                      // { dist, midX, midY, panX, panY, scale }
const MIN_SCALE = 0.1;
const MAX_SCALE = 10;

const mainEl = document.getElementById("main");
const containerEl = document.getElementById("diagram-container");
const emptyEl = document.getElementById("empty-state");
const zoomEl = document.getElementById("zoom-display");
const statusEl = document.getElementById("status");
const fileListEl = document.getElementById("file-list");

// --- Transform ---
let transformSaveTimer = null;
function applyTransform() {
  containerEl.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
  zoomEl.textContent = `${Math.round(scale * 100)}%`;
  if (currentFile) {
    clearTimeout(transformSaveTimer);
    transformSaveTimer = setTimeout(() => saveTransform(currentFile), 250);
  }
}

function saveTransform(file) {
  try {
    localStorage.setItem(`mmd-transform:${file}`, JSON.stringify({ scale, panX, panY }));
  } catch {}
}

function loadTransform(file) {
  try {
    const raw = localStorage.getItem(`mmd-transform:${file}`);
    if (!raw) return false;
    const s = JSON.parse(raw);
    if (typeof s.scale !== "number" || typeof s.panX !== "number" || typeof s.panY !== "number") return false;
    scale = s.scale;
    panX = s.panX;
    panY = s.panY;
    return true;
  } catch {
    return false;
  }
}

// --- Pan + pinch zoom ---
function startDragFrom(p) {
  dragStart = { startX: p.x, startY: p.y, panX, panY };
  mainEl.classList.add("dragging");
}
function clearGestures() {
  dragStart = null;
  pinchStart = null;
  mainEl.classList.remove("dragging");
}

mainEl.addEventListener("pointerdown", (e) => {
  if (e.pointerType === "mouse" && e.button !== 0) return;
  mainEl.setPointerCapture(e.pointerId);
  activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (activePointers.size === 1) {
    startDragFrom(activePointers.get(e.pointerId));
  } else if (activePointers.size === 2) {
    const [p1, p2] = [...activePointers.values()];
    pinchStart = {
      dist: Math.hypot(p2.x - p1.x, p2.y - p1.y) || 1,
      midX: (p1.x + p2.x) / 2,
      midY: (p1.y + p2.y) / 2,
      panX, panY, scale,
    };
    dragStart = null;
  }
});

mainEl.addEventListener("pointermove", (e) => {
  if (!activePointers.has(e.pointerId)) return;
  activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

  if (activePointers.size === 2 && pinchStart) {
    const [p1, p2] = [...activePointers.values()];
    const dist = Math.hypot(p2.x - p1.x, p2.y - p1.y) || 1;
    const midX = (p1.x + p2.x) / 2;
    const midY = (p1.y + p2.y) / 2;
    const ns = Math.max(MIN_SCALE, Math.min(MAX_SCALE, pinchStart.scale * (dist / pinchStart.dist)));
    // Anchor: original midpoint stays under the (possibly translated) current midpoint.
    const dx = (pinchStart.midX - pinchStart.panX) / pinchStart.scale;
    const dy = (pinchStart.midY - pinchStart.panY) / pinchStart.scale;
    panX = midX - dx * ns;
    panY = midY - dy * ns;
    scale = ns;
    applyTransform();
  } else if (activePointers.size === 1 && dragStart) {
    panX = dragStart.panX + (e.clientX - dragStart.startX);
    panY = dragStart.panY + (e.clientY - dragStart.startY);
    applyTransform();
  }
});

function pointerEnd(e) {
  if (!activePointers.delete(e.pointerId)) return;
  if (activePointers.size === 0) {
    clearGestures();
  } else if (activePointers.size === 1) {
    // Lifted one finger of a pinch — rebase remaining finger as a fresh drag.
    pinchStart = null;
    const [p] = [...activePointers.values()];
    startDragFrom(p);
  }
}
mainEl.addEventListener("pointerup", pointerEnd);
mainEl.addEventListener("pointercancel", pointerEnd);

// --- Zoom (wheel) ---
mainEl.addEventListener("wheel", (e) => {
  e.preventDefault();

  // Mouse position relative to main
  const rect = mainEl.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  // Point in diagram space before zoom
  const dx = (mx - panX) / scale;
  const dy = (my - panY) / scale;

  // Apply zoom
  const factor = e.deltaY < 0 ? 1.1 : 1 / 1.1;
  const newScale = Math.max(0.1, Math.min(10, scale * factor));

  // Adjust pan so the point under the mouse stays put
  panX = mx - dx * newScale;
  panY = my - dy * newScale;
  scale = newScale;

  applyTransform();
}, { passive: false });

// --- Double-click to reset ---
mainEl.addEventListener("dblclick", () => {
  fitDiagram();
});

function fitDiagram() {
  const svg = containerEl.querySelector("svg");
  if (!svg) return;

  const rect = mainEl.getBoundingClientRect();
  const svgW = svg.viewBox?.baseVal?.width || svg.getBoundingClientRect().width;
  const svgH = svg.viewBox?.baseVal?.height || svg.getBoundingClientRect().height;

  if (!svgW || !svgH) return;

  const padding = 40;
  const scaleX = (rect.width - padding * 2) / svgW;
  const scaleY = (rect.height - padding * 2) / svgH;
  scale = Math.min(scaleX, scaleY, 2);

  panX = (rect.width - svgW * scale) / 2;
  panY = (rect.height - svgH * scale) / 2;

  applyTransform();
}

// --- Render diagram ---
let renderCounter = 0;

async function renderDiagram(content, preserveTransform = false) {
  const id = `mermaid-${++renderCounter}`;

  try {
    const { svg } = await mermaid.render(id, content);
    containerEl.innerHTML = svg;
    emptyEl.style.display = "none";
    zoomEl.style.display = "block";

    if (!preserveTransform) {
      // Wait a frame for SVG to be laid out
      requestAnimationFrame(() => fitDiagram());
    } else {
      applyTransform();
    }
  } catch (err) {
    containerEl.innerHTML = `<pre style="color:#c44;padding:20px;font-size:13px;">${err.message || err}</pre>`;
  }
}

// --- File loading ---
async function loadFile(file) {
  const resp = await fetch(`/api/mermaid-content/${file}`);
  if (!resp.ok) return;
  const content = await resp.text();
  currentContent = content;
  currentFile = file;
  location.hash = encodeURIComponent(file);

  // Update sidebar active state
  for (const el of fileListEl.querySelectorAll(".file-item")) {
    el.classList.toggle("active", el.dataset.file === file);
  }

  // Restore previously-saved pan/zoom for this file if present; otherwise
  // let renderDiagram run its initial fitDiagram.
  const restored = loadTransform(file);
  await renderDiagram(content, restored);
}

async function reloadCurrentFile() {
  if (!currentFile) return;
  const resp = await fetch(`/api/mermaid-content/${currentFile}`);
  if (!resp.ok) return;
  const content = await resp.text();
  if (content === currentContent) return; // No actual change
  currentContent = content;
  await renderDiagram(content, true); // Preserve pan/zoom
}

// --- Sidebar ---
function buildFileList() {
  fileListEl.innerHTML = "";
  for (const file of allFiles) {
    const parts = file.split("/");
    const name = parts.pop().replace(".mmd", "");
    const dir = parts.join("/");

    const el = document.createElement("div");
    el.className = "file-item" + (file === currentFile ? " active" : "");
    el.dataset.file = file;
    el.innerHTML = dir ? `<span class="dir">${dir}/</span>${name}` : name;
    el.addEventListener("click", () => loadFile(file));
    fileListEl.appendChild(el);
  }
}

async function fetchFiles() {
  const resp = await fetch("/api/mermaid");
  allFiles = (await resp.json()).sort();
  buildFileList();
}

// --- Server-Sent Events ---
// EventSource auto-reconnects with backoff. The first `hello` after a
// reconnect with a different commit means the server restarted with new
// code (a Render deploy in prod) — refetch the current mermaid with
// pan/zoom preserved. `mermaid-updated` only fires in dev (chokidar).
let firstSeenCommit = null;

function connectEvents() {
  const es = new EventSource("/api/events");
  es.onopen = () => { statusEl.textContent = "watching"; };
  es.onerror = () => { statusEl.textContent = "reconnecting..."; };
  es.onmessage = (e) => {
    const msg = JSON.parse(e.data);

    if (msg.type === "hello") {
      statusEl.textContent = "watching";
      if (firstSeenCommit === null) {
        firstSeenCommit = msg.commit;
      } else if (msg.commit !== firstSeenCommit) {
        firstSeenCommit = msg.commit;
        fetchFiles();
        if (currentFile) reloadCurrentFile();
      }
      return;
    }

    if (msg.type === "mermaid-updated") {
      statusEl.textContent = `updated: ${msg.file}`;
      fetchFiles();
      if (currentFile === msg.file) {
        reloadCurrentFile();
      }
    }
  };
}

// --- Init ---
await fetchFiles();
connectEvents();

// Restore from hash
if (location.hash) {
  const file = decodeURIComponent(location.hash.slice(1));
  if (file && allFiles.includes(file)) {
    loadFile(file);
  }
} else if (allFiles.length === 1) {
  // Auto-open if there's only one file
  loadFile(allFiles[0]);
}

// Browser/OS back button: sync the open file to the new hash so the URL bar
// is the source of truth for navigation.
window.addEventListener("popstate", () => {
  const file = location.hash ? decodeURIComponent(location.hash.slice(1)) : null;
  if (file && file !== currentFile && allFiles.includes(file)) {
    loadFile(file);
  }
});
</script>
</body>
</html>
