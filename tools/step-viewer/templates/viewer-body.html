<style>
/* Grid view */
#grid {
  padding: 24px
           calc(env(safe-area-inset-right, 0px) + 24px)
           calc(env(safe-area-inset-bottom, 0px) + 24px)
           calc(env(safe-area-inset-left, 0px) + 24px);
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 16px;
}

/* Empty-state messages for sections that have no content */
.empty-state {
  grid-column: 1 / -1;
  padding: 48px 16px;
  text-align: center;
  color: var(--text-3);
  font-size: 14px;
}
.card {
  background: var(--surface);
  border-radius: 8px;
  overflow: hidden;
  cursor: pointer;
  transition: outline 0.15s;
  outline: 2px solid transparent;
}
.card:hover { outline-color: var(--accent); }
.card img {
  width: 100%;
  aspect-ratio: 1;
  object-fit: contain;
  background: var(--bg);
  display: block;
}
.card .placeholder {
  width: 100%;
  aspect-ratio: 1;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-3);
  font-size: 13px;
}
.card .label {
  padding: 8px 10px;
  font-size: 13px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--text);
}
.card .label .dir {
  color: var(--text-2);
  font-size: 11px;
  display: block;
  margin-bottom: 2px;
}

/* STEP detail view (inside ContentViewer modal). The renderer canvas
   fills the wrapper; the gizmo overlays the top-right corner. The loading
   pill centers in the wrapper while occt-import-js parses the buffer. */
.step-wrapper {
  position: relative;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  touch-action: none;
}
.step-wrapper > canvas.step-viewport {
  display: block;
  width: 100%;
  height: 100%;
  touch-action: none;
}
.step-wrapper > canvas.step-gizmo {
  position: absolute;
  top: calc(env(safe-area-inset-top, 0px) + 16px);
  right: calc(env(safe-area-inset-right, 0px) + 16px);
  z-index: 10;
  pointer-events: none;
}
.step-wrapper > .step-loading {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: var(--text-2);
  font-size: 15px;
  z-index: 11;
  display: none;
}

/* Section headers in grid */
.section-header {
  grid-column: 1 / -1;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-2);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 16px 0 4px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 4px;
}
.section-header:first-child { padding-top: 0; }

/* Mermaid thumbnail in card */
.card .mmd-thumb {
  width: 100%;
  aspect-ratio: 1;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  padding: 8px;
}
.card .mmd-thumb svg {
  max-width: 100%;
  max-height: 100%;
}

</style>

<div id="grid"></div>

<!-- Hidden host for the Three.js renderer + gizmo canvases. They live here
     when no STEP is open and get moved into the modal wrapper on openDetail. -->
<div id="step-canvas-host" style="display: none;"></div>

<script src="/pan-zoom.js"></script>
<script src="/content-viewer.js"></script>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.min.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";

mermaid.initialize({
  startOnLoad: false,
  theme: "dark",
  themeVariables: {
    darkMode: true,
    background: "#1a1a2e",
    primaryColor: "#2a2a4a",
    primaryTextColor: "#ffffff",
    primaryBorderColor: "#3a3a5a",
    lineColor: "#999999",
    secondaryColor: "#232342",
    tertiaryColor: "#1a1a2e",
    fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif",
    fontSize: "14px",
  },
  flowchart: { htmlLabels: true, curve: "basis", padding: 12 },
});

// --- occt-import-js loader (no importmap support, loaded manually) ---
let occtReady;
const occtPromise = new Promise((resolve) => { occtReady = resolve; });
const occtScript = document.createElement("script");
occtScript.src = "https://cdn.jsdelivr.net/npm/occt-import-js@0.0.23/dist/occt-import-js.js";
occtScript.onload = () => {
  window.occtimportjs().then((occt) => occtReady(occt));
};
document.head.appendChild(occtScript);

// --- State ---
let allFiles = [];       // STEP files
let mmdFiles = [];       // Mermaid files
let currentFile = null;  // STEP detail (file shown in modal)
let currentMmd = null;   // Mermaid detail
let currentMmdContent = null;
let mountedStepFile = null; // file currently rendered into the 3D scene
let currentStepWrapper = null;        // host div inside the modal (parent of canvases)
let currentStepResizeObserver = null; // ResizeObserver on currentStepWrapper
const thumbnailCache = new Map(); // file -> dataURL
const mmdThumbCache = new Map();  // file -> svgHTML
const stepEtags = new Map();      // file -> last loaded ETag (for refetch dedupe)

// --- Detail view: Three.js setup ---
// renderer/scene/camera/controls/gizmo* are created ONCE at module load and
// reused across opens. The two canvases (renderer.domElement and
// gizmoCanvas) live in #step-canvas-host when no detail is open, and get
// appendChild'd into the modal wrapper inside openDetail. This keeps
// OrbitControls listeners (bound to renderer.domElement) alive across
// open/close cycles and avoids reparsing GL state.
const canvasHost = document.getElementById("step-canvas-host");

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setClearColor(0x1a1a2e);
renderer.domElement.id = "viewport";
renderer.domElement.classList.add("step-viewport");
canvasHost.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, 1, 0.01, 10000);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.12;

scene.add(new THREE.AmbientLight(0xffffff, 0.5));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(1, 2, 1.5);
scene.add(dirLight);
const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.3);
dirLight2.position.set(-1, -0.5, -1);
scene.add(dirLight2);

let currentGroup = null;

// Exposed for headless render tooling (tools/render/render-step.js).
// Tiny escape hatch so Puppeteer can pose the camera and trigger a render
// without needing to drive OrbitControls via synthetic events.
window.__hsm = { THREE, renderer, scene, camera, controls, loadStepFile, get currentGroup() { return currentGroup; }, get mountedStepFile() { return mountedStepFile; } };

// --- ViewCube ---
// Smaller on phones so it doesn't eat the screen.
const gizmoSize = window.innerWidth < 600 ? 80 : 120;
const gizmoRenderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
gizmoRenderer.setPixelRatio(window.devicePixelRatio);
gizmoRenderer.setSize(gizmoSize, gizmoSize);
gizmoRenderer.setClearColor(0x000000, 0);
const gizmoCanvas = gizmoRenderer.domElement;
gizmoCanvas.id = "gizmoCanvas";
// .step-gizmo: position:absolute inside the wrapper (top-right, safe-area
// padded), pointer-events:none so empty corners pass touches through to
// OrbitControls. Hits on the rendered cube are picked up via document-level
// raycast handlers below.
gizmoCanvas.classList.add("step-gizmo");
canvasHost.appendChild(gizmoCanvas);

const gizmoScene = new THREE.Scene();
const gizmoCam = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
const gizmoRaycaster = new THREE.Raycaster();

// Face definitions: label, normal (camera direction to see that face), material index
const cubeFaces = [
  { label: "Right",  normal: new THREE.Vector3( 1, 0, 0), index: 0 },
  { label: "Left",   normal: new THREE.Vector3(-1, 0, 0), index: 1 },
  { label: "Top",    normal: new THREE.Vector3( 0, 1, 0), index: 2 },
  { label: "Bottom", normal: new THREE.Vector3( 0,-1, 0), index: 3 },
  { label: "Front",  normal: new THREE.Vector3( 0, 0, 1), index: 4 },
  { label: "Back",   normal: new THREE.Vector3( 0, 0,-1), index: 5 },
];

function makeFaceTexture(label, isHovered) {
  const canvas = document.createElement("canvas");
  canvas.width = 256; canvas.height = 256;
  const ctx = canvas.getContext("2d");
  const bg = isHovered ? "#3a3a5a" : "#232342";
  const border = "#3a3a5a";
  const radius = 16;

  // Rounded rect fill
  ctx.beginPath();
  ctx.roundRect(2, 2, 252, 252, radius);
  ctx.fillStyle = bg;
  ctx.fill();
  ctx.strokeStyle = border;
  ctx.lineWidth = 3;
  ctx.stroke();

  ctx.font = "52px -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillStyle = isHovered ? "#ffffff" : "#999999";
  ctx.fillText(label, 128, 128);
  const tex = new THREE.CanvasTexture(canvas);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

const cubeMaterials = cubeFaces.map((f) =>
  new THREE.MeshBasicMaterial({ map: makeFaceTexture(f.label, false) })
);
const cubeGeo = new THREE.BoxGeometry(0.55, 0.55, 0.55);
const cubeMesh = new THREE.Mesh(cubeGeo, cubeMaterials);
// No offset — cube centered at origin, axes start from its corner
gizmoScene.add(cubeMesh);

// Axis lines + labels from bottom-left-front corner of cube
const axisOrigin = new THREE.Vector3(-0.275, -0.275, 0.275);
const axisLen = 0.7;

function makeAxisLine(origin, dir, color) {
  const end = origin.clone().add(new THREE.Vector3().copy(dir).multiplyScalar(axisLen));
  const geo = new THREE.BufferGeometry().setFromPoints([origin, end]);
  return new THREE.Line(geo, new THREE.LineBasicMaterial({ color }));
}

function makeAxisLabel(text, position, color) {
  const canvas = document.createElement("canvas");
  canvas.width = 64; canvas.height = 64;
  const ctx = canvas.getContext("2d");
  ctx.font = "bold 48px -apple-system, BlinkMacSystemFont, sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillStyle = color;
  ctx.fillText(text, 32, 32);
  const tex = new THREE.CanvasTexture(canvas);
  const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, depthTest: false }));
  sprite.position.copy(position);
  sprite.scale.set(0.3, 0.3, 1);
  return sprite;
}

gizmoScene.add(makeAxisLine(axisOrigin, new THREE.Vector3(1, 0, 0), 0xe74c3c));
gizmoScene.add(makeAxisLine(axisOrigin, new THREE.Vector3(0, 1, 0), 0x2ecc71));
gizmoScene.add(makeAxisLine(axisOrigin, new THREE.Vector3(0, 0, -1), 0x3498db));
const labelOffset = axisLen + 0.15;
gizmoScene.add(makeAxisLabel("X", axisOrigin.clone().add(new THREE.Vector3(labelOffset, 0, 0)), "#e74c3c"));
gizmoScene.add(makeAxisLabel("Y", axisOrigin.clone().add(new THREE.Vector3(0, labelOffset, 0)), "#2ecc71"));
gizmoScene.add(makeAxisLabel("Z", axisOrigin.clone().add(new THREE.Vector3(0, 0, -labelOffset)), "#3498db"));

// Hover + click tracking. Listeners are document-level (capture phase) so we
// can decide whether the gesture belongs to the gizmo *before* OrbitControls
// sees it. The canvas itself is pointer-events:none, so any tap that doesn't
// raycast-hit the cube falls straight through to the 3D viewport underneath.
let hoveredFaceIndex = -1;
let armedAtPointerDown = false;          // true when pointerdown landed on the cube

function gizmoRaycastFromEvent(e) {
  const rect = gizmoCanvas.getBoundingClientRect();
  if (
    e.clientX < rect.left || e.clientX > rect.right ||
    e.clientY < rect.top  || e.clientY > rect.bottom
  ) return null;
  const mouse = new THREE.Vector2(
    ((e.clientX - rect.left) / rect.width) * 2 - 1,
    -((e.clientY - rect.top) / rect.height) * 2 + 1,
  );
  gizmoRaycaster.setFromCamera(mouse, gizmoCam);
  const hits = gizmoRaycaster.intersectObject(cubeMesh);
  return hits.length > 0 ? hits[0] : null;
}

document.addEventListener("mousemove", (e) => {
  const hit = gizmoRaycastFromEvent(e);
  const newIndex = hit ? hit.face.materialIndex : -1;
  if (newIndex !== hoveredFaceIndex) {
    if (hoveredFaceIndex >= 0) {
      cubeMaterials[hoveredFaceIndex].map = makeFaceTexture(cubeFaces[hoveredFaceIndex].label, false);
      cubeMaterials[hoveredFaceIndex].needsUpdate = true;
    }
    if (newIndex >= 0) {
      cubeMaterials[newIndex].map = makeFaceTexture(cubeFaces[newIndex].label, true);
      cubeMaterials[newIndex].needsUpdate = true;
    }
    hoveredFaceIndex = newIndex;
  }
});

// Capture-phase pointerdown: if the tap raycast-hits the cube, claim the
// gesture and keep OrbitControls from seeing it. Otherwise the event flows
// through normally to OrbitControls / drag-to-orbit.
document.addEventListener("pointerdown", (e) => {
  const hit = gizmoRaycastFromEvent(e);
  if (!hit) { armedAtPointerDown = false; return; }
  armedAtPointerDown = true;
  e.stopPropagation();
  e.preventDefault();
}, true);

// Capture-phase pointerup: complete the snap if our pointerdown landed on
// the cube AND this pointerup also lands on the cube (so a drag off the
// cube cancels rather than snaps).
document.addEventListener("pointerup", (e) => {
  if (!armedAtPointerDown) return;
  armedAtPointerDown = false;
  const hit = gizmoRaycastFromEvent(e);
  e.stopPropagation();
  e.preventDefault();
  if (!hit) return;
  const face = cubeFaces[hit.face.materialIndex];
  snapCameraToFace(face.normal);
}, true);

function snapCameraToFace(normal) {
  const target = controls.target.clone();
  const dist = camera.position.distanceTo(target);
  const dest = target.clone().add(normal.clone().multiplyScalar(dist));

  // Up vector: use Y-up unless looking along Y axis, then use Z-up
  const up = Math.abs(normal.y) > 0.9
    ? new THREE.Vector3(0, 0, normal.y > 0 ? -1 : 1)
    : new THREE.Vector3(0, 1, 0);

  const startPos = camera.position.clone();
  const startUp = camera.up.clone();
  const duration = 300;
  const startTime = performance.now();

  function animateSnap() {
    const t = Math.min((performance.now() - startTime) / duration, 1);
    const ease = t * (2 - t); // ease-out quad
    camera.position.lerpVectors(startPos, dest, ease);
    camera.up.lerpVectors(startUp, up, ease).normalize();
    camera.lookAt(target);
    controls.update();
    if (t < 1) requestAnimationFrame(animateSnap);
  }
  animateSnap();
}

function renderGizmo() {
  // Mirror main camera orientation
  const dir = new THREE.Vector3();
  camera.getWorldDirection(dir);
  gizmoCam.position.copy(dir).multiplyScalar(-3);
  gizmoCam.up.copy(camera.up);
  gizmoCam.lookAt(0, 0, 0);
  gizmoRenderer.render(gizmoScene, gizmoCam);
}

// Size the renderer to the canvas's parent (the modal wrapper when open,
// the hidden host when not — but the host has display:none, so we only
// expect this to do useful work when the modal is open). Falls back to
// window size if the parent has no measured rect (e.g. headless tools that
// drove openDetail and may inspect the canvas before layout settles).
function resizeRenderer() {
  const parent = renderer.domElement.parentElement;
  let w = 0, h = 0;
  if (parent && parent !== canvasHost) {
    const r = parent.getBoundingClientRect();
    w = Math.floor(r.width);
    h = Math.floor(r.height);
  }
  if (w === 0 || h === 0) {
    w = window.innerWidth;
    h = window.innerHeight;
  }
  renderer.setSize(w, h, false);
  // Also re-apply CSS size — setSize(...,false) doesn't touch style, and we
  // want the canvas to actually fill the wrapper's content box.
  renderer.domElement.style.width = w + "px";
  renderer.domElement.style.height = h + "px";
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}

let animating = false;
let animateRafId = 0;
function animate() {
  if (!animating) { animateRafId = 0; return; }
  animateRafId = requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
  renderGizmo();
}
function startAnimate() {
  if (animating) return;
  animating = true;
  animate();
}
function stopAnimate() {
  animating = false;
  if (animateRafId) {
    cancelAnimationFrame(animateRafId);
    animateRafId = 0;
  }
}

// --- STEP parsing ---
async function parseStep(buffer) {
  const occt = await occtPromise;
  return occt.ReadStepFile(buffer, null);
}

function buildMesh(result) {
  const group = new THREE.Group();
  const mat = new THREE.MeshStandardMaterial({ color: 0x8899aa, metalness: 0.1, roughness: 0.6 });
  const matBack = new THREE.MeshStandardMaterial({ color: 0x667788, metalness: 0.1, roughness: 0.6, side: THREE.BackSide });

  for (const mesh of result.meshes) {
    const geo = new THREE.BufferGeometry();
    geo.setAttribute("position", new THREE.Float32BufferAttribute(new Float32Array(mesh.attributes.position.array), 3));
    if (mesh.attributes.normal) {
      geo.setAttribute("normal", new THREE.Float32BufferAttribute(new Float32Array(mesh.attributes.normal.array), 3));
    }
    if (mesh.index) {
      geo.setIndex(new THREE.BufferAttribute(new Uint32Array(mesh.index.array), 1));
    }
    geo.computeBoundingBox();

    // Front + back face so thin parts are visible from behind
    group.add(new THREE.Mesh(geo, mat));
    group.add(new THREE.Mesh(geo, matBack));
  }

  // Edge lines for CAD look
  for (const edge of (result.brpieces || [])) {
    // Not all versions expose edges — skip if absent
  }

  return group;
}

function resetCamera(group) {
  const box = new THREE.Box3().setFromObject(group);
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);
  const dist = maxDim * 2.5;

  // Isometric angles
  const el = Math.atan(1 / Math.sqrt(2)); // ~35.26 deg
  const az = Math.PI / 4;
  camera.position.set(
    center.x + dist * Math.cos(el) * Math.cos(az),
    center.y + dist * Math.sin(el),
    center.z + dist * Math.cos(el) * Math.sin(az)
  );
  camera.lookAt(center);
  controls.target.copy(center);
  controls.update();
}

async function loadStepFile(file, { preserveCamera = false } = {}) {
  // Loading pill lives inside the current step wrapper (or none if the
  // headless tool drove loadStepFile directly). Tolerate either.
  const loadingEl = currentStepWrapper && currentStepWrapper.querySelector(".step-loading");
  if (loadingEl) loadingEl.style.display = "block";

  try {
    // If we're refetching the same file that's already in the scene, send
    // If-None-Match so the server can answer 304 when bytes are unchanged
    // (avoids the visible re-render flash on a deploy that didn't touch
    // this STEP file).
    const headers = {};
    const prevEtag = stepEtags.get(file);
    if (mountedStepFile === file && prevEtag) {
      headers["If-None-Match"] = prevEtag;
    }
    const resp = await fetch(`/steps/${file}`, { headers });
    if (resp.status === 304) return;
    if (!resp.ok) return;
    const etag = resp.headers.get("etag");
    if (etag) stepEtags.set(file, etag);

    const buf = new Uint8Array(await resp.arrayBuffer());
    const result = await parseStep(buf);

    if (currentGroup) {
      scene.remove(currentGroup);
      currentGroup.traverse((c) => { if (c.geometry) c.geometry.dispose(); });
    }

    currentGroup = buildMesh(result);
    scene.add(currentGroup);
    mountedStepFile = file;
    if (!preserveCamera) resetCamera(currentGroup);
  } finally {
    if (loadingEl) loadingEl.style.display = "none";
  }
}

// --- Thumbnail rendering ---
const thumbRenderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
thumbRenderer.setSize(400, 400);
thumbRenderer.setPixelRatio(1);
thumbRenderer.setClearColor(0x1a1a2e);
const thumbScene = new THREE.Scene();
const thumbCam = new THREE.PerspectiveCamera(45, 1, 0.01, 10000);
thumbScene.add(new THREE.AmbientLight(0xffffff, 0.5));
const tl = new THREE.DirectionalLight(0xffffff, 0.8);
tl.position.set(1, 2, 1.5);
thumbScene.add(tl);
const tl2 = new THREE.DirectionalLight(0xffffff, 0.3);
tl2.position.set(-1, -0.5, -1);
thumbScene.add(tl2);

async function renderThumbnail(file) {
  if (thumbnailCache.has(file)) return thumbnailCache.get(file);

  try {
    const resp = await fetch(`/steps/${file}`);
    if (!resp.ok) return null;
    const buf = new Uint8Array(await resp.arrayBuffer());
    const result = await parseStep(buf);
    const group = buildMesh(result);
    thumbScene.add(group);

    const box = new THREE.Box3().setFromObject(group);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    const dist = maxDim * 2.5;
    const el = Math.atan(1 / Math.sqrt(2));
    const az = Math.PI / 4;
    thumbCam.position.set(
      center.x + dist * Math.cos(el) * Math.cos(az),
      center.y + dist * Math.sin(el),
      center.z + dist * Math.cos(el) * Math.sin(az)
    );
    thumbCam.lookAt(center);

    thumbRenderer.render(thumbScene, thumbCam);
    const dataURL = thumbRenderer.domElement.toDataURL();

    thumbScene.remove(group);
    group.traverse((c) => { if (c.geometry) c.geometry.dispose(); });

    thumbnailCache.set(file, dataURL);
    return dataURL;
  } catch {
    return null;
  }
}

// --- Mermaid detail view ---
// The detail opens inside ContentViewer; PanZoom drives pan/zoom; we persist
// {scale,panX,panY} per-file in localStorage and restore on reopen. The
// wrapper / SVG host stays mounted so SSE re-renders can swap the SVG
// without recreating PanZoom (preserves the user's pan/zoom).
let mmdRenderCounter = 0;
let currentMmdWrapper = null; // host div inside the modal (PanZoom container)
let currentMmdPz = null;      // PanZoom handle for currentMmdWrapper

function mmdTransformKey(file) { return `mmd-transform:${file}`; }

function mmdSaveTransform(file, t) {
  try { localStorage.setItem(mmdTransformKey(file), JSON.stringify(t)); } catch {}
}
function mmdLoadTransform(file) {
  try {
    const raw = localStorage.getItem(mmdTransformKey(file));
    if (!raw) return null;
    const s = JSON.parse(raw);
    if (typeof s.scale !== "number") return null;
    return s;
  } catch { return null; }
}

// Render `content` to an SVG element with explicit width/height (so PanZoom
// can measure natural size). Returns the SVGSVGElement, or throws.
async function mmdRenderSvg(content) {
  const id = `mmd-detail-${++mmdRenderCounter}`;
  const { svg } = await mermaid.render(id, content);
  const tmp = document.createElement("div");
  tmp.innerHTML = svg;
  const svgEl = tmp.querySelector("svg");
  if (!svgEl) throw new Error("mermaid produced no <svg>");
  // Mermaid sets width="100%"; lock to natural viewBox dims so PanZoom can
  // fit-to-container correctly.
  const vb = svgEl.viewBox?.baseVal;
  if (vb && vb.width && vb.height) {
    svgEl.setAttribute("width", vb.width);
    svgEl.setAttribute("height", vb.height);
  }
  svgEl.style.display = "block";
  svgEl.style.maxWidth = "none";
  svgEl.style.maxHeight = "none";
  return svgEl;
}

// Replace the SVG inside the open modal's wrapper without touching PanZoom.
// Used by the SSE re-render path so the user's pan/zoom is preserved.
async function reRenderOpenMmd(content) {
  if (!currentMmdWrapper || !currentMmdPz) return;
  let svgEl;
  try {
    svgEl = await mmdRenderSvg(content);
  } catch (err) {
    currentMmdWrapper.innerHTML = `<pre style="color:#c44;padding:20px;font-size:13px;">${err.message || err}</pre>`;
    return;
  }
  // Clear the wrapper but keep PanZoom listeners (they're on the wrapper, not
  // the SVG). Re-wrap the new SVG against the same wrapper, then restore the
  // previous transform so the swap is invisible.
  const prev = currentMmdPz.getTransform();
  currentMmdPz.destroy();
  currentMmdWrapper.innerHTML = "";
  currentMmdWrapper.appendChild(svgEl);
  currentMmdPz = PanZoom.wrap(svgEl, {
    container: currentMmdWrapper,
    initialFit: false,
    onTransformChange: (t) => mmdSaveTransform(currentMmd, t),
  });
  currentMmdPz.setTransform(prev);
}

// --- Mermaid thumbnail rendering ---
async function renderMmdThumbnail(file) {
  if (mmdThumbCache.has(file)) return mmdThumbCache.get(file);
  try {
    const resp = await fetch(`/api/mermaid-content/${file}`);
    if (!resp.ok) return null;
    const content = await resp.text();
    const id = `mmd-thumb-${file.replace(/[^a-zA-Z0-9]/g, "-")}`;
    const { svg } = await mermaid.render(id, content);
    mmdThumbCache.set(file, svg);
    return svg;
  } catch { return null; }
}

// --- Grid ---
const gridEl = document.getElementById("grid");

function shortName(file, ext = ".step") {
  const parts = file.split("/");
  const name = parts.pop().replace(ext, "");
  const dir = parts.join("/");
  return { name, dir };
}

// One viewer page area at a time. The path determines which section the
// grid renders. In production the viewer is mounted under /dev; in dev
// it lives at the root.
const NAV_PREFIX = location.pathname.startsWith("/dev") ? "/dev" : "";
function currentSection() {
  const tail = location.pathname.replace(NAV_PREFIX, "").replace(/\/$/, "");
  if (tail === "/diagrams" || tail === "diagrams") return "diagrams";
  return "prints";
}

function setupNav() {
  // Rewrite Prints / Diagrams hrefs for the current mount point so the
  // links work in both production (/dev/...) and dev (/...) without
  // duplicating templates. Home and Updates always live at the root.
  const links = document.querySelectorAll("#site-nav a[data-nav]");
  for (const a of links) {
    const which = a.dataset.nav;
    if (which === "prints") a.href = NAV_PREFIX || "/";
    if (which === "diagrams") a.href = `${NAV_PREFIX}/diagrams`;
  }
  const section = currentSection();
  const activeMap = { prints: "prints", diagrams: "diagrams" };
  const wantActive = activeMap[section];
  for (const a of document.querySelectorAll("#site-nav a[data-nav]")) {
    a.classList.toggle("active", a.dataset.nav === wantActive);
  }

  const titleMap = {
    prints: "Prints · Home Soda Machine",
    diagrams: "Diagrams · Home Soda Machine",
  };
  document.title = titleMap[section] || document.title;
}

function buildGrid() {
  gridEl.innerHTML = "";
  const section = currentSection();


  if (section === "prints") {
    if (allFiles.length === 0) {
      const empty = document.createElement("div");
      empty.className = "empty-state";
      empty.textContent = "No prints yet.";
      gridEl.appendChild(empty);
    }
    for (const file of allFiles) {
      const { name, dir } = shortName(file, ".step");
      const card = document.createElement("div");
      card.className = "card";
      card.dataset.file = file;
      card.dataset.type = "step";
      card.innerHTML = `<div class="placeholder" data-file="${file}">loading...</div><div class="label"><span class="dir">${dir}</span>${name}</div>`;
      card.addEventListener("click", () => openDetail(file));
      gridEl.appendChild(card);
    }
  }

  if (section === "diagrams") {
    if (mmdFiles.length === 0) {
      const empty = document.createElement("div");
      empty.className = "empty-state";
      empty.textContent = "No diagrams yet.";
      gridEl.appendChild(empty);
    }
    for (const file of mmdFiles) {
      const { name, dir } = shortName(file, ".mmd");
      const card = document.createElement("div");
      card.className = "card";
      card.dataset.file = file;
      card.dataset.type = "mmd";
      card.innerHTML = `<div class="mmd-thumb" data-file="${file}"><div class="placeholder">loading...</div></div><div class="label"><span class="dir">${dir}</span>${name}</div>`;
      card.addEventListener("click", () => openMmdDetail(file));
      gridEl.appendChild(card);
    }
  }

  // Lazy-load STEP thumbnails
  const stepObserver = new IntersectionObserver((entries) => {
    for (const entry of entries) {
      if (!entry.isIntersecting) continue;
      stepObserver.unobserve(entry.target);
      const file = entry.target.dataset.file;
      renderThumbnail(file).then((url) => {
        if (!url) {
          entry.target.querySelector(".placeholder").textContent = "error";
          return;
        }
        const img = document.createElement("img");
        img.src = url;
        const placeholder = entry.target.querySelector(".placeholder");
        if (placeholder) placeholder.replaceWith(img);
      });
    }
  }, { rootMargin: "200px" });

  for (const card of gridEl.querySelectorAll('.card[data-type="step"]')) {
    stepObserver.observe(card);
  }

  // Lazy-load Mermaid thumbnails
  const mmdObserver = new IntersectionObserver((entries) => {
    for (const entry of entries) {
      if (!entry.isIntersecting) continue;
      mmdObserver.unobserve(entry.target);
      const file = entry.target.dataset.file;
      renderMmdThumbnail(file).then((svg) => {
        const thumbEl = entry.target.querySelector(".mmd-thumb");
        if (!thumbEl) return;
        if (!svg) { thumbEl.innerHTML = `<div class="placeholder">error</div>`; return; }
        thumbEl.innerHTML = svg;
      });
    }
  }, { rootMargin: "200px" });

  for (const card of gridEl.querySelectorAll('.card[data-type="mmd"]')) {
    mmdObserver.observe(card);
  }
}

// open/close functions take a `pushHistory` flag. UI-driven calls push;
// popstate-driven calls don't (the URL already changed).
function openDetail(file, pushHistory = true) {
  // Set currentFile BEFORE touching location.hash. In Puppeteer (and some
  // browser configurations) setting location.hash can fire a popstate that
  // runs synchronously before this function returns; the popstate handler
  // dispatches on currentFile, so it must already reflect this open or it
  // re-enters openDetail and we end up with a duplicate ContentViewer.
  currentFile = file;
  if (pushHistory) location.hash = "step:" + encodeURIComponent(file);

  // Build the modal wrapper. Renderer canvas + gizmo canvas get moved out
  // of the hidden host into here; on close they go back. The wrapper also
  // hosts a centered loading pill that loadStepFile toggles.
  const wrapper = document.createElement("div");
  wrapper.className = "step-wrapper";
  wrapper.appendChild(renderer.domElement);
  wrapper.appendChild(gizmoCanvas);
  const loadingEl = document.createElement("div");
  loadingEl.className = "step-loading";
  loadingEl.textContent = "Loading...";
  wrapper.appendChild(loadingEl);

  currentStepWrapper = wrapper;

  // Re-fit the renderer whenever the wrapper's content box changes
  // (modal show, window resize, orientation change). The first observation
  // fires synchronously after observe(), which gives us a correct initial
  // size as soon as the modal lays out.
  currentStepResizeObserver = new ResizeObserver(() => {
    if (renderer.domElement.parentElement === wrapper) resizeRenderer();
  });
  currentStepResizeObserver.observe(wrapper);

  ContentViewer.open({
    content: wrapper,
    filename: shortName(file, ".step").name,
    onOpen: () => {
      // Wrapper has its real size now — size the renderer + start the loop.
      resizeRenderer();
      startAnimate();
    },
    onClose: () => {
      // Persist camera state defensively. The debounced save (controls
      // "change" handler) usually has already fired, but if the user
      // dismissed mid-gesture the trailing save may not have. Use the
      // captured `file` rather than currentFile — closeDetail(false)
      // clears currentFile before invoking us, so we'd otherwise miss
      // the save on popstate-driven closes.
      saveCameraState(file);
      // Whether this onClose was triggered by a UI-driven dismissal
      // (Escape / X / backdrop / swipe) or by closeDetail(false) from the
      // popstate path. The popstate path clears currentFile before close
      // fires; UI-driven closes leave currentFile set.
      const wasUiDriven = currentFile === file;
      stopAnimate();
      // Disconnect ResizeObserver before moving canvases (otherwise it
      // fires once more for the move into the hidden host).
      if (currentStepResizeObserver) {
        try { currentStepResizeObserver.disconnect(); } catch {}
        currentStepResizeObserver = null;
      }
      // Move canvases back to the hidden host so they stay mounted for
      // the next open. Don't dispose anything Three.js — renderer/scene/
      // controls are reused.
      try { canvasHost.appendChild(renderer.domElement); } catch {}
      try { canvasHost.appendChild(gizmoCanvas); } catch {}
      // Drop the loaded mesh — fresh load on next open.
      if (currentGroup) {
        scene.remove(currentGroup);
        currentGroup.traverse((c) => { if (c.geometry) c.geometry.dispose(); });
        currentGroup = null;
      }
      currentStepWrapper = null;
      currentFile = null;
      mountedStepFile = null;
      // Pop the hash if the user dismissed the modal directly. popstate
      // already moved the URL, so don't double-pop.
      if (wasUiDriven && location.hash) history.back();
    },
  });

  loadStepFile(file).then(() => applyCameraState(file));
}

// closeDetail is the entry point for the popstate path; UI-driven closes
// (Escape / X / backdrop / swipe) go through ContentViewer directly and run
// the modal's onClose. All teardown lives there.
function closeDetail(pushHistory = true) {
  if (!ContentViewer.isOpen()) {
    // Already closed by the user — normalize state.
    currentFile = null;
    mountedStepFile = null;
    return;
  }
  // pushHistory=false comes from popstate (the URL already changed). Clear
  // currentFile first so the onClose handler sees it as null and skips the
  // history.back() that would double-pop the stack.
  if (!pushHistory) {
    currentFile = null;
  }
  ContentViewer.close();
}

async function openMmdDetail(file, pushHistory = true) {
  // Set currentMmd BEFORE touching location.hash. In some browser
  // configurations (notably Puppeteer) setting location.hash fires a
  // popstate that runs synchronously before this function returns; the
  // popstate handler dispatches on currentMmd, so it must already reflect
  // this open or it re-enters openMmdDetail and we end up with a duplicate
  // ContentViewer (whose singleton-replacement strips the hash).
  currentMmd = file;
  if (pushHistory) location.hash = "mmd:" + encodeURIComponent(file);

  const resp = await fetch(`/api/mermaid-content/${file}`);
  if (!resp.ok) return;
  const content = await resp.text();

  let svgEl;
  try {
    svgEl = await mmdRenderSvg(content);
  } catch (err) {
    // Render the error inside the modal too so the user sees something.
    const errWrapper = document.createElement("div");
    errWrapper.style.cssText = "overflow:hidden;position:relative;width:100%;height:100%;";
    errWrapper.innerHTML = `<pre style="color:#c44;padding:20px;font-size:13px;white-space:pre-wrap;">${err.message || err}</pre>`;
    ContentViewer.open({
      content: errWrapper,
      filename: shortName(file, ".mmd").name,
      onClose: () => {
        currentMmd = null;
        currentMmdContent = null;
        currentMmdWrapper = null;
        currentMmdPz = null;
        if (location.hash) history.back();
      },
    });
    currentMmd = file;
    currentMmdContent = content;
    return;
  }

  const wrapper = document.createElement("div");
  wrapper.style.cssText = "overflow:hidden;position:relative;width:100%;height:100%;";
  wrapper.appendChild(svgEl);

  const pz = PanZoom.wrap(svgEl, {
    container: wrapper,
    initialFit: true,
    onTransformChange: (t) => mmdSaveTransform(file, t),
  });

  currentMmd = file;
  currentMmdContent = content;
  currentMmdWrapper = wrapper;
  currentMmdPz = pz;

  ContentViewer.open({
    content: wrapper,
    filename: shortName(file, ".mmd").name,
    onOpen: () => {
      // Container's real layout box is only known after the dialog has been
      // shown. Re-fit now (PanZoom's initialFit ran before showModal made the
      // wrapper measurable) and then apply any saved transform on top.
      pz.fit();
      const saved = mmdLoadTransform(file);
      if (saved) pz.setTransform(saved);
    },
    onClose: () => {
      try { pz.destroy(); } catch {}
      currentMmd = null;
      currentMmdContent = null;
      currentMmdWrapper = null;
      currentMmdPz = null;
      if (location.hash) history.back();
    },
  });
}

function closeMmdDetail(pushHistory = true) {
  // Closing is driven by ContentViewer (backdrop tap / Escape / X / swipe).
  // The onClose handler above clears state and pops history. This wrapper
  // exists for the popstate path, which calls us with pushHistory=false to
  // dismiss the modal without re-popping (the URL already changed).
  if (!ContentViewer.isOpen()) {
    // Already closed by the user — just normalize state.
    currentMmd = null;
    currentMmdContent = null;
    currentMmdWrapper = null;
    currentMmdPz = null;
    return;
  }
  // Suppress the onClose-driven history.back() so popstate-driven closes
  // don't double-pop the history stack.
  if (!pushHistory) {
    const wrapper = currentMmdWrapper;
    const pz = currentMmdPz;
    currentMmd = null;
    currentMmdContent = null;
    currentMmdWrapper = null;
    currentMmdPz = null;
    try { pz?.destroy(); } catch {}
    ContentViewer.close();
    return;
  }
  ContentViewer.close();
}

// Browser/OS back button: navigate to whatever the new hash represents.
// ContentViewer handles Escape / X / backdrop / swipe-down on its own.
window.addEventListener("popstate", () => {
  const hash = location.hash ? decodeURIComponent(location.hash.slice(1)) : "";
  const want = hash.startsWith("step:") ? { type: "step", file: hash.slice(5) }
             : hash.startsWith("mmd:")  ? { type: "mmd",  file: hash.slice(4) }
             : { type: null };
  if (want.type === "step") {
    if (currentMmd) closeMmdDetail(false);
    if (currentFile !== want.file) openDetail(want.file, false);
  } else if (want.type === "mmd") {
    if (currentFile) closeDetail(false);
    if (currentMmd !== want.file) openMmdDetail(want.file, false);
  } else {
    if (currentFile) closeDetail(false);
    if (currentMmd) closeMmdDetail(false);
  }
});

// --- Server-Sent Events ---
// EventSource handles reconnect (with backoff) on its own.
//
// `hello` arrives on every connect. The first one establishes a baseline
// commit fingerprint. A subsequent hello with a different commit means the
// server restarted with new code (a Render deploy in prod) — we refetch
// whatever's currently displayed, with state (camera / pan / zoom)
// preserved by the existing render paths.
//
// `updated` and `mermaid-updated` fire only in dev (chokidar). In prod
// the source files don't change between deploys; the deploy event
// arrives as a hello-with-different-commit.
let firstSeenCommit = null;

function refetchAfterDeploy() {
  thumbnailCache.clear();
  mmdThumbCache.clear();
  fetchFiles();
  if (currentFile) {
    loadStepFile(currentFile, { preserveCamera: true });
  } else if (currentMmd) {
    (async () => {
      const resp = await fetch(`/api/mermaid-content/${currentMmd}`);
      if (!resp.ok) return;
      const content = await resp.text();
      if (content === currentMmdContent) return;
      currentMmdContent = content;
      await reRenderOpenMmd(content);
    })();
  }
}

function connectEvents() {
  const es = new EventSource("/api/events");
  es.onmessage = (e) => {
    const msg = JSON.parse(e.data);

    if (msg.type === "hello") {
      if (firstSeenCommit === null) {
        firstSeenCommit = msg.commit;
      } else if (msg.commit !== firstSeenCommit) {
        firstSeenCommit = msg.commit;
        refetchAfterDeploy();
      }
      return;
    }

    if (msg.type === "updated") {
      thumbnailCache.delete(msg.file);
      const card = gridEl.querySelector(`.card[data-type="step"][data-file="${CSS.escape(msg.file)}"]`);
      if (card) {
        const img = card.querySelector("img");
        if (img) {
          const ph = document.createElement("div");
          ph.className = "placeholder";
          ph.dataset.file = msg.file;
          ph.textContent = "updating...";
          img.replaceWith(ph);
        }
        renderThumbnail(msg.file).then((url) => {
          if (!url) return;
          const target = card.querySelector(".placeholder");
          if (target) {
            const newImg = document.createElement("img");
            newImg.src = url;
            target.replaceWith(newImg);
          } else {
            const existing = card.querySelector("img");
            if (existing) existing.src = url;
          }
        });
      } else {
        fetchFiles();
      }
      if (currentFile === msg.file) {
        loadStepFile(msg.file, { preserveCamera: true });
      }
    }

    if (msg.type === "mermaid-updated") {
      mmdThumbCache.delete(msg.file);
      const card = gridEl.querySelector(`.card[data-type="mmd"][data-file="${CSS.escape(msg.file)}"]`);
      if (card) {
        const thumbEl = card.querySelector(".mmd-thumb");
        if (thumbEl) thumbEl.innerHTML = `<div class="placeholder">updating...</div>`;
        renderMmdThumbnail(msg.file).then((svg) => {
          if (!thumbEl) return;
          if (!svg) { thumbEl.innerHTML = `<div class="placeholder">error</div>`; return; }
          thumbEl.innerHTML = svg;
        });
      } else {
        fetchFiles();
      }
      if (currentMmd === msg.file) {
        (async () => {
          const resp = await fetch(`/api/mermaid-content/${msg.file}`);
          if (!resp.ok) return;
          const content = await resp.text();
          if (content === currentMmdContent) return;
          currentMmdContent = content;
          await reRenderOpenMmd(content);
        })();
      }
    }
  };
}

// --- Init ---
async function fetchFiles() {
  const [stepResp, mmdResp] = await Promise.all([
    fetch("/api/steps"),
    fetch("/api/mermaid"),
  ]);
  allFiles = (await stepResp.json()).sort();
  mmdFiles = (await mmdResp.json()).sort();
  buildGrid();
}

// --- Per-file camera persistence ---
// Saves position/up/target to localStorage on every settled change so
// reopening the file (or following a push notification) restores the same
// view. Keys are namespaced by file path.
function saveCameraState(file) {
  if (!file) return;
  try {
    localStorage.setItem(`step-camera:${file}`, JSON.stringify({
      p: camera.position.toArray(),
      u: camera.up.toArray(),
      t: controls.target.toArray(),
    }));
  } catch {}
}

function applyCameraState(file) {
  try {
    const raw = localStorage.getItem(`step-camera:${file}`);
    if (!raw) return false;
    const s = JSON.parse(raw);
    camera.position.fromArray(s.p);
    camera.up.fromArray(s.u);
    controls.target.fromArray(s.t);
    controls.update();
    return true;
  } catch {
    return false;
  }
}

let cameraSaveTimer = null;
controls.addEventListener("change", () => {
  if (!currentFile) return;
  clearTimeout(cameraSaveTimer);
  cameraSaveTimer = setTimeout(() => saveCameraState(currentFile), 250);
});

setupNav();
fetchFiles();
connectEvents();

// --- Initial route ---
// Prefer ?file=<step> (notification deep link), fall back to hash.
const initialParams = new URLSearchParams(location.search);
const initialFile = initialParams.get("file");
if (initialFile) {
  occtPromise.then(() => setTimeout(() => openDetail(initialFile, true), 100));
} else if (location.hash) {
  const hash = decodeURIComponent(location.hash.slice(1));
  if (hash.startsWith("step:")) {
    const file = hash.slice(5);
    occtPromise.then(() => setTimeout(() => openDetail(file, false), 100));
  } else if (hash.startsWith("mmd:")) {
    const file = hash.slice(4);
    setTimeout(() => openMmdDetail(file, false), 100);
  } else {
    // Legacy hash format (just a step file path)
    occtPromise.then(() => setTimeout(() => openDetail(hash, false), 100));
  }
}
</script>
