<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" font-family="Arial, Helvetica, sans-serif">
  <title>Flow Meter Mount — DIGITEN 1/4" QC Flow Sensor Bracket</title>
  <desc>
    Three-view orthographic projection of the flow meter mount bracket
    holding a DIGITEN 1/4" quick-connect flow sensor.
    Scale: 4 px/mm. Dimensions in mm.
  </desc>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#333"/>
    </marker>
    <marker id="arrow-rev" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6 Z" fill="#333"/>
    </marker>

    <style>
      .dim-line { stroke: #333; stroke-width: 0.7; fill: none; marker-start: url(#arrow-rev); marker-end: url(#arrow); }
      .dim-ext { stroke: #333; stroke-width: 0.5; fill: none; }
      .dim-text { font-size: 11px; fill: #333; text-anchor: middle; }
      .dim-text-sm { font-size: 9.5px; fill: #333; text-anchor: middle; }
      .label { font-size: 14px; font-weight: bold; fill: #222; }
      .note { font-size: 10px; fill: #444; }
      .title-text { font-size: 18px; font-weight: bold; fill: #111; }
      .subtitle { font-size: 12px; fill: #444; }
      .hidden { stroke: #555; stroke-width: 0.8; stroke-dasharray: 6,3; fill: none; }
      .visible { stroke: #222; stroke-width: 1.2; fill: none; }
      .centerline { stroke: #888; stroke-width: 0.5; stroke-dasharray: 16,3,3,3; fill: none; }
      .bracket { fill: #d0d8e0; stroke: #222; stroke-width: 1.2; }
      .sensor-body { fill: #e8e8e8; stroke: #222; stroke-width: 1; }
      .sensor-port { fill: #ccc; stroke: #222; stroke-width: 0.8; }
      .screw-hole { fill: #fff; stroke: #222; stroke-width: 0.8; }
      .tube-zone { fill: none; stroke: #0a0; stroke-width: 0.8; stroke-dasharray: 4,3; }
      .cable { fill: none; stroke: #c00; stroke-width: 1; stroke-dasharray: 5,3; }
    </style>
  </defs>

  <!-- ============================================================ -->
  <!-- TITLE BLOCK                                                   -->
  <!-- ============================================================ -->
  <rect x="820" y="790" width="360" height="95" fill="#f8f8f8" stroke="#222" stroke-width="1.2"/>
  <text x="1000" y="813" class="title-text" text-anchor="middle">Flow Meter Mount</text>
  <text x="1000" y="830" class="subtitle" text-anchor="middle">DIGITEN 1/4" QC Flow Sensor Bracket</text>
  <text x="830" y="850" class="note">Scale: 4 px/mm | Bracket: PETG or ABS</text>
  <text x="830" y="865" class="note">All dimensions in mm | Sensor: 63.5L x 30.5W x 38.1H</text>
  <text x="830" y="880" class="note">Bracket envelope: 70W x 40D x 45H mm</text>

  <!-- ============================================================ -->
  <!-- FRONT VIEW (looking along -Y): X horizontal, Z vertical      -->
  <!-- Scale: 4 px/mm                                                -->
  <!-- Bracket: 70W x 45H = 280px x 180px                           -->
  <!-- Sensor body: 63.5W x 38.1H = 254px x 152.4px                 -->
  <!-- Sensor centered in bracket: wall=(70-63.5)/2=3.25mm=13px     -->
  <!-- Bracket bottom-left at SVG (80, 340)                          -->
  <!-- Bracket top-left at SVG (80, 160)                             -->
  <!--                                                               -->
  <!-- Z layout (bottom up, SVG y decreases):                        -->
  <!--   Z=0-4mm: base plate (4mm=16px), SVG y=340 to 324           -->
  <!--   Z=4-42.1mm: sensor (38.1mm=152px), SVG y=324 to 172        -->
  <!--   Z=42.1-45mm: clip lips (2.9mm=12px), SVG y=172 to 160      -->
  <!--                                                               -->
  <!-- QC ports face left/right (along X axis).                      -->
  <!-- Looking along -Y: ports are circles (viewing along their axis)-->
  <!-- Port OD ~10mm=40px, centered at sensor mid-height             -->
  <!-- Sensor mid-Z = 4 + 38.1/2 = 23.05mm, SVG y=340-23.05*4=248  -->
  <!-- ============================================================ -->

  <text x="220" y="105" class="label" text-anchor="middle">FRONT VIEW</text>
  <text x="220" y="120" class="note" text-anchor="middle">Looking along -Y | X horiz, Z vert</text>

  <!-- Bracket base plate: 70W x 4H at Z=0 -->
  <rect x="80" y="324" width="280" height="16" class="bracket"/>

  <!-- Bracket left wall: 3.25mm wide x 45mm tall -->
  <rect x="80" y="160" width="13" height="180" class="bracket"/>

  <!-- Bracket right wall -->
  <rect x="347" y="160" width="13" height="180" class="bracket"/>

  <!-- Bracket top clip lip left: ~10mm inward from wall -->
  <rect x="80" y="160" width="53" height="12" class="bracket"/>

  <!-- Bracket top clip lip right -->
  <rect x="307" y="160" width="53" height="12" class="bracket"/>

  <!-- Sensor body: 63.5W x 38.1H -->
  <rect x="93" y="172" width="254" height="152" class="sensor-body"/>

  <!-- QC port left: circle (viewing along port axis) -->
  <!-- Center at left face of sensor, mid-height -->
  <circle cx="93" cy="248" r="20" class="sensor-port"/>

  <!-- QC port right -->
  <circle cx="347" cy="248" r="20" class="sensor-port"/>

  <!-- M3 screw holes in base plate -->
  <!-- At X=15mm and X=55mm from bracket left, Z=2mm (base center) -->
  <circle cx="140" cy="332" r="5" class="screw-hole"/>
  <circle cx="300" cy="332" r="5" class="screw-hole"/>

  <!-- Signal cable routing (dashed red) -->
  <path d="M220,172 L220,135" class="cable"/>
  <text x="235" y="140" class="note" fill="#c00">3-wire signal</text>

  <!-- Tube routing clearance zones (dashed green) -->
  <rect x="30" y="212" width="50" height="72" class="tube-zone"/>
  <rect x="360" y="212" width="50" height="72" class="tube-zone"/>
  <text x="55" y="295" class="note" fill="#0a0" text-anchor="middle">1/4" tube</text>
  <text x="385" y="295" class="note" fill="#0a0" text-anchor="middle">1/4" tube</text>

  <!-- FRONT VIEW DIMENSIONS -->

  <!-- Bracket width: 70mm -->
  <line x1="80" y1="355" x2="80" y2="365" class="dim-ext"/>
  <line x1="360" y1="355" x2="360" y2="365" class="dim-ext"/>
  <line x1="80" y1="362" x2="360" y2="362" class="dim-line"/>
  <text x="220" y="376" class="dim-text">70</text>

  <!-- Bracket height: 45mm -->
  <line x1="375" y1="160" x2="395" y2="160" class="dim-ext"/>
  <line x1="375" y1="340" x2="395" y2="340" class="dim-ext"/>
  <line x1="390" y1="160" x2="390" y2="340" class="dim-line"/>
  <text x="405" y="254" class="dim-text" text-anchor="start">45</text>

  <!-- Sensor width: 63.5mm -->
  <line x1="93" y1="155" x2="93" y2="145" class="dim-ext"/>
  <line x1="347" y1="155" x2="347" y2="145" class="dim-ext"/>
  <line x1="93" y1="148" x2="347" y2="148" class="dim-line"/>
  <text x="220" y="143" class="dim-text">63.5</text>

  <!-- Sensor height: 38.1mm -->
  <line x1="60" y1="172" x2="75" y2="172" class="dim-ext"/>
  <line x1="60" y1="324" x2="75" y2="324" class="dim-ext"/>
  <line x1="68" y1="172" x2="68" y2="324" class="dim-line"/>
  <text x="55" y="252" class="dim-text" text-anchor="end">38.1</text>

  <!-- Base plate height: 4mm -->
  <line x1="55" y1="324" x2="45" y2="324" class="dim-ext"/>
  <line x1="55" y1="340" x2="45" y2="340" class="dim-ext"/>
  <line x1="48" y1="324" x2="48" y2="340" class="dim-line"/>
  <text x="38" y="336" class="dim-text-sm" text-anchor="end">4</text>

  <!-- M3 hole spacing: 40mm -->
  <line x1="140" y1="345" x2="140" y2="352" class="dim-ext"/>
  <line x1="300" y1="345" x2="300" y2="352" class="dim-ext"/>
  <line x1="140" y1="350" x2="300" y2="350" class="dim-line"/>
  <text x="220" y="348" class="dim-text-sm">40 (M3 c-c)</text>

  <!-- ============================================================ -->
  <!-- SIDE VIEW (looking along -X): Y horizontal, Z vertical       -->
  <!-- Scale: 4 px/mm                                                -->
  <!-- Bracket: 40D x 45H = 160px x 180px                           -->
  <!-- Sensor: 30.5D x 38.1H = 122px x 152px                       -->
  <!-- Wall thickness front/back: (40-30.5)/2 = 4.75mm = 19px       -->
  <!-- Side view bottom-left at SVG (520, 340)                       -->
  <!--                                                               -->
  <!-- QC ports extend along X: in side view (looking along -X)     -->
  <!-- they appear as rectangles (hidden, port cross-section).       -->
  <!-- Port OD ~10mm: 40px diameter shown as hidden rect             -->
  <!-- ============================================================ -->

  <text x="600" y="105" class="label" text-anchor="middle">SIDE VIEW</text>
  <text x="600" y="120" class="note" text-anchor="middle">Looking along -X | Y horiz, Z vert</text>

  <!-- Bracket base plate: 40D x 4H -->
  <rect x="520" y="324" width="160" height="16" class="bracket"/>

  <!-- Bracket back wall (left in side view): 4.75mm wide -->
  <rect x="520" y="160" width="19" height="180" class="bracket"/>

  <!-- Bracket front wall (right) -->
  <rect x="661" y="160" width="19" height="180" class="bracket"/>

  <!-- Bracket top clip lip back -->
  <rect x="520" y="160" width="50" height="12" class="bracket"/>

  <!-- Bracket top clip lip front -->
  <rect x="630" y="160" width="50" height="12" class="bracket"/>

  <!-- Sensor body: 30.5D x 38.1H -->
  <rect x="539" y="172" width="122" height="152" class="sensor-body"/>

  <!-- QC port cross-section (hidden, circular port seen from side) -->
  <!-- Port centered at Y=20mm (sensor mid-depth), Z=23mm (mid-height) -->
  <!-- SVG center: x=520+20*4=600, y=248; show as hidden circle -->
  <circle cx="600" cy="248" r="20" class="hidden"/>

  <!-- M3 screw hole (one visible at Y=20mm) -->
  <circle cx="600" cy="332" r="5" class="screw-hole"/>

  <!-- Signal cable routing up -->
  <path d="M600,172 L600,135" class="cable"/>

  <!-- SIDE VIEW DIMENSIONS -->

  <!-- Bracket depth: 40mm -->
  <line x1="520" y1="355" x2="520" y2="365" class="dim-ext"/>
  <line x1="680" y1="355" x2="680" y2="365" class="dim-ext"/>
  <line x1="520" y1="362" x2="680" y2="362" class="dim-line"/>
  <text x="600" y="376" class="dim-text">40</text>

  <!-- Sensor depth: 30.5mm -->
  <line x1="539" y1="155" x2="539" y2="145" class="dim-ext"/>
  <line x1="661" y1="155" x2="661" y2="145" class="dim-ext"/>
  <line x1="539" y1="148" x2="661" y2="148" class="dim-line"/>
  <text x="600" y="143" class="dim-text">30.5</text>

  <!-- Bracket height: 45mm -->
  <line x1="695" y1="160" x2="710" y2="160" class="dim-ext"/>
  <line x1="695" y1="340" x2="710" y2="340" class="dim-ext"/>
  <line x1="705" y1="160" x2="705" y2="340" class="dim-line"/>
  <text x="720" y="254" class="dim-text" text-anchor="start">45</text>

  <!-- Wall thickness: 4.75mm -->
  <line x1="520" y1="388" x2="520" y2="398" class="dim-ext"/>
  <line x1="539" y1="388" x2="539" y2="398" class="dim-ext"/>
  <line x1="520" y1="395" x2="539" y2="395" class="dim-line"/>
  <text x="530" y="410" class="dim-text-sm">4.75</text>

  <!-- ============================================================ -->
  <!-- TOP VIEW (looking along -Z): X horizontal, Y vertical        -->
  <!-- Scale: 4 px/mm                                                -->
  <!-- Bracket: 70W x 40D = 280px x 160px                           -->
  <!-- Sensor: 63.5W x 30.5D = 254px x 122px                       -->
  <!-- Top view top-left at SVG (80, 480)                            -->
  <!--                                                               -->
  <!-- In top view Y increases downward in SVG.                      -->
  <!-- Bracket back wall at SVG y=480 (Y=0), front at y=640 (Y=40). -->
  <!--                                                               -->
  <!-- QC ports: cylindrical, axis along X. In top view (looking     -->
  <!-- along -Z), ports are rectangles extending left/right.         -->
  <!-- Port OD 10mm: rect 15mm long x 10mm wide (in Y).             -->
  <!-- Port center at Y=20mm (mid-depth), SVG y=480+80=560.         -->
  <!-- ============================================================ -->

  <text x="220" y="445" class="label" text-anchor="middle">TOP VIEW</text>
  <text x="220" y="460" class="note" text-anchor="middle">Looking along -Z | X horiz, Y vert</text>

  <!-- Bracket outline: 70W x 40D -->
  <rect x="80" y="480" width="280" height="160" class="bracket"/>

  <!-- Sensor body (hidden, below top clips): 63.5W x 30.5D -->
  <rect x="93" y="499" width="254" height="122" class="hidden"/>

  <!-- Top clip gap: open center between left and right lip clips -->
  <!-- Left clip covers x=80 to 80+53=133 (same as front view lip) -->
  <!-- Right clip covers x=307 to 360 -->
  <!-- Gap from 133 to 307 on near and far sides -->
  <rect x="133" y="480" width="174" height="4" fill="#f0f0f0" stroke="#999" stroke-width="0.5"/>
  <rect x="133" y="636" width="174" height="4" fill="#f0f0f0" stroke="#999" stroke-width="0.5"/>

  <!-- QC port left: rectangle extending beyond bracket -->
  <rect x="33" y="540" width="60" height="40" class="sensor-port"/>

  <!-- QC port right -->
  <rect x="347" y="540" width="60" height="40" class="sensor-port"/>

  <!-- M3 screw holes -->
  <circle cx="140" cy="560" r="5" class="screw-hole"/>
  <circle cx="300" cy="560" r="5" class="screw-hole"/>

  <!-- Tube routing clearance -->
  <rect x="5" y="525" width="28" height="70" class="tube-zone"/>
  <rect x="407" y="525" width="28" height="70" class="tube-zone"/>

  <!-- Centerline through ports -->
  <line x1="20" y1="560" x2="420" y2="560" class="centerline"/>

  <!-- TOP VIEW DIMENSIONS -->

  <!-- Bracket width: 70mm -->
  <line x1="80" y1="655" x2="80" y2="665" class="dim-ext"/>
  <line x1="360" y1="655" x2="360" y2="665" class="dim-ext"/>
  <line x1="80" y1="662" x2="360" y2="662" class="dim-line"/>
  <text x="220" y="676" class="dim-text">70</text>

  <!-- Bracket depth: 40mm -->
  <line x1="375" y1="480" x2="395" y2="480" class="dim-ext"/>
  <line x1="375" y1="640" x2="395" y2="640" class="dim-ext"/>
  <line x1="390" y1="480" x2="390" y2="640" class="dim-line"/>
  <text x="405" y="564" class="dim-text" text-anchor="start">40</text>

  <!-- QC port extension: ~12mm beyond bracket -->
  <line x1="33" y1="650" x2="33" y2="658" class="dim-ext"/>
  <line x1="80" y1="650" x2="80" y2="658" class="dim-ext"/>
  <line x1="33" y1="655" x2="80" y2="655" class="dim-line"/>
  <text x="56" y="652" class="dim-text-sm">~12</text>

  <!-- ============================================================ -->
  <!-- NOTES BLOCK                                                   -->
  <!-- ============================================================ -->
  <rect x="520" y="460" width="370" height="210" fill="#fafafa" stroke="#222" stroke-width="0.8"/>
  <text x="535" y="480" class="label">NOTES</text>
  <text x="535" y="498" class="note">1. Bracket is snap-fit clip/saddle around sensor body.</text>
  <text x="535" y="514" class="note">2. Two M3 through-holes in base plate for heat-set inserts</text>
  <text x="535" y="528" class="note">   in enclosure floor. Hole spacing: 40mm center-to-center.</text>
  <text x="535" y="544" class="note">3. Sensor: DIGITEN 1/4" quick-connect flow sensor.</text>
  <text x="535" y="560" class="note">4. QC ports face left/right (toward inlet/outlet bulkheads).</text>
  <text x="535" y="576" class="note">5. 1/4" hard tube clearance ~12mm on each side of bracket.</text>
  <text x="535" y="592" class="note">6. 3-wire signal cable (VCC, GND, signal) routes upward</text>
  <text x="535" y="606" class="note">   along back wall interior to electronics zone.</text>
  <text x="535" y="622" class="note">7. Green dashed = tube routing clearance zone.</text>
  <text x="535" y="638" class="note">8. Red dashed = signal cable route.</text>
  <text x="535" y="654" class="note">9. Bracket wall thickness: 3.25mm (sides), 4.75mm (front/back).</text>
</svg>