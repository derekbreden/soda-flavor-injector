<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 850" width="1100" height="850" font-family="Arial, Helvetica, sans-serif">
  <title>Dock Back Wall (Fitting Mount Wall) - Orthographic Drawing</title>
  <desc>
    Three-view orthographic projection of the dock back wall.
    Scale: 4 px/mm.
    Coordinate system: X=width (0-148mm), Y=depth (0-10mm), Z=height (0-84mm).
    Origin at front-bottom-left corner.
    Front view (looking along -Y): X horizontal, Z vertical.
    Side view (looking along -X): Y horizontal, Z vertical.
    Top view (looking along -Z): X horizontal, Y vertical.
    Tube stub holes: 2x2 grid, 40mm H x 28mm V c-c, centered on wall.
    Hole centers at X=54,94 Z=28,56 (mm).
  </desc>

  <style>
    .outline { fill: none; stroke: #000; stroke-width: 1.5; }
    .outline-thin { fill: none; stroke: #000; stroke-width: 0.75; }
    .hidden { fill: none; stroke: #000; stroke-width: 0.75; stroke-dasharray: 6,3; }
    .center { fill: none; stroke: #000; stroke-width: 0.4; stroke-dasharray: 12,3,3,3; }
    .dim { fill: none; stroke: #333; stroke-width: 0.6; }
    .ext { fill: none; stroke: #333; stroke-width: 0.4; }
    .dim-text { font-size: 10px; fill: #333; text-anchor: middle; }
    .dim-sm { font-size: 9px; fill: #333; text-anchor: middle; }
    .label { font-size: 10px; fill: #333; text-anchor: middle; }
    .viewlbl { font-size: 12px; font-weight: bold; fill: #000; text-anchor: middle; }
    .note { font-size: 9px; fill: #555; }
    .title-text { font-size: 15px; fill: #000; font-weight: bold; text-anchor: middle; }
    .subtitle { font-size: 10px; fill: #555; text-anchor: middle; }
    .arrow { fill: #333; stroke: none; }
  </style>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
  </defs>

  <!-- ============================================================ -->
  <!-- TITLE BLOCK                                                   -->
  <!-- ============================================================ -->
  <text x="550" y="24" class="title-text">Dock Back Wall (Fitting Mount Wall) - Engineering Drawing</text>
  <text x="550" y="40" class="subtitle">Material: PETG (3D printed) | Envelope: 148W x 10D x 84H mm | Scale: 4 px/mm</text>
  <line x1="30" y1="50" x2="1070" y2="50" stroke="#000" stroke-width="1"/>

  <!-- ============================================================ -->
  <!-- FRONT VIEW - Looking along -Y                                -->
  <!-- Horizontal axis = X (width 148mm), Vertical axis = Z (height 84mm) -->
  <!-- Scale 4 px/mm => 148mm = 592px, 84mm = 336px                -->
  <!-- Part bottom-left at SVG (60, 456), top-left at (60, 120)    -->
  <!-- SVG x = 60 + X*4                                             -->
  <!-- SVG y = 456 - Z*4                                            -->
  <!-- ============================================================ -->

  <g id="front-view">
    <text x="356" y="100" class="viewlbl">FRONT VIEW</text>
    <text x="356" y="112" class="note" text-anchor="middle">Looking along -Y (cartridge side) | Scale 4:1</text>

    <!-- Wall outline: 148mm wide x 84mm tall -->
    <rect x="60" y="120" width="592" height="336" class="outline"/>

    <!-- Tube stub through-holes: 7mm dia = 14px radius -->
    <!-- Grid centered on wall: X_center=74mm, Z_center=42mm -->
    <!-- Hole centers: (54,28), (94,28), (54,56), (94,56) mm -->
    <!-- SVG coords: -->
    <!-- (54,28) => x=60+54*4=276, y=456-28*4=344 -->
    <!-- (94,28) => x=60+94*4=436, y=456-28*4=344 -->
    <!-- (54,56) => x=60+54*4=276, y=456-56*4=232 -->
    <!-- (94,56) => x=60+94*4=436, y=456-56*4=232 -->

    <!-- Through-holes (7mm dia, visible on front face) -->
    <circle cx="276" cy="344" r="14" class="outline"/>
    <circle cx="436" cy="344" r="14" class="outline"/>
    <circle cx="276" cy="232" r="14" class="outline"/>
    <circle cx="436" cy="232" r="14" class="outline"/>

    <!-- Grommet counterbore pockets (11mm OD = 22px radius), hidden behind front face -->
    <circle cx="276" cy="344" r="22" class="hidden"/>
    <circle cx="436" cy="344" r="22" class="hidden"/>
    <circle cx="276" cy="232" r="22" class="hidden"/>
    <circle cx="436" cy="232" r="22" class="hidden"/>

    <!-- Tube stub OD shown as hidden (6.35mm = 12.7px radius, inside through-hole) -->
    <circle cx="276" cy="344" r="12.7" class="hidden"/>
    <circle cx="436" cy="344" r="12.7" class="hidden"/>
    <circle cx="276" cy="232" r="12.7" class="hidden"/>
    <circle cx="436" cy="232" r="12.7" class="hidden"/>

    <!-- Centerlines through holes -->
    <line x1="276" y1="110" x2="276" y2="466" class="center"/>
    <line x1="436" y1="110" x2="436" y2="466" class="center"/>
    <line x1="50" y1="344" x2="662" y2="344" class="center"/>
    <line x1="50" y1="232" x2="662" y2="232" class="center"/>

    <!-- ====== DIMENSIONS ====== -->

    <!-- Overall width: 148mm -->
    <line x1="60" y1="120" x2="60" y2="80" class="ext"/>
    <line x1="652" y1="120" x2="652" y2="80" class="ext"/>
    <line x1="60" y1="88" x2="652" y2="88" class="dim" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <text x="356" y="84" class="dim-text">148</text>

    <!-- Overall height: 84mm -->
    <line x1="652" y1="120" x2="700" y2="120" class="ext"/>
    <line x1="652" y1="456" x2="700" y2="456" class="ext"/>
    <line x1="692" y1="120" x2="692" y2="456" class="dim" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <text x="692" y="292" class="dim-text" transform="rotate(-90,692,292)">84</text>

    <!-- Horizontal c-c spacing: 40mm -->
    <line x1="276" y1="466" x2="276" y2="500" class="ext"/>
    <line x1="436" y1="466" x2="436" y2="500" class="ext"/>
    <line x1="276" y1="492" x2="436" y2="492" class="dim" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <text x="356" y="488" class="dim-text">40</text>

    <!-- Vertical c-c spacing: 28mm -->
    <line x1="662" y1="232" x2="730" y2="232" class="ext"/>
    <line x1="662" y1="344" x2="730" y2="344" class="ext"/>
    <line x1="722" y1="232" x2="722" y2="344" class="dim" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <text x="722" y="292" class="dim-text" transform="rotate(-90,722,292)">28</text>

    <!-- Left edge to left hole column: 54mm -->
    <line x1="60" y1="500" x2="60" y2="520" class="ext"/>
    <line x1="276" y1="500" x2="276" y2="520" class="ext"/>
    <line x1="60" y1="512" x2="276" y2="512" class="dim" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <text x="168" y="508" class="dim-text">54</text>

    <!-- Bottom edge to lower hole row: 28mm -->
    <line x1="730" y1="344" x2="762" y2="344" class="ext"/>
    <line x1="730" y1="456" x2="762" y2="456" class="ext"/>
    <line x1="754" y1="344" x2="754" y2="456" class="dim" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <text x="754" y="404" class="dim-text" transform="rotate(-90,754,404)">28</text>

    <!-- Hole diameter callout -->
    <line x1="286" y1="222" x2="320" y2="190" class="dim"/>
    <text x="322" y="188" class="dim-sm" text-anchor="start">4x &#x2300;7 THRU</text>
    <text x="322" y="199" class="dim-sm" text-anchor="start">&#x2300;11 c'bore x 2 deep (grommet)</text>

    <!-- Hole labels -->
    <text x="276" y="370" class="label">IN 1</text>
    <text x="436" y="370" class="label">IN 2</text>
    <text x="255" y="218" class="label">OUT 1</text>
    <text x="457" y="218" class="label">OUT 2</text>
  </g>

  <!-- ============================================================ -->
  <!-- SIDE VIEW - Looking along -X                                  -->
  <!-- Horizontal axis = Y (depth 10mm), Vertical axis = Z (height 84mm) -->
  <!-- Scale 4 px/mm => 10mm = 40px, 84mm = 336px                  -->
  <!-- Part bottom-left at SVG (800, 456), aligned vertically with front view -->
  <!-- SVG x = 800 + Y*4                                            -->
  <!-- SVG y = 456 - Z*4 (same vertical as front view)             -->
  <!-- ============================================================ -->

  <g id="side-view">
    <text x="820" y="100" class="viewlbl">SIDE VIEW</text>
    <text x="820" y="112" class="note" text-anchor="middle">Looking along -X | Scale 4:1</text>

    <!-- Wall outline: 10mm deep x 84mm tall -->
    <rect x="800" y="120" width="40" height="336" class="outline"/>

    <!-- Through-holes seen from side: cylindrical holes along Y axis appear as rectangles -->
    <!-- Two holes at Z=28 (lower pair), two at Z=56 (upper pair) -->
    <!-- In side view looking along -X, both holes at a given Z overlap -->
    <!-- Hole 7mm dia: rectangle height=28px, full wall depth width=40px -->
    <!-- Z=28 => y_center=344, rect top=330, Z=56 => y_center=232, rect top=218 -->
    <rect x="800" y="330" width="40" height="28" class="outline-thin"/>
    <rect x="800" y="218" width="40" height="28" class="outline-thin"/>

    <!-- Grommet counterbore on cartridge face (Y=0 side, left in this view) -->
    <!-- 11mm OD = 44px height, 2mm deep = 8px width from x=800 -->
    <!-- Z=28: y=344-22=322, Z=56: y=232-22=210 -->
    <rect x="800" y="322" width="8" height="44" class="outline-thin"/>
    <rect x="800" y="210" width="8" height="44" class="outline-thin"/>

    <!-- Tube stubs protruding from both faces -->
    <!-- 6.35mm OD = 25.4px height, centered on hole Z -->
    <!-- Front (cartridge) side: 30mm = 120px protrusion left of x=800 -->
    <!-- Z=28: stub top=331, bottom=357 (6.35mm OD = ~26px centered on 344) -->
    <line x1="680" y1="331" x2="800" y2="331" class="outline-thin"/>
    <line x1="680" y1="357" x2="800" y2="357" class="outline-thin"/>
    <line x1="680" y1="331" x2="680" y2="357" class="outline-thin"/>

    <!-- Z=56 front stub -->
    <line x1="680" y1="219" x2="800" y2="219" class="outline-thin"/>
    <line x1="680" y1="245" x2="800" y2="245" class="outline-thin"/>
    <line x1="680" y1="219" x2="680" y2="245" class="outline-thin"/>

    <!-- Rear side: 30mm = 120px protrusion right of x=840 -->
    <!-- Z=28 -->
    <line x1="840" y1="331" x2="960" y2="331" class="outline-thin"/>
    <line x1="840" y1="357" x2="960" y2="357" class="outline-thin"/>
    <line x1="960" y1="331" x2="960" y2="357" class="outline-thin"/>

    <!-- Z=56 rear stub -->
    <line x1="840" y1="219" x2="960" y2="219" class="outline-thin"/>
    <line x1="840" y1="245" x2="960" y2="245" class="outline-thin"/>
    <line x1="960" y1="219" x2="960" y2="245" class="outline-thin"/>

    <!-- Centerlines for hole rows -->
    <line x1="670" y1="344" x2="970" y2="344" class="center"/>
    <line x1="670" y1="232" x2="970" y2="232" class="center"/>

    <!-- ====== DIMENSIONS ====== -->

    <!-- Wall depth: 10mm -->
    <line x1="800" y1="120" x2="800" y2="80" class="ext"/>
    <line x1="840" y1="120" x2="840" y2="80" class="ext"/>
    <line x1="800" y1="88" x2="840" y2="88" class="dim" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <text x="820" y="84" class="dim-text">10</text>

    <!-- Counterbore depth: 2mm -->
    <line x1="800" y1="206" x2="800" y2="192" class="ext"/>
    <line x1="808" y1="206" x2="808" y2="192" class="ext"/>
    <line x1="800" y1="196" x2="808" y2="196" class="dim" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <text x="780" y="188" class="dim-sm" text-anchor="end">2 deep (c'bore)</text>

    <!-- Front stub protrusion: 30mm -->
    <line x1="680" y1="357" x2="680" y2="380" class="ext"/>
    <line x1="800" y1="357" x2="800" y2="380" class="ext"/>
    <line x1="680" y1="374" x2="800" y2="374" class="dim" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <text x="740" y="370" class="dim-text">30</text>

    <!-- Rear stub protrusion: 30mm -->
    <line x1="840" y1="357" x2="840" y2="380" class="ext"/>
    <line x1="960" y1="357" x2="960" y2="380" class="ext"/>
    <line x1="840" y1="374" x2="960" y2="374" class="dim" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <text x="900" y="370" class="dim-text">30</text>

    <!-- Tube stub callout -->
    <line x1="680" y1="340" x2="660" y2="310" class="dim"/>
    <text x="658" y="308" class="dim-sm" text-anchor="end">1/4" OD tube stub</text>
    <text x="658" y="319" class="dim-sm" text-anchor="end">(6.35mm nylon)</text>

    <!-- Grommet callout -->
    <line x1="804" y1="256" x2="870" y2="268" class="dim"/>
    <text x="872" y="266" class="dim-sm" text-anchor="start">Rubber grommet</text>
    <text x="872" y="277" class="dim-sm" text-anchor="start">7mm ID / 11mm OD</text>
  </g>

  <!-- ============================================================ -->
  <!-- TOP VIEW - Looking along -Z                                   -->
  <!-- Horizontal axis = X (width 148mm), Vertical axis = Y (depth 10mm) -->
  <!-- Scale 4 px/mm => 148mm = 592px, 10mm = 40px                 -->
  <!-- Aligned with front view horizontally                         -->
  <!-- SVG x = 60 + X*4 (same as front view)                       -->
  <!-- SVG y = 556 + Y*4 (Y=0 at top, cartridge side)              -->
  <!-- ============================================================ -->

  <g id="top-view">
    <text x="356" y="536" class="viewlbl">TOP VIEW</text>
    <text x="356" y="548" class="note" text-anchor="middle">Looking along -Z (from above) | Scale 4:1</text>

    <!-- Wall outline: 148mm wide x 10mm deep -->
    <rect x="60" y="560" width="592" height="40" class="outline"/>

    <!-- Through-holes seen from top: 7mm dia holes along Z-axis appear as rectangles -->
    <!-- At X=54: two holes (Z=28 and Z=56) overlap in top view as one rectangle -->
    <!-- 7mm wide = 28px, full depth = 40px -->
    <!-- X=54 => x=276, rect left=276-14=262. X=94 => x=436, rect left=436-14=422 -->
    <rect x="262" y="560" width="28" height="40" class="outline-thin"/>
    <rect x="422" y="560" width="28" height="40" class="outline-thin"/>

    <!-- Grommet counterbore on front face (Y=0, top in this view at y=560) -->
    <!-- 11mm wide = 44px, 2mm deep = 8px -->
    <rect x="254" y="560" width="44" height="8" class="outline-thin"/>
    <rect x="414" y="560" width="44" height="8" class="outline-thin"/>

    <!-- Tube stubs protruding from front face (above wall in top view) -->
    <!-- 6.35mm OD = 26px wide, 30mm = 120px long -->
    <!-- X=54: x=263, from y=440 to y=560 -->
    <rect x="263" y="440" width="26" height="120" class="outline-thin"/>
    <rect x="423" y="440" width="26" height="120" class="outline-thin"/>

    <!-- Tube stubs protruding from rear face -->
    <rect x="263" y="600" width="26" height="120" class="outline-thin"/>
    <rect x="423" y="600" width="26" height="120" class="outline-thin"/>

    <!-- Centerlines -->
    <line x1="276" y1="430" x2="276" y2="730" class="center"/>
    <line x1="436" y1="430" x2="436" y2="730" class="center"/>
  </g>

  <!-- ============================================================ -->
  <!-- NOTES BLOCK                                                   -->
  <!-- ============================================================ -->
  <g id="notes">
    <text x="60" y="760" class="note" font-weight="bold" font-size="11">NOTES:</text>
    <text x="60" y="775" class="note">1. All dimensions in mm. Scale 4 px/mm.</text>
    <text x="60" y="788" class="note">2. 4x through-holes: 7.0mm dia for 1/4" OD (6.35mm) tube stub pass-through, 0.65mm clearance.</text>
    <text x="60" y="801" class="note">3. Counterbore pockets: 11mm dia x 2mm deep on cartridge face (Y=0) for rubber grommets (7mm ID / 11mm OD).</text>
    <text x="60" y="814" class="note">4. Tube stub grid: 2x2, 40mm horizontal x 28mm vertical c-c, centered on wall face.</text>
    <text x="60" y="827" class="note">5. Lower pair = inlet tubes, upper pair = outlet tubes. Stub protrusion ~30mm each side.</text>
    <text x="60" y="840" class="note">6. Wall at Y=130-140 in enclosure coords. Pogo pin mount area on top face (Z=80-84).</text>
  </g>

</svg>
