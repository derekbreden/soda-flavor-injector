<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 780" width="1050" height="780" font-family="Arial, Helvetica, sans-serif">
  <title>Valve Rack Assembly — Orthographic Drawing</title>
  <desc>
    Three-view orthographic projection of the 10-valve rack (5x2 grid).
    Scale: 3.5 px/mm. All caliper-verified dimensions in mm.
    Front view (looking along -Y): X horizontal, Z vertical.
    Side view (looking along -X): Y horizontal, Z vertical.
    Top view (looking along -Z): X horizontal, Y vertical.
  </desc>

  <style>
    .outline { fill: none; stroke: #000; stroke-width: 1.5; }
    .outline-thin { fill: none; stroke: #000; stroke-width: 0.75; }
    .hidden { fill: none; stroke: #000; stroke-width: 0.75; stroke-dasharray: 6,3; }
    .center { fill: none; stroke: #000; stroke-width: 0.4; stroke-dasharray: 12,3,3,3; }
    .dim { fill: none; stroke: #333; stroke-width: 0.6; }
    .dim-text { font-size: 10px; fill: #333; text-anchor: middle; }
    .dim-sm { font-size: 9px; fill: #333; text-anchor: middle; }
    .label { font-size: 12px; fill: #000; font-weight: bold; text-anchor: middle; }
    .note { font-size: 9px; fill: #555; }
    .title-text { font-size: 15px; fill: #000; font-weight: bold; text-anchor: middle; }
    .subtitle { font-size: 10px; fill: #555; text-anchor: middle; }
    .arrow { fill: #333; stroke: none; }
    .wht { fill: #f0f0f0; stroke: #000; stroke-width: 1.2; }
    .mtl { fill: #c8c8c8; stroke: #000; stroke-width: 1.2; }
    .spd { fill: #888; stroke: #000; stroke-width: 0.8; }
    .rack { fill: none; stroke: #000; stroke-width: 1.8; stroke-dasharray: 8,4; }
    .port { fill: #fff; stroke: #000; stroke-width: 0.8; }
    .port-hole { fill: #000; stroke: none; }
  </style>

  <defs>
    <marker id="aL" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" class="arrow"/>
    </marker>
    <marker id="aR" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6 Z" class="arrow"/>
    </marker>
  </defs>

  <!-- ============ TITLE ============ -->
  <text x="525" y="24" class="title-text">Valve Rack Assembly — 10x Beduan 2-Way NC Solenoid (5W x 2H)</text>
  <text x="525" y="40" class="subtitle">Scale 3.5 px/mm | Dimensions in mm (caliper-verified) | 37mm valve pitch c-c</text>

  <!-- ================================================================ -->
  <!-- FRONT VIEW  (looking along -Y)                                    -->
  <!-- H-axis = X (width 181mm = 633.5px)  V-axis = Z (height 116mm = 406px) -->
  <!-- SVG y=0 => Z=116mm (rack top),  y=406 => Z=0 (rack bottom)       -->
  <!-- ================================================================ -->
  <!-- px/mm = 3.5 -->
  <!-- Valve columns left-edge X (mm): 0, 37, 74, 111, 148 -->
  <!-- Valve columns left-edge px:     0, 129.5, 259, 388.5, 518 -->
  <!-- White body: 32.71W x 19.4H mm = 114.5 x 67.9 px -->
  <!-- Metal coil: 31.41W x 36.63H mm = 109.9 x 128.2 px -->
  <!-- Metal offset from white left edge: ~0.65mm = 2.3px -->
  <!-- Row 1 (bottom): Z 0-56mm => SVG y 406 down to 210 -->
  <!--   white: y=338.1..406 | metal: y=209.8..338.1 | spade: y=196..209.8 -->
  <!-- Row 2 (top): Z 60-116mm => SVG y 196 down to 0 -->
  <!--   white: y=128.1..196 | metal: y=0..128.1 | spade extends above rack -->

  <g id="front-view" transform="translate(24,62)">
    <text x="316" y="-10" class="label">FRONT VIEW (looking along -Y)</text>

    <!-- Rack envelope -->
    <rect x="0" y="0" width="633.5" height="406" class="rack"/>

    <!-- === ROW 1 (bottom, Z=0..56) === -->
    <!-- White body: Z 0..19.4 => y 338.1..406 (67.9px) -->
    <!-- Metal housing: Z 19.4..52 => y 224..338.1 (114.1px) -->
    <!-- Spade connectors: Z 52..56 => y 210..224 (14px) -->
    <!-- Col 0 --> <rect x="0"     y="338.1" width="114.5" height="67.9" class="wht"/>
                   <rect x="2.3"   y="224"   width="109.9" height="114.1" class="mtl"/>
                   <rect x="40"    y="210"   width="10" height="14" class="spd"/>
                   <rect x="62"    y="210"   width="10" height="14" class="spd"/>
    <!-- Col 1 --> <rect x="129.5" y="338.1" width="114.5" height="67.9" class="wht"/>
                   <rect x="131.8" y="224"   width="109.9" height="114.1" class="mtl"/>
                   <rect x="169.5" y="210"   width="10" height="14" class="spd"/>
                   <rect x="191.5" y="210"   width="10" height="14" class="spd"/>
    <!-- Col 2 --> <rect x="259"   y="338.1" width="114.5" height="67.9" class="wht"/>
                   <rect x="261.3" y="224"   width="109.9" height="114.1" class="mtl"/>
                   <rect x="299"   y="210"   width="10" height="14" class="spd"/>
                   <rect x="321"   y="210"   width="10" height="14" class="spd"/>
    <!-- Col 3 --> <rect x="388.5" y="338.1" width="114.5" height="67.9" class="wht"/>
                   <rect x="390.8" y="224"   width="109.9" height="114.1" class="mtl"/>
                   <rect x="428.5" y="210"   width="10" height="14" class="spd"/>
                   <rect x="450.5" y="210"   width="10" height="14" class="spd"/>
    <!-- Col 4 --> <rect x="518"   y="338.1" width="114.5" height="67.9" class="wht"/>
                   <rect x="520.3" y="224"   width="109.9" height="114.1" class="mtl"/>
                   <rect x="558"   y="210"   width="10" height="14" class="spd"/>
                   <rect x="580"   y="210"   width="10" height="14" class="spd"/>

    <!-- === ROW 2 (top, Z=60..116) === -->
    <!-- White body: Z 60..79.4 => y 128.1..196 (67.9px) -->
    <!-- Metal housing: Z 79.4..112 => y 14..128.1 (114.1px) -->
    <!-- Spade connectors: Z 112..116 => y 0..14 (14px) -->
    <!-- Col 0 --> <rect x="0"     y="128.1" width="114.5" height="67.9" class="wht"/>
                   <rect x="2.3"   y="14"    width="109.9" height="114.1" class="mtl"/>
                   <rect x="40"    y="0"     width="10" height="14" class="spd"/>
                   <rect x="62"    y="0"     width="10" height="14" class="spd"/>
    <!-- Col 1 --> <rect x="129.5" y="128.1" width="114.5" height="67.9" class="wht"/>
                   <rect x="131.8" y="14"    width="109.9" height="114.1" class="mtl"/>
                   <rect x="169.5" y="0"     width="10" height="14" class="spd"/>
                   <rect x="191.5" y="0"     width="10" height="14" class="spd"/>
    <!-- Col 2 --> <rect x="259"   y="128.1" width="114.5" height="67.9" class="wht"/>
                   <rect x="261.3" y="14"    width="109.9" height="114.1" class="mtl"/>
                   <rect x="299"   y="0"     width="10" height="14" class="spd"/>
                   <rect x="321"   y="0"     width="10" height="14" class="spd"/>
    <!-- Col 3 --> <rect x="388.5" y="128.1" width="114.5" height="67.9" class="wht"/>
                   <rect x="390.8" y="14"    width="109.9" height="114.1" class="mtl"/>
                   <rect x="428.5" y="0"     width="10" height="14" class="spd"/>
                   <rect x="450.5" y="0"     width="10" height="14" class="spd"/>
    <!-- Col 4 --> <rect x="518"   y="128.1" width="114.5" height="67.9" class="wht"/>
                   <rect x="520.3" y="14"    width="109.9" height="114.1" class="mtl"/>
                   <rect x="558"   y="0"     width="10" height="14" class="spd"/>
                   <rect x="580"   y="0"     width="10" height="14" class="spd"/>

    <!-- Center-lines for columns 0 and 1 -->
    <line x1="57.2" y1="-22" x2="57.2"  y2="415" class="center"/>
    <line x1="186.7" y1="-22" x2="186.7" y2="415" class="center"/>

    <!-- Dimensions -->
    <!-- Rack width 181mm -->
    <line x1="0" y1="425" x2="0" y2="438" class="dim"/>
    <line x1="633.5" y1="425" x2="633.5" y2="438" class="dim"/>
    <line x1="0" y1="433" x2="633.5" y2="433" class="dim" marker-start="url(#aL)" marker-end="url(#aR)"/>
    <text x="316" y="448" class="dim-text">181mm (rack width, 5 valves)</text>

    <!-- Valve pitch 37mm between col 0 and 1 centers -->
    <line x1="57.2" y1="455" x2="57.2" y2="468" class="dim"/>
    <line x1="186.7" y1="455" x2="186.7" y2="468" class="dim"/>
    <line x1="57.2" y1="463" x2="186.7" y2="463" class="dim" marker-start="url(#aL)" marker-end="url(#aR)"/>
    <text x="122" y="478" class="dim-text">37mm pitch</text>

    <!-- Body width 32.71mm (shown as inset annotation on col 4) -->
    <text x="575" y="395" class="dim-sm" fill="#555">32.71</text>

    <!-- Rack height 116mm (right side) -->
    <line x1="648" y1="0" x2="662" y2="0" class="dim"/>
    <line x1="648" y1="406" x2="662" y2="406" class="dim"/>
    <line x1="655" y1="0" x2="655" y2="406" class="dim" marker-start="url(#aL)" marker-end="url(#aR)"/>
    <text x="672" y="207" class="dim-text" transform="rotate(90,672,207)">116mm (rack H)</text>

    <!-- Valve total height 56mm (row 1, right) -->
    <line x1="695" y1="210" x2="708" y2="210" class="dim"/>
    <line x1="695" y1="406" x2="708" y2="406" class="dim"/>
    <line x1="702" y1="210" x2="702" y2="406" class="dim" marker-start="url(#aL)" marker-end="url(#aR)"/>
    <text x="718" y="312" class="dim-text" transform="rotate(90,718,312)">56mm valve H</text>

    <!-- White body height 19.4mm (row 1, right) -->
    <line x1="735" y1="338.1" x2="748" y2="338.1" class="dim"/>
    <line x1="735" y1="406"   x2="748" y2="406" class="dim"/>
    <line x1="742" y1="338.1" x2="742" y2="406" class="dim" marker-start="url(#aL)" marker-end="url(#aR)"/>
    <text x="758" y="376" class="dim-sm" transform="rotate(90,758,376)">19.4 body</text>

    <!-- 4mm gap annotation -->
    <line x1="648" y1="196" x2="662" y2="196" class="dim"/>
    <line x1="648" y1="210" x2="662" y2="210" class="dim"/>
    <line x1="655" y1="196" x2="655" y2="210" class="dim" marker-start="url(#aL)" marker-end="url(#aR)"/>
    <text x="640" y="186" class="dim-sm">4mm gap</text>
  </g>

  <!-- ================================================================ -->
  <!-- SIDE VIEW  (looking along -X)                                     -->
  <!-- H-axis = Y (depth 55mm = 192.5px)  V-axis = Z (height 116mm = 406px) -->
  <!-- SVG x=0 => Y=0 (front),  x=192.5 => Y=55 (rear)                 -->
  <!-- SVG y=0 => Z=116 (top),  y=406 => Z=0 (bottom)                   -->
  <!-- ================================================================ -->
  <!-- All 5 valves in a column overlap perfectly, draw one L profile -->
  <!-- White body: Y 2.08..52.92 (centered in 55mm) = px 7.3..185.2  -->
  <!-- Metal coil at rear end. Coil depth ~22mm => Y 30.9..52.9 = px 108.2..185.2 -->

  <g id="side-view" transform="translate(810,62)">
    <text x="96" y="-10" class="label">SIDE VIEW (-X)</text>

    <!-- Rack envelope -->
    <rect x="0" y="0" width="192.5" height="406" class="rack"/>

    <!-- === ROW 1 (bottom, Z=0..56) === -->
    <!-- White body: Z 0..19.4 => y 338.1..406 -->
    <rect x="7.3" y="338.1" width="177.9" height="67.9" class="wht"/>
    <!-- Metal coil housing (rear end): Z 19.4..52 => y 224..338.1 -->
    <rect x="108.2" y="224" width="77" height="114.1" class="mtl"/>
    <!-- Spade connectors: Z 52..56 => y 210..224 -->
    <rect x="124" y="210" width="8" height="14" class="spd"/>
    <rect x="156" y="210" width="8" height="14" class="spd"/>
    <!-- Tube port stubs (front and rear faces of white body) -->
    <circle cx="7.3"   cy="372" r="5.5" class="port"/>
    <circle cx="7.3"   cy="372" r="1.8" class="port-hole"/>
    <circle cx="185.2" cy="372" r="5.5" class="port"/>
    <circle cx="185.2" cy="372" r="1.8" class="port-hole"/>

    <!-- === ROW 2 (top, Z=60..116) === -->
    <!-- White body: Z 60..79.4 => y 128.1..196 -->
    <rect x="7.3" y="128.1" width="177.9" height="67.9" class="wht"/>
    <!-- Metal housing: Z 79.4..112 => y 14..128.1 -->
    <rect x="108.2" y="14" width="77" height="114.1" class="mtl"/>
    <!-- Spade connectors: Z 112..116 => y 0..14 -->
    <rect x="124" y="0" width="8" height="14" class="spd"/>
    <rect x="156" y="0" width="8" height="14" class="spd"/>
    <circle cx="7.3"   cy="162" r="5.5" class="port"/>
    <circle cx="7.3"   cy="162" r="1.8" class="port-hole"/>
    <circle cx="185.2" cy="162" r="5.5" class="port"/>
    <circle cx="185.2" cy="162" r="1.8" class="port-hole"/>

    <!-- L-shape labels -->
    <text x="55" y="380" class="note" text-anchor="middle" font-size="8px">white body</text>
    <text x="147" y="280" class="note" text-anchor="middle" font-size="8px">metal coil</text>

    <!-- Dimensions -->
    <!-- Rack depth 55mm -->
    <line x1="0" y1="425" x2="0" y2="438" class="dim"/>
    <line x1="192.5" y1="425" x2="192.5" y2="438" class="dim"/>
    <line x1="0" y1="433" x2="192.5" y2="433" class="dim" marker-start="url(#aL)" marker-end="url(#aR)"/>
    <text x="96" y="448" class="dim-text">55mm (rack depth)</text>

    <!-- Body depth 50.84mm -->
    <line x1="7.3" y1="455" x2="7.3" y2="468" class="dim"/>
    <line x1="185.2" y1="455" x2="185.2" y2="468" class="dim"/>
    <line x1="7.3" y1="463" x2="185.2" y2="463" class="dim" marker-start="url(#aL)" marker-end="url(#aR)"/>
    <text x="96" y="478" class="dim-text">50.84mm body depth</text>

    <!-- Metal coil + spade height 36.63mm (row 1, right side) -->
    <line x1="200" y1="210" x2="213" y2="210" class="dim"/>
    <line x1="200" y1="338.1" x2="213" y2="338.1" class="dim"/>
    <line x1="207" y1="210" x2="207" y2="338.1" class="dim" marker-start="url(#aL)" marker-end="url(#aR)"/>
    <text x="222" y="278" class="dim-sm" transform="rotate(90,222,278)">36.63 coil+spade</text>
  </g>

  <!-- ================================================================ -->
  <!-- TOP VIEW  (looking along -Z, downward)                           -->
  <!-- H-axis = X (width 181mm = 633.5px)  V-axis = Y (depth 55mm = 192.5px) -->
  <!-- SVG x=0 => X=0 (left),  y=0 => Y=0 (front)                      -->
  <!-- Row 2 (higher Z) fully occludes row 1 — draw one set of 5 valves -->
  <!-- White body: full depth 50.84mm in Y. Metal coil at rear ~22mm depth. -->
  <!-- ================================================================ -->

  <g id="top-view" transform="translate(24,565)">
    <text x="316" y="-10" class="label">TOP VIEW (looking along -Z)</text>

    <!-- Rack envelope -->
    <rect x="0" y="0" width="633.5" height="192.5" class="rack"/>

    <!-- Col 0 -->
    <rect x="0"     y="7.3"   width="114.5" height="177.9" class="wht"/>
    <rect x="2.3"   y="108.2" width="109.9" height="77"    class="mtl"/>
    <rect x="38"    y="128"   width="6" height="10" class="spd"/>
    <rect x="68"    y="128"   width="6" height="10" class="spd"/>
    <circle cx="57.2" cy="50" r="12" class="outline-thin" fill="none"/>

    <!-- Col 1 -->
    <rect x="129.5" y="7.3"   width="114.5" height="177.9" class="wht"/>
    <rect x="131.8" y="108.2" width="109.9" height="77"    class="mtl"/>
    <rect x="167.5" y="128"   width="6" height="10" class="spd"/>
    <rect x="197.5" y="128"   width="6" height="10" class="spd"/>
    <circle cx="186.7" cy="50" r="12" class="outline-thin" fill="none"/>

    <!-- Col 2 -->
    <rect x="259"   y="7.3"   width="114.5" height="177.9" class="wht"/>
    <rect x="261.3" y="108.2" width="109.9" height="77"    class="mtl"/>
    <rect x="297"   y="128"   width="6" height="10" class="spd"/>
    <rect x="327"   y="128"   width="6" height="10" class="spd"/>
    <circle cx="316.2" cy="50" r="12" class="outline-thin" fill="none"/>

    <!-- Col 3 -->
    <rect x="388.5" y="7.3"   width="114.5" height="177.9" class="wht"/>
    <rect x="390.8" y="108.2" width="109.9" height="77"    class="mtl"/>
    <rect x="426.5" y="128"   width="6" height="10" class="spd"/>
    <rect x="456.5" y="128"   width="6" height="10" class="spd"/>
    <circle cx="445.7" cy="50" r="12" class="outline-thin" fill="none"/>

    <!-- Col 4 -->
    <rect x="518"   y="7.3"   width="114.5" height="177.9" class="wht"/>
    <rect x="520.3" y="108.2" width="109.9" height="77"    class="mtl"/>
    <rect x="556"   y="128"   width="6" height="10" class="spd"/>
    <rect x="586"   y="128"   width="6" height="10" class="spd"/>
    <circle cx="575.2" cy="50" r="12" class="outline-thin" fill="none"/>

    <!-- Center-lines cols 0,1 -->
    <line x1="57.2"  y1="-5" x2="57.2"  y2="198" class="center"/>
    <line x1="186.7" y1="-5" x2="186.7" y2="198" class="center"/>

    <!-- Orientation note -->
    <text x="316" y="215" class="note" text-anchor="middle" font-style="italic" font-size="8px">front (Y=0, ports) at top; rear (coils) at bottom</text>

    <!-- Depth dimension (right side) -->
    <line x1="648" y1="0"     x2="662" y2="0" class="dim"/>
    <line x1="648" y1="192.5" x2="662" y2="192.5" class="dim"/>
    <line x1="655" y1="0" x2="655" y2="192.5" class="dim" marker-start="url(#aL)" marker-end="url(#aR)"/>
    <text x="672" y="100" class="dim-text" transform="rotate(90,672,100)">55mm</text>
  </g>

  <!-- ================================================================ -->
  <!-- NOTES BLOCK                                                       -->
  <!-- ================================================================ -->
  <g id="notes" transform="translate(810,565)">
    <text x="0" y="0" class="label" text-anchor="start">NOTES</text>
    <text x="0" y="16" class="note">1. 10x Beduan 2-way NC solenoid (B07NWCQJK9)</text>
    <text x="0" y="30" class="note">2. 5-wide x 2-high grid, 37mm pitch (X)</text>
    <text x="0" y="44" class="note">3. 4mm gap between rows (Z direction)</text>
    <text x="0" y="58" class="note">4. L-shaped valve: horizontal white body</text>
    <text x="0" y="70" class="note">   + vertical metal coil (rear end)</text>
    <text x="0" y="84" class="note">5. No mounting features on valve body</text>
    <text x="0" y="98" class="note">6. Cradle: saddle + snap-over clips</text>
    <text x="0" y="112" class="note">7. QC tube ports along Y axis</text>
    <text x="0" y="126" class="note">8. Spade connectors at Z-top</text>
    <text x="0" y="148" class="note" font-weight="bold">Caliper-verified (mm):</text>
    <text x="0" y="162" class="note">  Body W 32.71 | D 50.84 | H ~19.4</text>
    <text x="0" y="176" class="note">  Coil W 31.41 | Coil+spade H 36.63</text>
    <text x="0" y="190" class="note">  Total H 56.00 | Pitch 37 c-c</text>
  </g>

</svg>