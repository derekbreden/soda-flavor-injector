<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 640" width="700" height="640"
     font-family="system-ui, -apple-system, sans-serif">

  <!-- Background -->
  <rect width="700" height="640" fill="#0d1117"/>

  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" fill="#e6edf3" font-size="17" font-weight="bold">
    2L Bags at 35° — Rigid Rectangle vs Actual Bag Shape
  </text>
  <text x="350" y="50" text-anchor="middle" fill="#7d8590" font-size="12">
    The bag tapers from ~2mm at the sealed end to ~80mm at center to ~30mm at the cap.
  </text>
  <text x="350" y="66" text-anchor="middle" fill="#7d8590" font-size="12">
    It has NONE of the 4 corners of the rigid rectangle. This changes everything.
  </text>

  <!-- Enclosure interior (292 × 392) -->
  <rect x="80" y="100" width="292" height="392" fill="rgba(48,54,61,0.3)"
        stroke="#484f58" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="80" y="95" fill="#7d8590" font-size="10" text-anchor="middle">FRONT</text>
  <text x="372" y="95" fill="#7d8590" font-size="10" text-anchor="middle">BACK</text>
  <text x="66" y="105" fill="#7d8590" font-size="9" text-anchor="end">TOP</text>
  <text x="66" y="495" fill="#7d8590" font-size="9" text-anchor="end">FLOOR</text>

  <!-- ══════ Rigid body rectangle (ghost) ══════ -->
  <!-- P0(125.9,100) P1(412.6,300.8) P2(366.7,366.3) P3(80,165.5) -->
  <polygon points="125.9,100 412.6,300.8 366.7,366.3 80,165.5"
           fill="rgba(248,81,73,0.07)" stroke="rgba(248,81,73,0.3)" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Label the rigid body corners that DON'T EXIST -->
  <circle cx="125.9" cy="100" r="4" fill="none" stroke="rgba(248,81,73,0.6)" stroke-width="1.5"/>
  <line x1="129" y1="97" x2="180" y2="80" stroke="rgba(248,81,73,0.4)" stroke-width="0.5"/>
  <text x="182" y="77" fill="rgba(248,81,73,0.7)" font-size="10">
    ✗ This corner doesn't exist
  </text>
  <text x="182" y="89" fill="rgba(248,81,73,0.5)" font-size="9">
    (bag is ~2mm here, not 80mm)
  </text>

  <circle cx="80" cy="165.5" r="4" fill="none" stroke="rgba(248,81,73,0.6)" stroke-width="1.5"/>
  <line x1="77" y1="168" x2="30" y2="200" stroke="rgba(248,81,73,0.4)" stroke-width="0.5"/>
  <text x="28" y="198" fill="rgba(248,81,73,0.7)" font-size="10" text-anchor="end">
    ✗ Doesn't exist
  </text>
  <text x="28" y="210" fill="rgba(248,81,73,0.5)" font-size="9" text-anchor="end">
    (bag is flat here)
  </text>

  <circle cx="412.6" cy="300.8" r="4" fill="none" stroke="rgba(248,81,73,0.6)" stroke-width="1.5"/>
  <circle cx="366.7" cy="366.3" r="4" fill="none" stroke="rgba(248,81,73,0.6)" stroke-width="1.5"/>

  <!-- ══════ Realistic bag shape (solid blue) ══════ -->
  <!-- Upper surface: sealed end (thin) → middle (thick) → connector (medium) -->
  <!-- Lower surface: reversed -->
  <!-- Profile: T(s) = 2mm at s=0, peaks at 80mm around s=175, drops to 30mm at s=350 -->
  <polygon points="
    80.6,109.2
    108.0,122.3
    137.8,132.1
    177.7,144.9
    215.4,160.8
    246.4,177.6
    274.4,198.6
    304.3,225.5
    332.0,255.8
    353.0,277.9
    367.7,291.9
    375.3,298.5
    358.1,323.1
    349.3,318.1
    331.2,309.1
    303.2,296.8
    265.3,281.3
    229.6,262.4
    200.4,243.2
    174.0,219.8
    146.1,189.9
    120.6,156.7
    101.2,132.1
    79.4,110.8"
           fill="rgba(56,139,253,0.25)" stroke="#388bfd" stroke-width="2"/>

  <!-- Sealed end label -->
  <line x1="80" y1="110" x2="52" y2="124" stroke="#388bfd" stroke-width="0.7"/>
  <text x="50" y="130" fill="#388bfd" font-size="10" text-anchor="end">~2mm thick</text>

  <!-- Connector end label -->
  <line x1="367" y1="310" x2="400" y2="340" stroke="#388bfd" stroke-width="0.7"/>
  <text x="402" y="338" fill="#388bfd" font-size="10">~30mm (cap width)</text>

  <!-- Widest point label -->
  <line x1="246" y1="178" x2="246" y2="240" stroke="rgba(56,139,253,0.3)" stroke-width="0.5" stroke-dasharray="2,3"/>
  <line x1="200" y1="243" x2="200" y2="240" stroke="rgba(56,139,253,0.3)" stroke-width="0" />
  <text x="233" y="254" fill="rgba(56,139,253,0.5)" font-size="9" text-anchor="middle">80mm max</text>
  <text x="233" y="265" fill="rgba(56,139,253,0.5)" font-size="9" text-anchor="middle">(center of bag)</text>

  <!-- Angle indicator -->
  <line x1="80" y1="110" x2="150" y2="110" stroke="#7d8590" stroke-width="0.5" stroke-dasharray="3,3"/>
  <path d="M 130,110 A 50,50 0 0,1 121,138.7" fill="none" stroke="#e6edf3" stroke-width="1"/>
  <text x="142" y="134" fill="#e6edf3" font-size="12">35°</text>

  <!-- ══════ The key comparison ══════ -->

  <!-- Back wall reference line extended down -->
  <line x1="372" y1="492" x2="372" y2="590" stroke="rgba(127,133,144,0.3)" stroke-width="0.5"/>

  <!-- Projection lines for dimensions -->
  <line x1="80" y1="492" x2="80" y2="530" stroke="rgba(56,139,253,0.15)" stroke-width="0.5"/>
  <line x1="375.3" y1="298" x2="375.3" y2="530" stroke="rgba(56,139,253,0.15)" stroke-width="0.5" stroke-dasharray="2,3"/>
  <line x1="412.6" y1="300" x2="412.6" y2="555" stroke="rgba(248,81,73,0.1)" stroke-width="0.5" stroke-dasharray="2,3"/>

  <!-- Actual bag depth: ~296mm (blue, solid) -->
  <line x1="80" y1="523" x2="375.3" y2="523" stroke="#388bfd" stroke-width="2"/>
  <line x1="80" y1="518" x2="80" y2="528" stroke="#388bfd" stroke-width="1"/>
  <line x1="375.3" y1="518" x2="375.3" y2="528" stroke="#388bfd" stroke-width="1"/>
  <text x="227" y="520" text-anchor="middle" fill="#388bfd" font-size="12" font-weight="bold">
    ~296mm actual bag envelope
  </text>

  <!-- Rigid body depth: 333mm (red, dashed) -->
  <line x1="80" y1="545" x2="412.6" y2="545" stroke="rgba(248,81,73,0.4)" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="80" y1="540" x2="80" y2="550" stroke="rgba(248,81,73,0.3)" stroke-width="0.7"/>
  <line x1="412.6" y1="540" x2="412.6" y2="550" stroke="rgba(248,81,73,0.3)" stroke-width="0.7"/>
  <text x="246" y="543" text-anchor="middle" fill="rgba(248,81,73,0.6)" font-size="11">
    333mm rigid body assumption
  </text>

  <!-- Enclosure interior: 292mm (gray) -->
  <line x1="80" y1="567" x2="372" y2="567" stroke="#484f58" stroke-width="1.5"/>
  <line x1="80" y1="562" x2="80" y2="572" stroke="#484f58" stroke-width="1"/>
  <line x1="372" y1="562" x2="372" y2="572" stroke="#484f58" stroke-width="1"/>
  <text x="226" y="565" text-anchor="middle" fill="#7d8590" font-size="11">292mm available interior</text>

  <!-- ══════ Summary box ══════ -->
  <rect x="430" y="130" width="250" height="160" rx="8"
        fill="rgba(56,139,253,0.08)" stroke="rgba(56,139,253,0.25)" stroke-width="1"/>

  <text x="555" y="152" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="bold">
    Where the 37mm went
  </text>

  <text x="445" y="175" fill="#7d8590" font-size="11">
    Sealed end (2mm, not 80mm):
  </text>
  <text x="665" y="175" fill="#388bfd" font-size="11" text-anchor="end" font-weight="bold">−22mm</text>

  <text x="445" y="197" fill="#7d8590" font-size="11">
    Connector end (30mm, not 80mm):
  </text>
  <text x="665" y="197" fill="#388bfd" font-size="11" text-anchor="end" font-weight="bold">−14mm</text>

  <line x1="445" y1="210" x2="665" y2="210" stroke="rgba(127,133,144,0.3)" stroke-width="0.5"/>

  <text x="445" y="230" fill="#7d8590" font-size="11">
    Rigid body depth:
  </text>
  <text x="665" y="230" fill="rgba(248,81,73,0.7)" font-size="11" text-anchor="end">333mm</text>

  <text x="445" y="250" fill="#7d8590" font-size="11">
    Actual bag depth:
  </text>
  <text x="665" y="250" fill="#388bfd" font-size="11" text-anchor="end" font-weight="bold">~296mm</text>

  <text x="445" y="270" fill="#7d8590" font-size="11">
    Interior available:
  </text>
  <text x="665" y="270" fill="#7d8590" font-size="11" text-anchor="end">292mm</text>

  <text x="555" y="288" text-anchor="middle" fill="#388bfd" font-size="12" font-weight="bold">
    Only ~4mm over
  </text>

  <!-- ══════ Bottom note ══════ -->
  <text x="350" y="608" text-anchor="middle" fill="#e6edf3" font-size="12">
    The rigid body model overstates depth by ~37mm. The actual profile is ~4mm over at 35°.
  </text>
  <text x="350" y="626" text-anchor="middle" fill="#7d8590" font-size="11">
    4mm is within range of bag compression, spout protrusion through back wall, or 3mm walls instead of 4mm.
  </text>

</svg>
