<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 780" width="1050" height="780" font-family="Arial, sans-serif" font-size="11">
  <title>Cam Lever — Engineering Drawing</title>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#333"/>
    </marker>
    <marker id="arrow-rev" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6 Z" fill="#333"/>
    </marker>
  </defs>

  <style>
    .outline { fill: none; stroke: #000; stroke-width: 1.2; }
    .hidden  { fill: none; stroke: #000; stroke-width: 0.8; stroke-dasharray: 4,3; }
    .center  { fill: none; stroke: #000; stroke-width: 0.5; stroke-dasharray: 12,3,2,3; }
    .dim     { stroke: #333; stroke-width: 0.6; }
    .dim-text       { font-size: 10px; fill: #333; text-anchor: middle; }
    .dim-text-right { font-size: 10px; fill: #333; text-anchor: start; }
    .dim-text-left  { font-size: 10px; fill: #333; text-anchor: end; }
    .label   { font-size: 13px; font-weight: bold; fill: #000; text-anchor: middle; }
    .note    { font-size: 9px; fill: #555; }
  </style>

  <!-- Title block -->
  <text x="525" y="28" font-size="18" font-weight="bold" text-anchor="middle">Cam Lever — Orthographic Drawing</text>
  <text x="525" y="46" font-size="11" text-anchor="middle" fill="#555">90L x 18W x 14H mm | Scale 5:1 (5 px/mm) | Material: PETG</text>
  <text x="525" y="62" font-size="11" text-anchor="middle" fill="#555">Eccentric cam lobe, 1.5mm offset, 3mm stroke, over-center self-locking</text>

  <!-- =================================================================== -->
  <!-- FRONT VIEW  (looking along -Y)  H-axis = X   V-axis = Z            -->
  <!--                                                                      -->
  <!-- What we see:                                                         -->
  <!--   The lever in profile.  Cam disc viewed face-on as a CIRCLE.       -->
  <!--   Handle extends to the right.                                       -->
  <!--   Pivot bore is a circle offset 1.5mm from cam disc center.          -->
  <!--                                                                      -->
  <!-- Coordinate mapping  (real -> SVG, scale 5 px/mm):                    -->
  <!--   Pivot center  =>  SVG (140, 250)                                   -->
  <!--   Cam geom center 1.5mm below pivot (locked pos) => SVG (140, 257)  -->
  <!--   +X  =>  SVG +x                                                    -->
  <!--   +Z  =>  SVG -y                                                    -->
  <!--                                                                      -->
  <!-- Cam disc:  OD 14mm = 70px,  r = 35px,  center SVG (140, 257)       -->
  <!-- Pivot bore: dia 5mm = 25px, r = 12.5px, center SVG (140, 250)      -->
  <!-- Handle: 76mm from pivot = 380px.  Cross-section 10H = 50px tall.    -->
  <!--   Top  = 250 - 25 = 225      Bottom = 250 + 25 = 275               -->
  <!--   Right tip = 140 + 380 = 520                                       -->
  <!-- Handle merges into cam body where cam circle intersects top/bot.     -->
  <!-- =================================================================== -->

  <text x="310" y="100" class="label">FRONT VIEW</text>
  <text x="310" y="114" font-size="9" fill="#666" text-anchor="middle">(looking along -Y)</text>

  <!-- Center lines -->
  <line x1="120" y1="250" x2="570" y2="250" class="center"/>
  <line x1="140" y1="205" x2="140" y2="310" class="center"/>

  <!-- Cam disc outline -->
  <!-- Center (140, 257), r = 35.  Cam top = 222, bottom = 292 -->
  <circle cx="140" cy="257" r="35" class="outline"/>

  <!-- Pivot bore -->
  <circle cx="140" cy="250" r="12" class="outline"/>

  <!-- Detent bump: 0.3mm proud on cam track at bottom (locked position) -->
  <!-- At bottom of cam: y = 257 + 35 = 292.  Bump = 0.3mm = 1.5px outward -->
  <circle cx="140" cy="293" r="1.5" class="outline"/>

  <!-- Handle outline -->
  <!-- Cam circle at y=225 (handle top): x = 140 + sqrt(35^2 - (225-257)^2) -->
  <!--   = 140 + sqrt(1225 - 1024) = 140 + sqrt(201) = 140 + 14.2 ≈ 154    -->
  <!-- Cam circle at y=275 (handle bottom): x = 140 + sqrt(35^2 - (275-257)^2) -->
  <!--   = 140 + sqrt(1225 - 324) = 140 + sqrt(901) = 140 + 30 = 170        -->

  <!-- Handle top edge: from tangent point on cam to where tip rounding begins -->
  <line x1="154" y1="225" x2="540" y2="225" class="outline"/>
  <!-- Handle bottom edge -->
  <line x1="170" y1="275" x2="540" y2="275" class="outline"/>
  <!-- Handle tip: rounded end. Rightmost at x=555 (90mm overall from cam left at 105) -->
  <path d="M540,225 Q555,225 555,250 Q555,275 540,275" class="outline"/>

  <!-- Push rod contact: hidden 5mm circle behind cam, at bottom of cam face -->
  <!-- Push rod is along Y axis at approximately X=140, contacts cam at its lowest point -->
  <!-- In front view: push rod end is behind the cam. Show as hidden circle. -->
  <!-- Push rod center: at pivot X, at bottom of cam contact. Y=push rod face. -->
  <!-- The contact is on the cam face (-Y side). In front view it projects to cam bottom area. -->
  <!-- Show push rod cross-section as hidden circle at (140, 275) -->
  <circle cx="140" cy="280" r="12" class="hidden"/>
  <text x="172" y="296" class="note">Push rod (&#x2300;5, behind)</text>

  <!-- =================== FRONT VIEW DIMENSIONS =================== -->

  <!-- Cam OD: 14mm  (leader from top of cam circle) -->
  <line x1="140" y1="222" x2="105" y2="200" class="dim"/>
  <text x="58" y="198" class="dim-text">&#x2300;14.0 cam</text>

  <!-- Pivot bore: 5mm -->
  <line x1="152" y1="250" x2="185" y2="230" class="dim"/>
  <text x="188" y="228" class="dim-text-right">&#x2300;5.0 bore</text>

  <!-- Eccentricity: 1.5mm (pivot to cam center) -->
  <!-- Small vertical dim line between pivot (250) and cam center (257) -->
  <line x1="156" y1="250" x2="166" y2="250" class="dim"/>
  <line x1="156" y1="257" x2="166" y2="257" class="dim"/>
  <line x1="162" y1="250" x2="162" y2="257" class="dim" marker-start="url(#arrow-rev)" marker-end="url(#arrow)"/>
  <text x="170" y="256" class="dim-text-right">1.5 ecc.</text>

  <!-- Handle height: 10mm -->
  <line x1="568" y1="225" x2="578" y2="225" class="dim"/>
  <line x1="568" y1="275" x2="578" y2="275" class="dim"/>
  <line x1="574" y1="225" x2="574" y2="275" class="dim" marker-start="url(#arrow-rev)" marker-end="url(#arrow)"/>
  <text x="590" y="254" class="dim-text-right" transform="rotate(-90,590,254)">10.0</text>

  <!-- Handle length from pivot to straight-section end: 76mm = 380px. -->
  <!-- Pivot at x=140, straight-end at x=140+380=520. Tip rounding adds ~15px. -->
  <line x1="140" y1="302" x2="140" y2="318" class="dim"/>
  <line x1="520" y1="302" x2="520" y2="318" class="dim"/>
  <line x1="140" y1="314" x2="520" y2="314" class="dim" marker-start="url(#arrow-rev)" marker-end="url(#arrow)"/>
  <text x="330" y="328" class="dim-text">76.0 (pivot to grip end)</text>

  <!-- Overall height: cam top to cam bottom = 14mm (same as OD, already shown) -->

  <!-- =================================================================== -->
  <!-- SIDE VIEW  (looking along -X)  H-axis = Y   V-axis = Z             -->
  <!--                                                                      -->
  <!-- Aligned to the right of front view, sharing the same Z axis.         -->
  <!--                                                                      -->
  <!-- What we see:                                                         -->
  <!--   Cam body: rectangle 18W(Y) x 14H(Z).  The disc is edge-on.       -->
  <!--   Handle: rectangle 18W(Y) x 10H(Z), merged with cam body.          -->
  <!--   Pivot bore: circle 5mm in Y-Z plane.                              -->
  <!--                                                                      -->
  <!-- Side view pivot center at SVG (680, 250) — same Z as front view.    -->
  <!-- Y axis: 18mm = 90px, centered on pivot.                              -->
  <!--   Left  = 680 - 45 = 635      Right = 680 + 45 = 725               -->
  <!-- Cam body Z: center at 257 (matching front view cam center Z).       -->
  <!--   Top = 257 - 35 = 222        Bottom = 257 + 35 = 292              -->
  <!-- Handle Z:                                                            -->
  <!--   Top = 250 - 25 = 225        Bottom = 250 + 25 = 275              -->
  <!-- =================================================================== -->

  <text x="680" y="100" class="label">SIDE VIEW</text>
  <text x="680" y="114" font-size="9" fill="#666" text-anchor="middle">(looking along -X)</text>

  <!-- Center lines -->
  <line x1="620" y1="250" x2="740" y2="250" class="center"/>
  <line x1="680" y1="205" x2="680" y2="310" class="center"/>

  <!-- Cam body rectangle: 90W x 70H -->
  <!-- Top-left at (635, 222), bottom-right at (725, 292) -->
  <rect x="635" y="222" width="90" height="70" class="outline"/>

  <!-- Handle edges within cam body: hidden lines showing handle cross-section -->
  <!-- Handle top at Z=225, bottom at Z=275 -->
  <line x1="635" y1="225" x2="725" y2="225" class="hidden"/>
  <line x1="635" y1="275" x2="725" y2="275" class="hidden"/>

  <!-- Pivot bore circle (5mm dia) -->
  <circle cx="680" cy="250" r="12" class="outline"/>

  <!-- Push rod hidden line (behind cam): 5mm circle -->
  <circle cx="680" cy="280" r="12" class="hidden"/>

  <!-- =================== SIDE VIEW DIMENSIONS =================== -->

  <!-- Width: 18mm -->
  <line x1="635" y1="305" x2="635" y2="318" class="dim"/>
  <line x1="725" y1="305" x2="725" y2="318" class="dim"/>
  <line x1="635" y1="314" x2="725" y2="314" class="dim" marker-start="url(#arrow-rev)" marker-end="url(#arrow)"/>
  <text x="680" y="328" class="dim-text">18.0</text>

  <!-- Cam body height: 14mm -->
  <line x1="738" y1="222" x2="752" y2="222" class="dim"/>
  <line x1="738" y1="292" x2="752" y2="292" class="dim"/>
  <line x1="746" y1="222" x2="746" y2="292" class="dim" marker-start="url(#arrow-rev)" marker-end="url(#arrow)"/>
  <text x="760" y="261" class="dim-text-right" transform="rotate(-90,760,261)">14.0</text>

  <!-- =================================================================== -->
  <!-- TOP VIEW  (looking along -Z)  H-axis = X   V-axis = Y              -->
  <!--                                                                      -->
  <!-- Located below front view, aligned horizontally (same X axis).        -->
  <!--                                                                      -->
  <!-- What we see:                                                         -->
  <!--   Lever plan view.  Cam body: rectangle 14(X) x 18(Y).             -->
  <!--   Handle: rectangle ~76(X) x 18(Y) extending right from cam.       -->
  <!--   Pivot bore: circle 5mm.                                            -->
  <!--   Push rod: hidden circle behind cam body (at Y offset).            -->
  <!--                                                                      -->
  <!-- Top view pivot center at SVG (140, 480) — same X as front view.    -->
  <!-- Y axis: 18mm = 90px.                                                 -->
  <!--   Top = 480 - 45 = 435    Bottom = 480 + 45 = 525                  -->
  <!-- Cam body X: center at 140. 14mm = 70px.                             -->
  <!--   Left = 140 - 35 = 105   Right = 140 + 35 = 175                   -->
  <!-- Handle: 76mm from pivot = 380px.                                     -->
  <!--   Left = 175 (cam right)  Right = 140 + 380 = 520 (+tip rounding)  -->
  <!-- =================================================================== -->

  <text x="310" y="390" class="label">TOP VIEW</text>
  <text x="310" y="404" font-size="9" fill="#666" text-anchor="middle">(looking along -Z)</text>

  <!-- Center lines -->
  <line x1="85" y1="480" x2="570" y2="480" class="center"/>
  <line x1="140" y1="420" x2="140" y2="545" class="center"/>

  <!-- Cam body rectangle: 70W(X) x 90H(Y) -->
  <rect x="105" y="435" width="70" height="90" class="outline"/>

  <!-- Handle: extends from cam right edge to tip, same Y span -->
  <line x1="175" y1="435" x2="540" y2="435" class="outline"/>
  <line x1="175" y1="525" x2="540" y2="525" class="outline"/>
  <!-- Rounded tip: rightmost at x=555, matching 90mm overall -->
  <path d="M540,435 Q555,435 555,480 Q555,525 540,525" class="outline"/>

  <!-- Pivot bore circle (5mm dia) -->
  <circle cx="140" cy="480" r="12" class="outline"/>

  <!-- Push rod: hidden circle at cam body center, below cam (Y > 525) -->
  <!-- Push rod passes through the front wall at the cam face side. -->
  <!-- In top view, it extends in +Y from the cam body. -->
  <!-- Show hidden circle at x=140, y just outside cam body -->
  <!-- Actually: the push rod is behind the cam face, so it would be at -->
  <!-- a larger Y value (further from viewer in top-down). But top view -->
  <!-- doesn't really show it well. The push rod passes through below the cam. -->
  <!-- In top view, the push rod is obscured by the lever body. -->
  <!-- Show as hidden lines inside the cam body area instead. -->
  <circle cx="140" cy="480" r="12" class="hidden"/>

  <!-- =================== TOP VIEW DIMENSIONS =================== -->

  <!-- Overall length: 90mm -->
  <line x1="105" y1="540" x2="105" y2="558" class="dim"/>
  <line x1="555" y1="540" x2="555" y2="558" class="dim"/>
  <line x1="105" y1="554" x2="555" y2="554" class="dim" marker-start="url(#arrow-rev)" marker-end="url(#arrow)"/>
  <text x="330" y="568" class="dim-text">90.0 overall</text>

  <!-- Width: 18mm -->
  <line x1="565" y1="435" x2="578" y2="435" class="dim"/>
  <line x1="565" y1="525" x2="578" y2="525" class="dim"/>
  <line x1="573" y1="435" x2="573" y2="525" class="dim" marker-start="url(#arrow-rev)" marker-end="url(#arrow)"/>
  <text x="588" y="484" class="dim-text-right" transform="rotate(-90,588,484)">18.0</text>

  <!-- Cam body extent: 14mm in X -->
  <line x1="105" y1="418" x2="105" y2="428" class="dim"/>
  <line x1="175" y1="418" x2="175" y2="428" class="dim"/>
  <line x1="105" y1="423" x2="175" y2="423" class="dim" marker-start="url(#arrow-rev)" marker-end="url(#arrow)"/>
  <text x="140" y="416" class="dim-text">14.0</text>

  <!-- =================================================================== -->
  <!-- NOTES BLOCK                                                          -->
  <!-- =================================================================== -->

  <rect x="610" y="380" width="410" height="370" fill="none" stroke="#999" stroke-width="0.5"/>
  <text x="622" y="400" font-size="12" font-weight="bold">NOTES</text>

  <text x="622" y="420" class="note">1. Eccentric cam: 1.5mm offset from pivot axis to cam disc</text>
  <text x="630" y="432" class="note">geometric center. Produces 3.0mm stroke (2 x eccentricity)</text>
  <text x="630" y="444" class="note">over 180-degree lever rotation.</text>

  <text x="622" y="462" class="note">2. Over-center geometry: cam profile passes 2 degrees beyond</text>
  <text x="630" y="474" class="note">maximum displacement for self-locking. Lever rests against</text>
  <text x="630" y="486" class="note">shell front face in both locked and released positions.</text>

  <text x="622" y="504" class="note">3. Detent bump: 0.3mm proud on cam track at locked position.</text>
  <text x="630" y="516" class="note">Provides tactile click feedback during lever rotation.</text>

  <text x="622" y="534" class="note">4. Push rod contact surface on cam face (-Y side): slightly</text>
  <text x="630" y="546" class="note">convex, 1mm crown over 10mm contact width.</text>

  <text x="622" y="564" class="note">5. Pivot bore: 5.0mm diameter for 5mm steel pivot pin (26mm</text>
  <text x="630" y="576" class="note">long: 4mm shell wall + 18mm lever + 4mm E-clip retention).</text>

  <text x="622" y="594" class="note">6. Handle: 76mm from pivot center. Ergonomic grip cross-section</text>
  <text x="630" y="606" class="note">18W x 10H mm with rounded edges. Doubles as pull grip for</text>
  <text x="630" y="618" class="note">cartridge removal.</text>

  <text x="622" y="636" class="note">7. Mechanical advantage: ~10:1 (76mm lever arm / ~7mm effective</text>
  <text x="630" y="648" class="note">cam radius). Hand force: 2-3N. Collet release: 12-20N total.</text>

  <text x="622" y="666" class="note">8. Material: PETG. External cam design for ease of FDM printing.</text>
  <text x="630" y="678" class="note">Print handle flat on build plate, cam disc upright.</text>

  <text x="622" y="696" class="note">9. Interfaces: pivots on steel pin through shell front wall at</text>
  <text x="630" y="708" class="note">X=74, Z=40. Cam face pushes 5mm steel push rod (118mm long)</text>
  <text x="630" y="720" class="note">which transmits force to release plate on rear wall.</text>

  <text x="622" y="738" class="note">10. Initial design values. Subject to iteration after first print.</text>

</svg>