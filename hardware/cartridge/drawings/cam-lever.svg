<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 700" width="920" height="700" font-family="Arial, Helvetica, sans-serif">
  <title>Cam Lever — Engineering Drawing</title>

  <defs>
    <marker id="arr" viewBox="0 0 10 6" refX="10" refY="3"
            markerWidth="10" markerHeight="6" orient="auto-start-reverse"
            fill="none" stroke="#000" stroke-width="0.8">
      <path d="M0,0 L10,3 L0,6"/>
    </marker>
    <style>
      .outline { fill: none; stroke: #000; stroke-width: 1.2; }
      .hidden  { fill: none; stroke: #000; stroke-width: 0.7; stroke-dasharray: 4,3; }
      .center  { fill: none; stroke: #000; stroke-width: 0.4; stroke-dasharray: 12,3,2,3; }
      .dim     { fill: none; stroke: #000; stroke-width: 0.5; }
      .ext     { fill: none; stroke: #000; stroke-width: 0.4; }
      .dimtxt  { font-size: 10px; text-anchor: middle; fill: #000; }
      .label   { font-size: 12px; font-weight: bold; text-anchor: middle; fill: #000; }
      .note    { font-size: 9px; fill: #000; }
      .title   { font-size: 11px; font-weight: bold; fill: #000; }
      .titledata { font-size: 10px; fill: #000; }
      .detent  { fill: none; stroke: #000; stroke-width: 0.8; }
      .frame   { fill: none; stroke: #000; stroke-width: 0.6; }
    </style>
  </defs>

  <!-- Drawing border -->
  <rect x="5" y="5" width="910" height="690" fill="none" stroke="#000" stroke-width="1"/>

  <!-- ============================================================ -->
  <!--  FRONT VIEW  (looking along -Y)                              -->
  <!--  Horizontal = X (length),  Vertical = Z (height)             -->
  <!--  Scale: 5 px/mm                                              -->
  <!--  Pivot center: (430, 330)                                    -->
  <!--  Cam lobe center: (430, 337.5)  [1.5 mm = 7.5 px below]     -->
  <!-- ============================================================ -->
  <text x="250" y="205" class="label">FRONT VIEW</text>

  <!--
    Geometry strategy for combined handle + cam outline:
    - Handle: 76 mm from pivot center leftward, 10 mm tall (18 wide but front
      view only sees height), rounded left end.
      Top edge y = 305, bottom edge y = 355, left end x = 50.
    - Cam lobe: circle cx=430 cy=337.5 r=35  (14 mm OD, eccentricity downward).

    Intersections of handle edges with cam circle:
      Top (y=305):  dx = sqrt(35^2 - (305-337.5)^2) = sqrt(1225-1056.25) = sqrt(168.75) = 12.99
        Left intersection x = 430 - 13.0 = 417.0
      Bottom (y=355): dx = sqrt(35^2 - (355-337.5)^2) = sqrt(1225-306.25) = sqrt(918.75) = 30.31
        Left intersection x = 430 - 30.3 = 399.7

    Path: left-end top -> right along top -> cam arc (clockwise, large arc from
    (417,305) around right side to (399.7,355)) -> left along bottom -> rounded left end.

    SVG arc: A rx ry x-rot large-arc-flag sweep-flag x y
    large-arc = 1 (>180 deg), sweep = 1 (clockwise in SVG's Y-down coords).
  -->
  <path class="outline" d="
    M 55,305
    L 417,305
    A 35,35 0 1,1 399.7,355
    L 55,355
    Q 50,355 50,345
    L 50,315
    Q 50,305 55,305
    Z"/>

  <!-- Pivot bore (5 mm dia = 25 px dia) -->
  <circle cx="430" cy="330" r="12.5" class="outline"/>

  <!-- Pivot center mark -->
  <line x1="420" y1="330" x2="440" y2="330" class="center"/>
  <line x1="430" y1="320" x2="430" y2="340" class="center"/>

  <!-- Cam center mark -->
  <line x1="425" y1="337.5" x2="435" y2="337.5" class="center"/>
  <line x1="430" y1="332.5" x2="430" y2="342.5" class="center"/>

  <!-- Detent bump (0.3 mm = 1.5 px) at bottom of cam track -->
  <path class="detent" d="M 427,372.5 Q 430,374 433,372.5"/>

  <!-- Horizontal centerline through pivot -->
  <line x1="40" y1="330" x2="475" y2="330" class="center"/>

  <!-- Detail callout circle -->
  <circle cx="430" cy="337.5" r="50" fill="none" stroke="#000" stroke-width="0.5" stroke-dasharray="6,3"/>
  <text x="470" y="290" class="note" style="font-weight:bold">A</text>

  <!-- ---- FRONT VIEW DIMENSIONS ---- -->

  <!-- Handle length 76 mm: x=50 to x=430 = 380 px; 380/5=76 -->
  <line x1="50" y1="360" x2="50" y2="382" class="ext"/>
  <line x1="430" y1="373" x2="430" y2="397" class="ext"/>
  <line x1="50" y1="378" x2="430" y2="378" class="dim" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="240" y="375" class="dimtxt">76</text>

  <!-- Overall envelope 90 mm: x=50 to x=500 = 450 px; 450/5=90 -->
  <line x1="50" y1="385" x2="50" y2="408" class="ext"/>
  <line x1="500" y1="365" x2="500" y2="408" class="ext"/>
  <line x1="50" y1="403" x2="500" y2="403" class="dim" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="275" y="400" class="dimtxt">90 (envelope)</text>

  <!-- Cam OD 14 mm vertical: y=302.5 to y=372.5 = 70 px; 70/5=14 -->
  <line x1="466" y1="302.5" x2="490" y2="302.5" class="ext"/>
  <line x1="466" y1="372.5" x2="490" y2="372.5" class="ext"/>
  <line x1="485" y1="302.5" x2="485" y2="372.5" class="dim" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="505" y="341" class="dimtxt">&#x2300;14</text>

  <!-- Pivot bore leader -->
  <line x1="439" y1="321" x2="470" y2="298" class="dim"/>
  <text x="488" y="296" class="dimtxt" style="font-size:9px">&#x2300;5 BORE</text>

  <!-- Handle height 10 mm: y=305 to y=355 = 50 px; 50/5=10 -->
  <line x1="48" y1="305" x2="30" y2="305" class="ext"/>
  <line x1="48" y1="355" x2="30" y2="355" class="ext"/>
  <line x1="35" y1="305" x2="35" y2="355" class="dim" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="22" y="334" class="dimtxt" transform="rotate(-90,22,334)">10</text>

  <!-- Eccentricity 1.5 mm: y=330 to y=337.5 = 7.5 px; 7.5/5=1.5 -->
  <line x1="442" y1="330" x2="465" y2="318" class="dim"/>
  <line x1="442" y1="337.5" x2="465" y2="350" class="dim"/>
  <line x1="465" y1="318" x2="465" y2="350" class="dim" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="482" y="337" class="dimtxt" style="font-size:9px">1.5 ECC</text>

  <!-- ============================================================ -->
  <!--  TOP VIEW  (looking along -Z)                                -->
  <!--  Horizontal = X (length),  Vertical = Y (width)              -->
  <!--  Pivot center: (430, 135)                                    -->
  <!-- ============================================================ -->
  <text x="250" y="55" class="label">TOP VIEW</text>

  <!--
    In top view the cam cylinder (axis along Y) projects as its diameter
    (14 mm = 70 px) in X, and full part width (18 mm = 90 px) in Y.
    The handle is the same 18 mm width.
    Handle left end at x=50, cam right extent at x=430+35=465.
    Total drawn length = 415 px = 83 mm (within 90 mm envelope).
    Y: 135 - 45 = 90 to 135 + 45 = 180.
  -->
  <rect x="50" y="90" width="415" height="90" rx="5" class="outline"/>

  <!-- Hidden lines: pivot bore (5 mm hole along Y) projected in top view -->
  <!-- Two vertical hidden lines at x = 430 +/- 12.5 -->
  <line x1="417.5" y1="90" x2="417.5" y2="180" class="hidden"/>
  <line x1="442.5" y1="90" x2="442.5" y2="180" class="hidden"/>

  <!-- Centerlines -->
  <line x1="40" y1="135" x2="475" y2="135" class="center"/>
  <line x1="430" y1="80" x2="430" y2="190" class="center"/>

  <!-- Width 18 mm: y=90 to y=180 = 90 px; 90/5=18 -->
  <line x1="466" y1="90" x2="488" y2="90" class="ext"/>
  <line x1="466" y1="180" x2="488" y2="180" class="ext"/>
  <line x1="483" y1="90" x2="483" y2="180" class="dim" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="500" y="139" class="dimtxt">18</text>

  <!-- ============================================================ -->
  <!--  SIDE VIEW  (looking along -X)                               -->
  <!--  Horizontal = Y (width),  Vertical = Z (height)              -->
  <!--  Center: (640, 330)                                          -->
  <!-- ============================================================ -->
  <text x="640" y="205" class="label">SIDE VIEW</text>

  <!--
    All features project onto Y-Z plane.
    Cam (14 mm tall, 18 mm wide): visible outline.
    Handle (10 mm tall, 18 mm wide): hidden inside cam outline.
    Y: 640-45=595 to 640+45=685.   Z: 302.5 to 372.5 (cam), 305 to 355 (handle).
  -->

  <!-- Visible outline: cam projection 18W x 14H = 90 x 70 px -->
  <rect x="595" y="302.5" width="90" height="70" rx="3" class="outline"/>

  <!-- Hidden: handle top and bottom edges -->
  <line x1="595" y1="305" x2="685" y2="305" class="hidden"/>
  <line x1="595" y1="355" x2="685" y2="355" class="hidden"/>

  <!-- Hidden: pivot bore parallel lines (bore axis=Y, appears as 5mm gap in Z) -->
  <line x1="595" y1="317.5" x2="685" y2="317.5" class="hidden"/>
  <line x1="595" y1="342.5" x2="685" y2="342.5" class="hidden"/>

  <!-- Centerlines -->
  <line x1="585" y1="330" x2="695" y2="330" class="center"/>
  <line x1="640" y1="292" x2="640" y2="383" class="center"/>

  <!-- Width 18 mm -->
  <line x1="595" y1="375" x2="595" y2="395" class="ext"/>
  <line x1="685" y1="375" x2="685" y2="395" class="ext"/>
  <line x1="595" y1="390" x2="685" y2="390" class="dim" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="640" y="387" class="dimtxt">18</text>

  <!-- Height 14 mm (cam) -->
  <line x1="687" y1="302.5" x2="707" y2="302.5" class="ext"/>
  <line x1="687" y1="372.5" x2="707" y2="372.5" class="ext"/>
  <line x1="702" y1="302.5" x2="702" y2="372.5" class="dim" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="717" y="341" class="dimtxt">14</text>

  <!-- Handle height 10 mm -->
  <line x1="593" y1="305" x2="578" y2="305" class="ext"/>
  <line x1="593" y1="355" x2="578" y2="355" class="ext"/>
  <line x1="583" y1="305" x2="583" y2="355" class="dim" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="570" y="334" class="dimtxt" transform="rotate(-90,570,334)">10</text>

  <!-- ============================================================ -->
  <!--  DETAIL A — Cam Profile  (2:1 = 10 px/mm)                   -->
  <!--  Bounding frame required by Rubric 6A                        -->
  <!-- ============================================================ -->
  <rect x="540" y="430" width="355" height="240" class="frame"/>
  <text x="718" y="448" class="label">DETAIL A: CAM PROFILE (2:1)</text>

  <!--
    Cam center:  (718, 580)    Pivot center: (718, 565)
    Cam OD 14 mm = 70 px r at 10 px/mm.   Pivot bore 5 mm = 25 px r.
    Eccentricity 1.5 mm = 15 px.
  -->
  <circle cx="718" cy="580" r="70" class="outline"/>
  <circle cx="718" cy="565" r="25" class="outline"/>

  <!-- Center marks — pivot -->
  <line x1="705" y1="565" x2="731" y2="565" class="center"/>
  <line x1="718" y1="552" x2="718" y2="578" class="center"/>
  <!-- Center marks — cam -->
  <line x1="710" y1="580" x2="726" y2="580" class="center"/>
  <line x1="718" y1="572" x2="718" y2="588" class="center"/>

  <!-- Detent bump 0.3 mm = 3 px at bottom of cam track -->
  <path class="detent" d="M 712,650 Q 718,653 724,650"/>

  <!-- Push rod contact callout (convex surface at bottom) -->
  <path class="outline" d="M 708,650 Q 718,660 728,650" stroke-width="0.6"/>

  <!-- Eccentricity dimension -->
  <line x1="728" y1="565" x2="756" y2="550" class="dim"/>
  <line x1="728" y1="580" x2="756" y2="595" class="dim"/>
  <line x1="756" y1="550" x2="756" y2="595" class="dim" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="775" y="576" class="dimtxt" style="font-size:9px">1.5</text>

  <!-- Pivot bore -->
  <line x1="718" y1="565" x2="745" y2="540" class="dim"/>
  <text x="758" y="538" class="dimtxt" style="font-size:9px">&#x2300;5</text>

  <!-- Cam OD -->
  <line x1="718" y1="580" x2="660" y2="510" class="dim"/>
  <text x="648" y="506" class="dimtxt" style="font-size:9px">&#x2300;14</text>

  <!-- Detent callout -->
  <line x1="724" y1="653" x2="785" y2="660" class="dim"/>
  <text x="800" y="658" class="note">0.3 DETENT BUMP</text>

  <!-- Contact surface callout -->
  <line x1="728" y1="655" x2="785" y2="646" class="dim"/>
  <text x="800" y="644" class="note">1mm CROWN / 10mm</text>

  <!-- Labels -->
  <text x="718" y="558" class="note" text-anchor="middle" style="font-size:8px">PIVOT</text>
  <text x="718" y="596" class="note" text-anchor="middle" style="font-size:8px">CAM CTR</text>
  <text x="640" y="660" class="note">2&#xB0; OVER-CENTER</text>

  <!-- ============================================================ -->
  <!--  NOTES                                                        -->
  <!-- ============================================================ -->
  <text x="25" y="440" class="title">NOTES:</text>
  <text x="25" y="456" class="note">1. MATERIAL: PETG (3D PRINTED)</text>
  <text x="25" y="470" class="note">2. ALL DIMENSIONS IN MILLIMETERS</text>
  <text x="25" y="484" class="note">3. CAM ECCENTRICITY 1.5 mm PRODUCES 3.0 mm STROKE OVER 180&#xB0; ROTATION</text>
  <text x="25" y="498" class="note">4. OVER-CENTER: 2&#xB0; PAST PEAK DISPLACEMENT FOR SELF-LOCKING</text>
  <text x="25" y="512" class="note">5. DETENT: 0.3 mm BUMP ON CAM TRACK FOR TACTILE CLICK AT LOCKED POSITION</text>
  <text x="25" y="526" class="note">6. PUSH ROD CONTACT: SLIGHTLY CONVEX (1 mm CROWN OVER 10 mm SPAN)</text>
  <text x="25" y="540" class="note">7. HANDLE: 18W x 10H mm CROSS-SECTION, ROUNDED EDGES, ERGONOMIC GRIP</text>
  <text x="25" y="554" class="note">8. PIVOT BORE: 5 mm DIA FOR 5 mm STEEL PIN (E-CLIP RETAINED)</text>
  <text x="25" y="568" class="note">9. PRINT ORIENTATION: CAM AXIS VERTICAL FOR BEST BORE CIRCULARITY</text>
  <text x="25" y="582" class="note">10. INITIAL DESIGN VALUES — SUBJECT TO ITERATION AFTER PRINTING</text>

  <!-- ============================================================ -->
  <!--  TITLE BLOCK                                                  -->
  <!-- ============================================================ -->
  <rect x="25" y="600" width="505" height="85" fill="none" stroke="#000" stroke-width="1"/>
  <line x1="25" y1="620" x2="530" y2="620" stroke="#000" stroke-width="0.5"/>
  <line x1="25" y1="640" x2="530" y2="640" stroke="#000" stroke-width="0.5"/>
  <line x1="25" y1="660" x2="530" y2="660" stroke="#000" stroke-width="0.5"/>
  <line x1="25" y1="672" x2="530" y2="672" stroke="#000" stroke-width="0.5"/>
  <line x1="130" y1="600" x2="130" y2="685" stroke="#000" stroke-width="0.5"/>

  <text x="78" y="615" class="titledata" text-anchor="middle">TITLE:</text>
  <text x="330" y="615" class="title" text-anchor="middle">CAM LEVER</text>

  <text x="78" y="635" class="titledata" text-anchor="middle">PROJECT:</text>
  <text x="330" y="635" class="titledata" text-anchor="middle">SODA FLAVOR INJECTOR — PUMP CARTRIDGE</text>

  <text x="78" y="655" class="titledata" text-anchor="middle">MATERIAL:</text>
  <text x="330" y="655" class="titledata" text-anchor="middle">PETG (3D PRINTED)</text>

  <text x="78" y="669" class="titledata" text-anchor="middle">SCALE:</text>
  <text x="220" y="669" class="titledata" text-anchor="middle">5:1 (px : mm)</text>
  <text x="430" y="669" class="titledata" text-anchor="middle">THIRD ANGLE PROJECTION</text>

  <text x="78" y="682" class="titledata" text-anchor="middle">DATE:</text>
  <text x="220" y="682" class="titledata" text-anchor="middle">2026-03-25</text>
  <text x="430" y="682" class="titledata" text-anchor="middle">SHEET 1 OF 1</text>

</svg>