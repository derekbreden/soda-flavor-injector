<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 820" width="900" height="820" font-family="Arial, Helvetica, sans-serif">
  <title>Lid — Engineering Drawing</title>

  <defs>
    <style>
      .outline   { fill:none; stroke:#000; stroke-width:1.5; }
      .hidden    { fill:none; stroke:#000; stroke-width:0.75; stroke-dasharray:4,3; }
      .hidden-sm { fill:none; stroke:#000; stroke-width:0.75; stroke-dasharray:2,2; }
      .hidden-micro { fill:none; stroke:#555; stroke-width:0.5; } /* too short for dashes */
      .center    { fill:none; stroke:#000; stroke-width:0.35; stroke-dasharray:8,3,2,3; }
      .dim       { fill:none; stroke:#000; stroke-width:0.5; }
      .dimtext   { font-size:10px; text-anchor:middle; fill:#000; }
      .label     { font-size:12px; font-weight:bold; text-anchor:middle; fill:#000; }
      .note      { font-size:9px; fill:#000; }
      .title     { font-size:14px; font-weight:bold; fill:#000; }
      .titletext { font-size:10px; fill:#000; }
      .frame     { fill:none; stroke:#000; stroke-width:1; }
      .detail-frame { fill:none; stroke:#000; stroke-width:1.5; }
      .section   { fill:#000; fill-opacity:0.08; stroke:none; }
    </style>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000"/>
    </marker>
    <marker id="ah-rev" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- Drawing border -->
  <rect x="5" y="5" width="890" height="810" class="frame"/>

  <!-- ===== TOP VIEW ===== -->
  <!-- Scale 2:1, origin at (80, 60) -->
  <!-- 148mm W = 296px, 130mm D = 260px -->
  <text x="228" y="38" class="label">TOP VIEW (2:1)</text>

  <!-- Lid outline -->
  <rect x="80" y="60" width="296" height="260" class="outline"/>

  <!-- Pogo PCB cutout: 15W x 30L, centered at X=74mm, Y=95..125mm -->
  <!-- px: X center=74*2+80=228, X=66.5*2+80=213, width=30px -->
  <!-- Y: 95*2+60=250, height=60px -->
  <rect x="213" y="250" width="30" height="60" class="outline"/>

  <!-- 6x M3 screw clearance holes (3.4mm dia = 6.8px dia = 3.4px radius) -->
  <!-- Hole positions (mm): (8,8), (140,8), (74,8), (8,122), (140,122), (74,122) -->
  <!-- px: x = mm*2+80, y = mm*2+60 -->
  <!-- (8,8) -> (96,76) -->
  <circle cx="96" cy="76" r="3.4" class="outline"/>
  <line x1="96" y1="72" x2="96" y2="80" class="center"/>
  <line x1="92" y1="76" x2="100" y2="76" class="center"/>
  <!-- (140,8) -> (360,76) -->
  <circle cx="360" cy="76" r="3.4" class="outline"/>
  <line x1="360" y1="72" x2="360" y2="80" class="center"/>
  <line x1="356" y1="76" x2="364" y2="76" class="center"/>
  <!-- (74,8) -> (228,76) -->
  <circle cx="228" cy="76" r="3.4" class="outline"/>
  <line x1="228" y1="72" x2="228" y2="80" class="center"/>
  <line x1="224" y1="76" x2="232" y2="76" class="center"/>
  <!-- (8,122) -> (96,304) -->
  <circle cx="96" cy="304" r="3.4" class="outline"/>
  <line x1="96" y1="300" x2="96" y2="308" class="center"/>
  <line x1="92" y1="304" x2="100" y2="304" class="center"/>
  <!-- (140,122) -> (360,304) -->
  <circle cx="360" cy="304" r="3.4" class="outline"/>
  <line x1="360" y1="300" x2="360" y2="308" class="center"/>
  <line x1="356" y1="304" x2="364" y2="304" class="center"/>
  <!-- (74,122) -> (228,304) -->
  <circle cx="228" cy="304" r="3.4" class="outline"/>
  <line x1="228" y1="300" x2="228" y2="308" class="center"/>
  <line x1="224" y1="304" x2="232" y2="304" class="center"/>

  <!-- TOP VIEW DIMENSIONS -->

  <!-- Width 148mm across top -->
  <line x1="80" y1="50" x2="80" y2="56" class="dim"/>
  <line x1="376" y1="50" x2="376" y2="56" class="dim"/>
  <line x1="80" y1="53" x2="376" y2="53" class="dim" marker-start="url(#ah-rev)" marker-end="url(#ah)"/>
  <text x="228" y="49" class="dimtext">148</text>

  <!-- Depth 130mm on right side -->
  <line x1="382" y1="60" x2="395" y2="60" class="dim"/>
  <line x1="382" y1="320" x2="395" y2="320" class="dim"/>
  <line x1="389" y1="60" x2="389" y2="320" class="dim" marker-start="url(#ah-rev)" marker-end="url(#ah)"/>
  <text x="389" y="194" class="dimtext" transform="rotate(-90,389,194)">130</text>

  <!-- Hole inset 8mm from front edge (bottom in top view = Y=0 side) -->
  <!-- From bottom edge (y=320) to hole center (y=76): actually top edge y=60 to hole y=76 = 16px = 8mm -->
  <line x1="68" y1="60" x2="68" y2="76" class="dim" marker-start="url(#ah-rev)" marker-end="url(#ah)"/>
  <text x="58" y="72" class="dimtext" style="font-size:8px">8</text>
  <line x1="72" y1="60" x2="80" y2="60" class="dim" stroke-dasharray="1,1"/>
  <line x1="72" y1="76" x2="92" y2="76" class="dim" stroke-dasharray="1,1"/>

  <!-- Hole inset 8mm from left edge -->
  <line x1="80" y1="330" x2="96" y2="330" class="dim" marker-start="url(#ah-rev)" marker-end="url(#ah)"/>
  <text x="88" y="340" class="dimtext" style="font-size:8px">8</text>
  <line x1="80" y1="320" x2="80" y2="334" class="dim" stroke-dasharray="1,1"/>
  <line x1="96" y1="320" x2="96" y2="334" class="dim" stroke-dasharray="1,1"/>

  <!-- Hole spacing center-to-center X: 8 to 74 = 66mm, 74 to 140 = 66mm -->
  <!-- Between first two holes on front edge -->
  <line x1="96" y1="345" x2="228" y2="345" class="dim" marker-start="url(#ah-rev)" marker-end="url(#ah)"/>
  <text x="162" y="355" class="dimtext" style="font-size:8px">66</text>
  <line x1="96" y1="334" x2="96" y2="349" class="dim" stroke-dasharray="1,1"/>
  <line x1="228" y1="334" x2="228" y2="349" class="dim" stroke-dasharray="1,1"/>

  <line x1="228" y1="345" x2="360" y2="345" class="dim" marker-start="url(#ah-rev)" marker-end="url(#ah)"/>
  <text x="294" y="355" class="dimtext" style="font-size:8px">66</text>
  <line x1="360" y1="334" x2="360" y2="349" class="dim" stroke-dasharray="1,1"/>

  <!-- Pogo cutout dimensions -->
  <!-- Width of cutout: 15mm = 30px -->
  <line x1="213" y1="318" x2="243" y2="318" class="dim" marker-start="url(#ah-rev)" marker-end="url(#ah)"/>
  <text x="228" y="316" class="dimtext" style="font-size:8px">15</text>
  <!-- Length of cutout: 30mm = 60px -->
  <line x1="248" y1="250" x2="248" y2="310" class="dim" marker-start="url(#ah-rev)" marker-end="url(#ah)"/>
  <text x="260" y="284" class="dimtext" style="font-size:8px">30</text>

  <!-- Cutout position from rear edge: rear edge at Y=130, cutout starts at Y=95 -->
  <!-- Distance from cutout end (Y=125) to rear edge (Y=130) = 5mm = 10px -->
  <!-- Cutout end y=125*2+60=310, rear edge y=130*2+60=320 -->
  <line x1="250" y1="310" x2="250" y2="320" class="dim" marker-start="url(#ah-rev)" marker-end="url(#ah)"/>
  <text x="264" y="318" class="dimtext" style="font-size:8px">5</text>

  <!-- Cutout center X position from left edge: 66.5mm -->
  <line x1="80" y1="324" x2="213" y2="324" class="dim" marker-start="url(#ah-rev)" marker-end="url(#ah)"/>
  <text x="146" y="322" class="dimtext" style="font-size:8px">66.5</text>

  <!-- Hole diameter callout (leader from one hole) -->
  <line x1="363" y1="73" x2="390" y2="55" class="dim"/>
  <text x="392" y="54" class="dimtext" style="text-anchor:start; font-size:8px">6x &#x2300;3.4 THRU</text>

  <!-- ===== FRONT VIEW ===== -->
  <!-- Scale 2:1, aligned with top view X. Origin at (80, 400) -->
  <!-- 148mm W = 296px, 3mm H = 6px -->
  <text x="228" y="392" class="label">FRONT VIEW (2:1)</text>

  <!-- Lid outline -->
  <rect x="80" y="400" width="296" height="6" class="outline"/>

  <!-- Hidden lines for screw holes in front row (Y=8mm) — these are circles seen from front, axis along Z -->
  <!-- Holes are 3.4mm dia cylinders along Z. Front view sees them as hidden rectangles (behind front face) -->
  <!-- Actually at Y=8mm they are behind the front surface - show as hidden vertical lines -->
  <!-- Hole at X=8: px 96, top of lid=400, bottom=406 -->
  <line x1="92.6" y1="400" x2="92.6" y2="406" class="hidden-micro"/>
  <line x1="99.4" y1="400" x2="99.4" y2="406" class="hidden-micro"/>
  <!-- Hole at X=74: px 228 -->
  <line x1="224.6" y1="400" x2="224.6" y2="406" class="hidden-micro"/>
  <line x1="231.4" y1="400" x2="231.4" y2="406" class="hidden-micro"/>
  <!-- Hole at X=140: px 360 -->
  <line x1="356.6" y1="400" x2="356.6" y2="406" class="hidden-micro"/>
  <line x1="363.4" y1="400" x2="363.4" y2="406" class="hidden-micro"/>

  <!-- Height dimension 3mm -->
  <line x1="382" y1="400" x2="410" y2="400" class="dim"/>
  <line x1="382" y1="406" x2="410" y2="406" class="dim"/>
  <line x1="400" y1="395" x2="400" y2="411" class="dim" marker-start="url(#ah-rev)" marker-end="url(#ah)"/>
  <text x="420" y="405" class="dimtext" style="text-anchor:start; font-size:9px">3</text>

  <!-- Width 148mm -->
  <line x1="80" y1="414" x2="80" y2="420" class="dim"/>
  <line x1="376" y1="414" x2="376" y2="420" class="dim"/>
  <line x1="80" y1="417" x2="376" y2="417" class="dim" marker-start="url(#ah-rev)" marker-end="url(#ah)"/>
  <text x="228" y="427" class="dimtext">148</text>

  <!-- ===== SIDE VIEW ===== -->
  <!-- Scale 2:1. Looking along -X. Horizontal = Y (depth), Vertical = Z (height) -->
  <!-- Aligned with front view Z range. Origin at (480, 400) -->
  <!-- 130mm D = 260px, 3mm H = 6px -->
  <text x="610" y="392" class="label">RIGHT SIDE VIEW (2:1)</text>

  <!-- Lid outline -->
  <rect x="480" y="400" width="260" height="6" class="outline"/>

  <!-- Hidden lines for screw holes at Y=8mm and Y=122mm -->
  <!-- Y=8mm -> px 8*2+480=496 -->
  <line x1="492.6" y1="400" x2="492.6" y2="406" class="hidden-micro"/>
  <line x1="499.4" y1="400" x2="499.4" y2="406" class="hidden-micro"/>
  <!-- Y=122mm -> px 122*2+480=724 -->
  <line x1="720.6" y1="400" x2="720.6" y2="406" class="hidden-micro"/>
  <line x1="727.4" y1="400" x2="727.4" y2="406" class="hidden-micro"/>

  <!-- Pogo cutout in side view: Y=95 to Y=125 (30mm), full 3mm height -->
  <!-- px: Y=95 -> 95*2+480=670, Y=125 -> 125*2+480=730 -->
  <!-- Cutout is behind surface (only spans X=66.5..81.5), show as hidden -->
  <line x1="670" y1="400" x2="670" y2="406" class="hidden-micro"/>
  <line x1="730" y1="400" x2="730" y2="406" class="hidden-micro"/>

  <!-- Depth 130mm -->
  <line x1="480" y1="414" x2="480" y2="420" class="dim"/>
  <line x1="740" y1="414" x2="740" y2="420" class="dim"/>
  <line x1="480" y1="417" x2="740" y2="417" class="dim" marker-start="url(#ah-rev)" marker-end="url(#ah)"/>
  <text x="610" y="427" class="dimtext">130</text>

  <!-- Height dimension 3mm -->
  <line x1="746" y1="400" x2="770" y2="400" class="dim"/>
  <line x1="746" y1="406" x2="770" y2="406" class="dim"/>
  <line x1="760" y1="395" x2="760" y2="411" class="dim" marker-start="url(#ah-rev)" marker-end="url(#ah)"/>
  <text x="778" y="405" class="dimtext" style="text-anchor:start; font-size:9px">3</text>

  <!-- ===== DETAIL A: FRONT CROSS-SECTION (8:1) ===== -->
  <!-- Shows a portion of the front view at 8:1 scale to reveal the thin cross section -->
  <!-- Show ~25mm of width centered on a screw hole at X=8mm -->
  <!-- 8:1 scale: 1mm = 8px, 25mm = 200px, 3mm = 24px -->
  <!-- Origin at (80, 490) -->

  <text x="180" y="475" class="label">DETAIL A — FRONT SECTION (8:1)</text>
  <rect x="70" y="480" width="220" height="60" class="detail-frame"/>

  <!-- Cross section: showing X=0..25mm at 8:1 -->
  <!-- Lid body rectangle: full 25mm width = 200px, 3mm height = 24px -->
  <rect x="80" y="498" width="200" height="24" class="outline"/>
  <!-- Section hatch fill -->
  <rect x="80" y="498" width="200" height="24" class="section"/>

  <!-- Cross-section hatch lines (45-degree) -->
  <clipPath id="hatch-clip">
    <rect x="80" y="498" width="200" height="24"/>
  </clipPath>
  <g clip-path="url(#hatch-clip)" stroke="#000" stroke-width="0.3">
    <line x1="80" y1="522" x2="104" y2="498"/>
    <line x1="88" y1="522" x2="112" y2="498"/>
    <line x1="96" y1="522" x2="120" y2="498"/>
    <line x1="104" y1="522" x2="128" y2="498"/>
    <line x1="112" y1="522" x2="136" y2="498"/>
    <line x1="120" y1="522" x2="144" y2="498"/>
    <line x1="128" y1="522" x2="152" y2="498"/>
    <line x1="136" y1="522" x2="160" y2="498"/>
    <line x1="144" y1="522" x2="168" y2="498"/>
    <line x1="152" y1="522" x2="176" y2="498"/>
    <line x1="160" y1="522" x2="184" y2="498"/>
    <line x1="168" y1="522" x2="192" y2="498"/>
    <line x1="176" y1="522" x2="200" y2="498"/>
    <line x1="184" y1="522" x2="208" y2="498"/>
    <line x1="192" y1="522" x2="216" y2="498"/>
    <line x1="200" y1="522" x2="224" y2="498"/>
    <line x1="208" y1="522" x2="232" y2="498"/>
    <line x1="216" y1="522" x2="240" y2="498"/>
    <line x1="224" y1="522" x2="248" y2="498"/>
    <line x1="232" y1="522" x2="256" y2="498"/>
    <line x1="240" y1="522" x2="264" y2="498"/>
    <line x1="248" y1="522" x2="272" y2="498"/>
    <line x1="256" y1="522" x2="280" y2="498"/>
  </g>

  <!-- Screw hole at X=8mm from left: center at 8*8+80=144, shown as circle break in section -->
  <!-- Hole is 3.4mm dia = 27.2px dia = 13.6px radius -->
  <!-- Show as a void in the cross-section -->
  <circle cx="144" cy="510" r="13.6" fill="white" stroke="#000" stroke-width="1"/>
  <line x1="144" y1="493" x2="144" y2="527" class="center"/>
  <line x1="127" y1="510" x2="161" y2="510" class="center"/>

  <!-- Hole diameter callout in detail -->
  <line x1="154" y1="500" x2="175" y2="488" class="dim"/>
  <text x="177" y="488" class="dimtext" style="text-anchor:start; font-size:8px">&#x2300;3.4 THRU</text>

  <!-- Height dimension in detail: 3mm = 24px -->
  <line x1="283" y1="498" x2="288" y2="498" class="dim"/>
  <line x1="283" y1="522" x2="288" y2="522" class="dim"/>
  <line x1="285" y1="494" x2="285" y2="526" class="dim" marker-start="url(#ah-rev)" marker-end="url(#ah)"/>
  <text x="285" y="492" class="dimtext" style="font-size:9px">3</text>

  <!-- ===== DETAIL B: POGO CUTOUT AREA (4:1) ===== -->
  <!-- Shows the pogo PCB cutout region from top view at 4:1 scale -->
  <!-- Show ~40mm W x 40mm D region centered on cutout -->
  <!-- 4:1 scale: 1mm = 4px. 40mm = 160px -->
  <!-- Origin at (370, 490) -->

  <text x="480" y="475" class="label">DETAIL B — POGO CUTOUT (4:1 TOP)</text>
  <rect x="370" y="480" width="220" height="180" class="detail-frame"/>

  <!-- Showing region X=54..94mm (40mm), Y=90..130mm (40mm) -->
  <!-- px: x_px = (X_mm - 54)*4 + 380, y_px = (Y_mm - 90)*4 + 490 -->

  <!-- Lid body in this region: full rectangle, then cutout -->
  <rect x="380" y="490" width="160" height="160" class="outline"/>

  <!-- Rear edge of lid at Y=130: y_px = (130-90)*4+490 = 650 -->
  <!-- Cutout: X=66.5..81.5, Y=95..125 -->
  <!-- x_px: (66.5-54)*4+380=430, (81.5-54)*4+380=490 -->
  <!-- y_px: (95-90)*4+490=510, (125-90)*4+490=630 -->
  <rect x="430" y="510" width="60" height="120" class="outline"/>

  <!-- Dimension: cutout width 15mm -->
  <line x1="430" y1="656" x2="490" y2="656" class="dim" marker-start="url(#ah-rev)" marker-end="url(#ah)"/>
  <text x="460" y="668" class="dimtext" style="font-size:8px">15</text>
  <line x1="430" y1="650" x2="430" y2="660" class="dim" stroke-dasharray="1,1"/>
  <line x1="490" y1="650" x2="490" y2="660" class="dim" stroke-dasharray="1,1"/>

  <!-- Dimension: cutout length 30mm -->
  <line x1="498" y1="510" x2="498" y2="630" class="dim" marker-start="url(#ah-rev)" marker-end="url(#ah)"/>
  <text x="510" y="574" class="dimtext" style="font-size:8px">30</text>

  <!-- Dimension: 5mm from cutout end to rear edge -->
  <line x1="500" y1="630" x2="500" y2="650" class="dim" marker-start="url(#ah-rev)" marker-end="url(#ah)"/>
  <text x="514" y="644" class="dimtext" style="font-size:8px">5</text>

  <!-- Dimension: cutout centered at X=74, distance from left edge (X=0) not shown here -->
  <!-- Show distance from cutout left edge to visible left edge: X=66.5 - X=54 = 12.5mm -->

  <!-- Screw holes near cutout: (74,122) -> (74-54)*4+380=460, (122-90)*4+490=618 -->
  <circle cx="460" cy="618" r="6.8" class="outline"/>
  <line x1="460" y1="608" x2="460" y2="628" class="center"/>
  <line x1="450" y1="618" x2="470" y2="618" class="center"/>

  <!-- Rear edge of lid is the bottom of this view at y=650 -->
  <!-- Show rear edge dimension from hole center to rear edge: 130-122=8mm -->
  <line x1="448" y1="618" x2="448" y2="650" class="dim" marker-start="url(#ah-rev)" marker-end="url(#ah)"/>
  <text x="438" y="638" class="dimtext" style="font-size:8px">8</text>

  <!-- ===== NOTES ===== -->
  <text x="80" y="700" class="note" font-weight="bold">NOTES:</text>
  <text x="80" y="714" class="note">1. MATERIAL: PETG, 3D PRINTED</text>
  <text x="80" y="728" class="note">2. ALL DIMENSIONS IN MM</text>
  <text x="80" y="742" class="note">3. 6x M3 SCREW CLEARANCE HOLES (&#x2300;3.4mm) THRU, EQUALLY SPACED ON PERIMETER</text>
  <text x="80" y="756" class="note">4. POGO PCB CUTOUT: 15W x 30L mm, POSITIONED TO CLEAR SHELL TOP-FACE PCB POCKET</text>
  <text x="80" y="770" class="note">5. LID SITS FLAT ON OUTER SHELL TOP EDGES, SECURED BY SCREWS OR SNAP CLIPS</text>
  <text x="80" y="784" class="note">6. SCREW HOLE COUNT (4-6) AND ATTACHMENT METHOD (SCREW VS SNAP) TBD — 6 SHOWN AS BASELINE</text>

  <!-- ===== TITLE BLOCK ===== -->
  <rect x="600" y="700" width="280" height="100" class="frame"/>
  <line x1="600" y1="720" x2="880" y2="720" class="frame"/>
  <line x1="600" y1="740" x2="880" y2="740" class="frame"/>
  <line x1="600" y1="760" x2="880" y2="760" class="frame"/>
  <line x1="600" y1="780" x2="880" y2="780" class="frame"/>
  <line x1="740" y1="700" x2="740" y2="800" class="frame"/>

  <text x="610" y="715" class="titletext">TITLE:</text>
  <text x="750" y="715" class="title">LID</text>
  <text x="610" y="735" class="titletext">PROJECT:</text>
  <text x="750" y="735" class="titletext">SODA FLAVOR INJECTOR — PUMP CARTRIDGE</text>
  <text x="610" y="755" class="titletext">MATERIAL:</text>
  <text x="750" y="755" class="titletext">PETG (3D PRINTED)</text>
  <text x="610" y="775" class="titletext">SCALE:</text>
  <text x="750" y="775" class="titletext">VIEWS: 2:1 / DETAILS: 4:1, 8:1</text>
  <text x="610" y="795" class="titletext">DIMS:</text>
  <text x="750" y="795" class="titletext">148W x 130D x 3H mm</text>
</svg>