<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 780" width="960" height="780" font-family="Arial, Helvetica, sans-serif">
  <title>Dip Tube Tip Piece (Air Collection Bar) — Engineering Drawing</title>

  <defs>
    <marker id="arr" viewBox="0 0 10 6" refX="10" refY="3"
            markerWidth="10" markerHeight="6" orient="auto-start-reverse"
            fill="none" stroke="#000" stroke-width="0.8">
      <path d="M0,0 L10,3 L0,6"/>
    </marker>
    <style>
      .outline { fill: none; stroke: #000; stroke-width: 1.2; }
      .hidden  { fill: none; stroke: #000; stroke-width: 0.7; stroke-dasharray: 4,3; }
      .center  { fill: none; stroke: #000; stroke-width: 0.4; stroke-dasharray: 12,3,2,3; }
      .dim     { fill: none; stroke: #000; stroke-width: 0.5; }
      .ext     { fill: none; stroke: #000; stroke-width: 0.4; }
      .dimtxt  { font-size: 10px; text-anchor: middle; fill: #000; }
      .label   { font-size: 12px; font-weight: bold; text-anchor: middle; fill: #000; }
      .note    { font-size: 9px; fill: #000; }
      .title   { font-size: 11px; font-weight: bold; fill: #000; }
      .titledata { font-size: 10px; fill: #000; }
      .frame   { fill: none; stroke: #000; stroke-width: 0.6; }
      .rib     { fill: none; stroke: #000; stroke-width: 0.6; }
    </style>
  </defs>

  <!-- Drawing border -->
  <rect x="5" y="5" width="950" height="770" fill="none" stroke="#000" stroke-width="1"/>

  <!-- ============================================================ -->
  <!--  FRONT VIEW  (looking along -Y)                              -->
  <!--  Horizontal = X (bar length 185mm), Vertical = Z (height)    -->
  <!--  Scale: 4 px/mm                                              -->
  <!--  Bar body: 185mm long x 14mm tall, ribs add 1.5mm top/bottom -->
  <!--  Left end at px x=40, body vertical center at py y=120       -->
  <!--  Body top y=92, body bottom y=148                            -->
  <!-- ============================================================ -->
  <text x="410" y="30" class="label">FRONT VIEW</text>

  <!-- Body rectangle: 740px x 56px -->
  <rect x="40" y="92" width="740" height="56" class="outline"/>

  <!-- Rib bands (looking along -Y, all 4 ribs per face overlap into one band) -->
  <!-- Top rib band: 1.5mm = 6px tall, touching body top at y=92 -->
  <rect x="40" y="86" width="740" height="6" class="outline"/>
  <!-- Bottom rib band: 1.5mm = 6px tall, touching body bottom at y=148 -->
  <rect x="40" y="148" width="740" height="6" class="outline"/>

  <!-- Central tube socket bore (hidden — internal, axis along X = bar length) -->
  <!-- In front view (looking -Y), bore axis X is horizontal — appears as RECTANGLE -->
  <!-- Bore 6.25mm = 25px tall in Z, 18mm = 72px long in X -->
  <!-- Centered at X=92.5mm = x=410, centered in Z at y=120 -->
  <!-- Socket extends from x=374 to x=446 (72px), bore edges at y=107.5 and y=132.5 -->
  <line x1="374" y1="107.5" x2="446" y2="107.5" class="hidden"/>
  <line x1="374" y1="132.5" x2="446" y2="132.5" class="hidden"/>
  <line x1="374" y1="107.5" x2="374" y2="132.5" class="hidden"/>
  <line x1="446" y1="107.5" x2="446" y2="132.5" class="hidden"/>

  <!-- Center lines -->
  <line x1="30" y1="120" x2="790" y2="120" class="center"/>
  <line x1="410" y1="76" x2="410" y2="164" class="center"/>

  <!-- DIM: overall length 185mm -->
  <line x1="40" y1="168" x2="40" y2="182" class="ext"/>
  <line x1="780" y1="168" x2="780" y2="182" class="ext"/>
  <line x1="40" y1="178" x2="780" y2="178" class="dim" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="410" y="192" class="dimtxt">185</text>

  <!-- DIM: body height 14mm -->
  <line x1="790" y1="92" x2="808" y2="92" class="ext"/>
  <line x1="790" y1="148" x2="808" y2="148" class="ext"/>
  <line x1="802" y1="92" x2="802" y2="148" class="dim" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="826" y="124" class="dimtxt">14</text>

  <!-- DIM: overall height with ribs 17mm -->
  <line x1="840" y1="86" x2="858" y2="86" class="ext"/>
  <line x1="840" y1="154" x2="858" y2="154" class="ext"/>
  <line x1="852" y1="86" x2="852" y2="154" class="dim" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="878" y="124" class="dimtxt">17</text>

  <!-- DIM: rib height 1.5mm (top side) -->
  <line x1="24" y1="86" x2="36" y2="86" class="ext"/>
  <line x1="24" y1="92" x2="36" y2="92" class="ext"/>
  <line x1="30" y1="86" x2="30" y2="92" class="dim" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="18" y="82" class="dimtxt">1.5</text>

  <!-- DIM: bore diameter callout -->
  <line x1="446" y1="107.5" x2="472" y2="78" class="dim"/>
  <text x="520" y="76" class="dimtxt">&#x2300;6.25 BORE x 18 DEEP</text>

  <!-- DIM: socket center from left end 92.5mm -->
  <line x1="40" y1="198" x2="40" y2="210" class="ext"/>
  <line x1="410" y1="198" x2="410" y2="210" class="ext"/>
  <line x1="40" y1="206" x2="410" y2="206" class="dim" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="225" y="220" class="dimtxt">92.5 (centered)</text>

  <!-- ============================================================ -->
  <!--  SIDE VIEW  (looking along -X, from right end)               -->
  <!--  Horizontal = Y (bar width 22mm), Vertical = Z (height)      -->
  <!--  Scale: 4 px/mm                                              -->
  <!--  Body center at view px (130, 340)                           -->
  <!--  Body: y 86..174, z 312..368                                 -->
  <!-- ============================================================ -->
  <text x="130" y="260" class="label">SIDE VIEW</text>

  <!-- Body rectangle: 22mm x 14mm = 88px x 56px -->
  <rect x="86" y="312" width="88" height="56" class="outline"/>

  <!-- Top ribs: 4 ribs, each 3mm wide = 12px, 1.5mm tall = 6px -->
  <!-- Rib Y centers at 3.5, 8.5, 13.5, 18.5mm from body left edge -->
  <!-- Pixel Y centers: 86+14=100, 86+34=120, 86+54=140, 86+74=160 -->
  <!-- Rib left edges: 94, 114, 134, 154. Tops at y=306, bottoms at y=312 -->
  <rect x="94"  y="306" width="12" height="6" class="outline"/>
  <rect x="114" y="306" width="12" height="6" class="outline"/>
  <rect x="134" y="306" width="12" height="6" class="outline"/>
  <rect x="154" y="306" width="12" height="6" class="outline"/>

  <!-- Bottom ribs: tops at y=368, bottoms at y=374 -->
  <rect x="94"  y="368" width="12" height="6" class="outline"/>
  <rect x="114" y="368" width="12" height="6" class="outline"/>
  <rect x="134" y="368" width="12" height="6" class="outline"/>
  <rect x="154" y="368" width="12" height="6" class="outline"/>

  <!-- Tube socket bore (axis along X, looking along -X = circle) -->
  <!-- Bore diameter 6.25mm = 25px, centered in body at (130, 340) -->
  <circle cx="130" cy="340" r="12.5" class="hidden"/>

  <!-- Center lines -->
  <line x1="76" y1="340" x2="184" y2="340" class="center"/>
  <line x1="130" y1="296" x2="130" y2="384" class="center"/>

  <!-- DIM: cross-section width 22mm -->
  <line x1="86" y1="388" x2="86" y2="400" class="ext"/>
  <line x1="174" y1="388" x2="174" y2="400" class="ext"/>
  <line x1="86" y1="396" x2="174" y2="396" class="dim" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="130" y="412" class="dimtxt">22</text>

  <!-- DIM: body height 14mm -->
  <line x1="182" y1="312" x2="200" y2="312" class="ext"/>
  <line x1="182" y1="368" x2="200" y2="368" class="ext"/>
  <line x1="194" y1="312" x2="194" y2="368" class="dim" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="216" y="344" class="dimtxt">14</text>

  <!-- DIM: rib width 3mm -->
  <line x1="94" y1="298" x2="94" y2="290" class="ext"/>
  <line x1="106" y1="298" x2="106" y2="290" class="ext"/>
  <line x1="94" y1="292" x2="106" y2="292" class="dim" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="100" y="286" class="dimtxt">3</text>

  <!-- DIM: rib spacing 5mm c-c -->
  <line x1="100" y1="298" x2="100" y2="276" class="ext"/>
  <line x1="120" y1="298" x2="120" y2="276" class="ext"/>
  <line x1="100" y1="278" x2="120" y2="278" class="dim" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="110" y="272" class="dimtxt">5 c-c</text>

  <!-- 28mm constraint circle (phantom line) -->
  <circle cx="130" cy="340" r="56" fill="none" stroke="#666" stroke-width="0.5" stroke-dasharray="6,3,2,3"/>
  <text x="130" y="252" class="dimtxt" style="fill:#666">&#x2300;28 cap constraint</text>

  <!-- ============================================================ -->
  <!--  TOP VIEW  (looking along -Z, from above)                    -->
  <!--  Horizontal = X (bar length 185mm), Vertical = Y (width 22mm)-->
  <!--  Scale: 4 px/mm                                              -->
  <!--  Left end at px x=190, body vertical center at py y=540      -->
  <!--  Body top y=496, body bottom y=584                           -->
  <!-- ============================================================ -->
  <text x="560" y="440" class="label">TOP VIEW</text>

  <!-- Body rectangle: 740px x 88px -->
  <rect x="190" y="496" width="740" height="88" class="outline"/>

  <!-- Top-face rib edges (visible surface features running full length) -->
  <!-- 4 ribs, 3mm wide, centered across 22mm width -->
  <!-- Rib Y centers at 3.5, 8.5, 13.5, 18.5mm from body top edge -->
  <!-- Rib edges (top/bottom of each 3mm rib): -->
  <!-- Rib 1: 2-5mm = y 504..516 -->
  <!-- Rib 2: 7-10mm = y 524..536 -->
  <!-- Rib 3: 12-15mm = y 544..556 -->
  <!-- Rib 4: 17-20mm = y 564..576 -->
  <line x1="190" y1="504" x2="930" y2="504" class="rib"/>
  <line x1="190" y1="516" x2="930" y2="516" class="rib"/>
  <line x1="190" y1="524" x2="930" y2="524" class="rib"/>
  <line x1="190" y1="536" x2="930" y2="536" class="rib"/>
  <line x1="190" y1="544" x2="930" y2="544" class="rib"/>
  <line x1="190" y1="556" x2="930" y2="556" class="rib"/>
  <line x1="190" y1="564" x2="930" y2="564" class="rib"/>
  <line x1="190" y1="576" x2="930" y2="576" class="rib"/>

  <!-- Tube socket bore (axis along X = bar length axis) -->
  <!-- In top view (looking -Z), bore axis X is horizontal = RECTANGLE -->
  <!-- Socket is 18mm deep = 72px along X, bore dia 6.25mm = 25px in Y -->
  <!-- Socket centered at X=92.5mm from left end -->
  <!-- Socket opening at one end, extends 18mm along bar -->
  <!-- Center at x=560, bore half-width in Y = 12.5px -->
  <!-- Socket extends 72px along X, centered: x=524..596 -->
  <line x1="524" y1="527.5" x2="596" y2="527.5" class="hidden"/>
  <line x1="524" y1="552.5" x2="596" y2="552.5" class="hidden"/>
  <line x1="524" y1="527.5" x2="524" y2="552.5" class="hidden"/>
  <line x1="596" y1="527.5" x2="596" y2="552.5" class="hidden"/>

  <!-- Center lines -->
  <line x1="180" y1="540" x2="940" y2="540" class="center"/>
  <line x1="560" y1="486" x2="560" y2="594" class="center"/>

  <!-- DIM: overall length 185mm -->
  <line x1="190" y1="598" x2="190" y2="614" class="ext"/>
  <line x1="930" y1="598" x2="930" y2="614" class="ext"/>
  <line x1="190" y1="610" x2="930" y2="610" class="dim" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="560" y="624" class="dimtxt">185</text>

  <!-- DIM: width 22mm -->
  <line x1="938" y1="496" x2="952" y2="496" class="ext"/>
  <line x1="938" y1="584" x2="952" y2="584" class="ext"/>
  <line x1="948" y1="496" x2="948" y2="584" class="dim" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="948" y="488" class="dimtxt">22</text>

  <!-- ============================================================ -->
  <!--  NOTES BLOCK                                                 -->
  <!-- ============================================================ -->
  <rect x="490" y="650" width="460" height="115" class="frame"/>
  <text x="500" y="666" class="title">NOTES</text>
  <text x="500" y="681" class="note">1. Material: PETG (FDM) or SLS nylon — only fluid-contact 3D-printed part</text>
  <text x="500" y="693" class="note">2. Cross-section diagonal = 26.1mm; must fit through &#x2300;28mm cap opening</text>
  <text x="500" y="705" class="note">3. Central socket: &#x2300;6.25mm friction-fit bore for 1/4" OD (6.35mm) hard tube</text>
  <text x="500" y="717" class="note">4. Socket depth: 18mm along bar length axis; 1mm x 45&#xb0; entry chamfer</text>
  <text x="500" y="729" class="note">5. Air channel ribs: 4 per face (top + bottom), full 185mm length</text>
  <text x="500" y="741" class="note">6. Ship-in-a-bottle: insert lengthwise through 28mm cap, rotate 90&#xb0; inside bag</text>
  <text x="500" y="753" class="note">7. All dimensions in mm. Tol: &#xb1;0.2mm general, &#xb1;0.05mm bore diameter</text>

  <!-- ============================================================ -->
  <!--  TITLE BLOCK                                                 -->
  <!-- ============================================================ -->
  <rect x="15" y="650" width="465" height="115" class="frame"/>
  <line x1="15" y1="672" x2="480" y2="672" class="frame"/>
  <text x="248" y="666" class="title">DIP TUBE TIP PIECE — AIR COLLECTION BAR</text>
  <text x="25" y="690" class="titledata">Part: 3D Printed Air Collection Bar</text>
  <text x="25" y="706" class="titledata">Project: Soda Flavor Injector — Enclosure</text>
  <text x="25" y="722" class="titledata">Material: PETG (FDM) / Nylon (SLS)</text>
  <text x="25" y="738" class="titledata">Scale: 4:1 (4 px/mm)</text>
  <text x="25" y="754" class="titledata">Units: mm</text>
  <text x="280" y="690" class="titledata">Qty: 2 (one per bag)</text>
  <text x="280" y="706" class="titledata">Fits: Platypus 2L bag (~190mm wide)</text>
  <text x="280" y="722" class="titledata">Tube: 1/4" OD hard PE dip tube</text>
  <text x="280" y="738" class="titledata">Body: 185L x 22W x 14H mm</text>
  <text x="280" y="754" class="titledata">Overall: 185L x 22W x 17H mm (with ribs)</text>

</svg>