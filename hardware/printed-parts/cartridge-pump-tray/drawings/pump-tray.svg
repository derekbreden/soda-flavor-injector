<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 950" width="1050" height="950" font-family="Arial, Helvetica, sans-serif">
  <title>Pump Tray — Engineering Drawing</title>

  <defs>
    <style>
      .outline   { fill:none; stroke:#000; stroke-width:1.5; }
      .hidden    { fill:none; stroke:#000; stroke-width:0.75; stroke-dasharray:4,3; }
      .phantom   { fill:none; stroke:#07c; stroke-width:0.75; stroke-dasharray:8,3,2,3; }
      .center    { fill:none; stroke:#000; stroke-width:0.35; stroke-dasharray:8,3,2,3; }
      .dim       { fill:none; stroke:#000; stroke-width:0.5; }
      .dimtext   { font-size:10px; text-anchor:middle; fill:#000; }
      .label     { font-size:12px; font-weight:bold; text-anchor:middle; fill:#000; }
      .note      { font-size:9px; fill:#000; }
      .title     { font-size:14px; font-weight:bold; fill:#000; }
      .titletext { font-size:10px; fill:#000; }
      .frame     { fill:none; stroke:#000; stroke-width:1; }
      .boss      { fill:none; stroke:#000; stroke-width:1; }
    </style>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000"/>
    </marker>
    <marker id="ah-rev" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- Drawing border -->
  <rect x="5" y="5" width="1040" height="940" class="frame"/>

  <!-- ============================================================ -->
  <!-- AXIS LOOKUP TABLE (for self-review)                          -->
  <!-- Front view: looking along -Y, H=X, V=Z                      -->
  <!-- Side view:  looking along -X, H=Y, V=Z                      -->
  <!-- Top view:   looking along -Z, H=X, V=Y                      -->
  <!-- Scale: 3.5 px/mm                                             -->
  <!-- Tray envelope: 138W x 120D x 6H mm                          -->
  <!-- Top view: 483px W x 420px D                                  -->
  <!-- Front view: 483px W x 21px H (shares X range with top)      -->
  <!-- Side view: 420px D x 21px H (shares Z range with front)     -->
  <!-- ============================================================ -->

  <!-- ===== TOP VIEW ===== -->
  <!-- Origin at (60, 50). X right, Y down (maps to +Y depth).     -->
  <!-- Tray: 138mm W = 483px, 120mm D = 420px                      -->
  <text x="301" y="28" class="label">TOP VIEW (3.5:1)</text>

  <!-- Tray outline -->
  <rect x="60" y="50" width="483" height="420" class="outline"/>

  <!-- ── Pump phantom outlines (top view sees pump head rectangles) ── -->
  <!-- Pumps side-by-side, motors same direction (rear).               -->
  <!-- Pump 1 centered at X=34.5mm, Pump 2 at X=103.5mm.              -->
  <!-- Each pump: 116.48mm long, centered at Y=60mm.                   -->
  <!-- Front face at Y=60-116.48/2=1.76, rear at Y=118.24.            -->

  <!-- Pump 1: pump head phantom (front 48mm, 62.6mm wide) -->
  <!-- X: 34.5-31.3=3.2 to 65.8mm. Y: 1.76 to 49.76mm -->
  <!-- px: x1=3.2*3.5+60=71.2, w=62.6*3.5=219.1, y1=1.76*3.5+50=56.2, h=48*3.5=168 -->
  <rect x="71.2" y="56.2" width="219.1" height="168" class="phantom"/>
  <!-- Pump 1: motor body (~35mm dia) Y: 52..118.24mm -->
  <!-- X: 34.5-17.5=17 to 52mm. px: x1=17*3.5+60=119.5, w=35*3.5=122.5 -->
  <!-- py: y1=52*3.5+50=232, h=66.24*3.5=231.8 -->
  <rect x="119.5" y="232" width="122.5" height="231.8" class="phantom"/>

  <!-- Pump 2: pump head phantom -->
  <!-- X: 103.5-31.3=72.2 to 134.8mm. px: x1=72.2*3.5+60=312.7 -->
  <rect x="312.7" y="56.2" width="219.1" height="168" class="phantom"/>
  <!-- Pump 2: motor body -->
  <!-- X: 103.5-17.5=86 to 121mm. px: x1=86*3.5+60=361 -->
  <rect x="361" y="232" width="122.5" height="231.8" class="phantom"/>

  <!-- Phantom labels -->
  <text x="180" y="155" style="font-size:8px; fill:#07c; text-anchor:middle;">PUMP 1 (PHANTOM)</text>
  <text x="422" y="155" style="font-size:8px; fill:#07c; text-anchor:middle;">PUMP 2 (PHANTOM)</text>

  <!-- ── Mounting hole bosses (top view: circles) ── -->
  <!-- 4x bosses: 8mm OD (r=14px), 4mm pilot (r=7px) -->
  <!-- Bracket at Y=48mm (junction between head and motor) -->
  <!-- Pump 1 holes: X=9.775mm, X=59.225mm at Y=48mm -->
  <!-- Pump 2 holes: X=78.775mm, X=128.225mm at Y=48mm -->
  <!-- px Y: 48*3.5+50=218 -->

  <!-- Boss 1: X=9.775mm -> 9.775*3.5+60=94.2 -->
  <circle cx="94.2" cy="218" r="14" class="boss"/>
  <circle cx="94.2" cy="218" r="7" class="hidden"/>
  <line x1="94.2" y1="201" x2="94.2" y2="235" class="center"/>
  <line x1="77.2" y1="218" x2="111.2" y2="218" class="center"/>

  <!-- Boss 2: X=59.225mm -> 59.225*3.5+60=267.3 -->
  <circle cx="267.3" cy="218" r="14" class="boss"/>
  <circle cx="267.3" cy="218" r="7" class="hidden"/>
  <line x1="267.3" y1="201" x2="267.3" y2="235" class="center"/>
  <line x1="250.3" y1="218" x2="284.3" y2="218" class="center"/>

  <!-- Boss 3: X=78.775mm -> 78.775*3.5+60=335.7 -->
  <circle cx="335.7" cy="218" r="14" class="boss"/>
  <circle cx="335.7" cy="218" r="7" class="hidden"/>
  <line x1="335.7" y1="201" x2="335.7" y2="235" class="center"/>
  <line x1="318.7" y1="218" x2="352.7" y2="218" class="center"/>

  <!-- Boss 4: X=128.225mm -> 128.225*3.5+60=508.8 -->
  <circle cx="508.8" cy="218" r="14" class="boss"/>
  <circle cx="508.8" cy="218" r="7" class="hidden"/>
  <line x1="508.8" y1="201" x2="508.8" y2="235" class="center"/>
  <line x1="491.8" y1="218" x2="525.8" y2="218" class="center"/>

  <!-- ── Corner through-holes (3.4mm dia = 11.9px dia, r=5.95px) ── -->
  <!-- Inset 6mm from edges: (6,6), (132,6), (6,114), (132,114) -->

  <!-- Corner hole 1: (6,6) -> (6*3.5+60, 6*3.5+50) = (81, 71) -->
  <circle cx="81" cy="71" r="5.95" class="outline"/>
  <line x1="81" y1="62" x2="81" y2="80" class="center"/>
  <line x1="72" y1="71" x2="90" y2="71" class="center"/>

  <!-- Corner hole 2: (132,6) -> (132*3.5+60, 71) = (522, 71) -->
  <circle cx="522" cy="71" r="5.95" class="outline"/>
  <line x1="522" y1="62" x2="522" y2="80" class="center"/>
  <line x1="513" y1="71" x2="531" y2="71" class="center"/>

  <!-- Corner hole 3: (6,114) -> (81, 114*3.5+50) = (81, 449) -->
  <circle cx="81" cy="449" r="5.95" class="outline"/>
  <line x1="81" y1="440" x2="81" y2="458" class="center"/>
  <line x1="72" y1="449" x2="90" y2="449" class="center"/>

  <!-- Corner hole 4: (132,114) -> (522, 449) -->
  <circle cx="522" cy="449" r="5.95" class="outline"/>
  <line x1="522" y1="440" x2="522" y2="458" class="center"/>
  <line x1="513" y1="449" x2="531" y2="449" class="center"/>

  <!-- ── Wire routing channel (5mm wide x 3mm deep along left edge) ── -->
  <!-- Top view: shows as 5mm wide strip, X=0..5mm, full depth -->
  <!-- px: x=60 to 60+5*3.5=77.5, y=50 to 470 -->
  <line x1="77.5" y1="50" x2="77.5" y2="470" class="hidden"/>

  <!-- ── TOP VIEW DIMENSIONS ── -->

  <!-- Width 138mm across top -->
  <line x1="60" y1="40" x2="60" y2="46" class="dim"/>
  <line x1="543" y1="40" x2="543" y2="46" class="dim"/>
  <line x1="60" y1="43" x2="543" y2="43" class="dim" marker-start="url(#ah-rev)" marker-end="url(#ah)"/>
  <text x="301" y="39" class="dimtext">138</text>

  <!-- Depth 120mm on right side -->
  <line x1="549" y1="50" x2="570" y2="50" class="dim"/>
  <line x1="549" y1="470" x2="570" y2="470" class="dim"/>
  <line x1="560" y1="50" x2="560" y2="470" class="dim" marker-start="url(#ah-rev)" marker-end="url(#ah)"/>
  <text x="560" y="264" class="dimtext" transform="rotate(-90,560,264)">120</text>

  <!-- Mounting hole c-c 49.45mm (Pump 1: B1 to B2) -->
  <line x1="94.2" y1="238" x2="94.2" y2="256" class="dim" stroke-dasharray="1,1"/>
  <line x1="267.3" y1="238" x2="267.3" y2="256" class="dim" stroke-dasharray="1,1"/>
  <line x1="94.2" y1="252" x2="267.3" y2="252" class="dim" marker-start="url(#ah-rev)" marker-end="url(#ah)"/>
  <text x="180.7" y="266" class="dimtext">49.45</text>

  <!-- Mounting hole c-c 49.45mm (Pump 2: B3 to B4) -->
  <line x1="335.7" y1="238" x2="335.7" y2="256" class="dim" stroke-dasharray="1,1"/>
  <line x1="508.8" y1="238" x2="508.8" y2="256" class="dim" stroke-dasharray="1,1"/>
  <line x1="335.7" y1="252" x2="508.8" y2="252" class="dim" marker-start="url(#ah-rev)" marker-end="url(#ah)"/>
  <text x="422.2" y="266" class="dimtext">49.45</text>

  <!-- Corner hole inset from left edge: 6mm -->
  <line x1="60" y1="480" x2="81" y2="480" class="dim" marker-start="url(#ah-rev)" marker-end="url(#ah)"/>
  <text x="70.5" y="492" class="dimtext" style="font-size:8px">6</text>
  <line x1="60" y1="470" x2="60" y2="484" class="dim" stroke-dasharray="1,1"/>
  <line x1="81" y1="458" x2="81" y2="484" class="dim" stroke-dasharray="1,1"/>

  <!-- Corner hole inset from rear edge: 6mm -->
  <line x1="575" y1="449" x2="575" y2="470" class="dim" marker-start="url(#ah-rev)" marker-end="url(#ah)"/>
  <text x="588" y="463" class="dimtext" style="font-size:8px">6</text>
  <line x1="543" y1="449" x2="579" y2="449" class="dim" stroke-dasharray="1,1"/>
  <line x1="543" y1="470" x2="579" y2="470" class="dim" stroke-dasharray="1,1"/>

  <!-- Boss Y position from front edge: 48mm -->
  <line x1="40" y1="50" x2="40" y2="218" class="dim" marker-start="url(#ah-rev)" marker-end="url(#ah)"/>
  <text x="30" y="138" class="dimtext" style="font-size:8px" transform="rotate(-90,30,138)">48</text>
  <line x1="44" y1="50" x2="60" y2="50" class="dim" stroke-dasharray="1,1"/>
  <line x1="44" y1="218" x2="77.2" y2="218" class="dim" stroke-dasharray="1,1"/>

  <!-- Boss 1 X position from left edge: 9.78mm -->
  <line x1="60" y1="280" x2="94.2" y2="280" class="dim" marker-start="url(#ah-rev)" marker-end="url(#ah)"/>
  <text x="77.1" y="294" class="dimtext" style="font-size:8px">9.78</text>
  <line x1="94.2" y1="256" x2="94.2" y2="284" class="dim" stroke-dasharray="1,1"/>
  <line x1="60" y1="270" x2="60" y2="284" class="dim" stroke-dasharray="1,1"/>

  <!-- Wire channel width: 5mm -->
  <line x1="60" y1="496" x2="77.5" y2="496" class="dim" marker-start="url(#ah-rev)" marker-end="url(#ah)"/>
  <text x="68.8" y="508" class="dimtext" style="font-size:8px">5</text>

  <!-- Boss diameter callout -->
  <line x1="518" y1="208" x2="548" y2="193" class="dim"/>
  <text x="550" y="192" class="dimtext" style="text-anchor:start; font-size:8px">4x &#x2300;8 BOSS, &#x2300;4.0 PILOT</text>

  <!-- Corner hole callout -->
  <line x1="526" y1="66" x2="555" y2="56" class="dim"/>
  <text x="557" y="55" class="dimtext" style="text-anchor:start; font-size:8px">4x &#x2300;3.4 THRU</text>

  <!-- ===== FRONT VIEW ===== -->
  <!-- Looking along -Y. H=X, V=Z. Shares X range with top view.  -->
  <!-- Tray top at y=530 (Z=6mm), tray bottom at y=551 (Z=0mm).   -->
  <text x="301" y="598" class="label">FRONT VIEW (3.5:1)</text>

  <!-- Tray outline -->
  <rect x="60" y="530" width="483" height="21" class="outline"/>

  <!-- Bosses behind front face (at Y=48mm) — hidden rectangles -->
  <!-- Boss width 8mm=28px, height 6mm=21px (full tray height) -->
  <!-- Boss 1: cx=94.2, x=94.2-14=80.2 -->
  <rect x="80.2" y="530" width="28" height="21" class="hidden"/>
  <!-- Boss 2: cx=267.3 -->
  <rect x="253.3" y="530" width="28" height="21" class="hidden"/>
  <!-- Boss 3: cx=335.7 -->
  <rect x="321.7" y="530" width="28" height="21" class="hidden"/>
  <!-- Boss 4: cx=508.8 -->
  <rect x="494.8" y="530" width="28" height="21" class="hidden"/>

  <!-- Hidden pilot holes within bosses (4mm = 14px wide) -->
  <line x1="87.2" y1="530" x2="87.2" y2="551" class="hidden"/>
  <line x1="101.2" y1="530" x2="101.2" y2="551" class="hidden"/>
  <line x1="260.3" y1="530" x2="260.3" y2="551" class="hidden"/>
  <line x1="274.3" y1="530" x2="274.3" y2="551" class="hidden"/>
  <line x1="328.7" y1="530" x2="328.7" y2="551" class="hidden"/>
  <line x1="342.7" y1="530" x2="342.7" y2="551" class="hidden"/>
  <line x1="501.8" y1="530" x2="501.8" y2="551" class="hidden"/>
  <line x1="515.8" y1="530" x2="515.8" y2="551" class="hidden"/>

  <!-- Wire channel (5mm wide x 3mm deep notch, left side, bottom) -->
  <!-- Z=0..3mm -> y=551 down to y=551-3*3.5=540.5, X=0..5mm -> x=60..77.5 -->
  <line x1="77.5" y1="540.5" x2="77.5" y2="551" class="hidden"/>

  <!-- Pump phantoms in front view (above tray, resting on top surface Z=6) -->
  <!-- Pump head: 62.6x62.6mm. Z: 6..68.6mm -->
  <!-- Z=6mm -> y=530, Z=68.6mm -> y=551-68.6*3.5=310.9 -->

  <!-- Pump 1 phantom: X: 3.2..65.8mm -> px 71.2..290.3 -->
  <rect x="71.2" y="310.9" width="219.1" height="219.1" class="phantom"/>
  <!-- Pump 2 phantom: X: 72.2..134.8mm -> px 312.7..531.8 -->
  <rect x="312.7" y="310.9" width="219.1" height="219.1" class="phantom"/>

  <!-- Front view dimensions -->
  <!-- Width 138mm -->
  <line x1="60" y1="557" x2="60" y2="566" class="dim"/>
  <line x1="543" y1="557" x2="543" y2="566" class="dim"/>
  <line x1="60" y1="562" x2="543" y2="562" class="dim" marker-start="url(#ah-rev)" marker-end="url(#ah)"/>
  <text x="301" y="575" class="dimtext">138</text>

  <!-- Height 6mm -->
  <line x1="549" y1="530" x2="575" y2="530" class="dim"/>
  <line x1="549" y1="551" x2="575" y2="551" class="dim"/>
  <line x1="565" y1="525" x2="565" y2="556" class="dim" marker-start="url(#ah-rev)" marker-end="url(#ah)"/>
  <text x="582" y="543" class="dimtext" style="text-anchor:start">6</text>

  <!-- Wire channel depth 3mm -->
  <line x1="48" y1="540.5" x2="55" y2="540.5" class="dim"/>
  <line x1="48" y1="551" x2="55" y2="551" class="dim"/>
  <line x1="51" y1="538" x2="51" y2="553" class="dim" marker-start="url(#ah-rev)" marker-end="url(#ah)"/>
  <text x="38" y="548" class="dimtext" style="font-size:8px">3</text>

  <!-- ===== RIGHT SIDE VIEW ===== -->
  <!-- Looking along -X. H=Y, V=Z. Shares Z range with front view. -->
  <!-- Origin at (610, 530). 120mm D = 420px, 6mm H = 21px -->
  <text x="820" y="524" class="label">RIGHT SIDE VIEW (3.5:1)</text>

  <!-- Tray outline -->
  <rect x="610" y="530" width="420" height="21" class="outline"/>

  <!-- Boss visible in side view (at Y=48mm, projects as rectangle) -->
  <!-- Y=48mm -> 48*3.5+610=778. Boss 8mm=28px wide, 6mm=21px tall -->
  <rect x="764" y="530" width="28" height="21" class="outline"/>
  <!-- Pilot hole visible (4mm = 14px) -->
  <line x1="771" y1="530" x2="771" y2="551" class="hidden"/>
  <line x1="785" y1="530" x2="785" y2="551" class="hidden"/>

  <!-- Wire channel hidden line at Z=3mm across full depth -->
  <line x1="610" y1="540.5" x2="1030" y2="540.5" class="hidden"/>

  <!-- Corner holes in side view: at Y=6 and Y=114, axis along Z (rectangles) -->
  <!-- Y=6 -> 6*3.5+610=631. Hole 3.4mm=11.9px wide -->
  <rect x="625.1" y="530" width="11.9" height="21" class="hidden"/>
  <!-- Y=114 -> 114*3.5+610=1009 -->
  <rect x="1003.1" y="530" width="11.9" height="21" class="hidden"/>

  <!-- Pump phantom in side view -->
  <!-- Head: Y=1.76..49.76mm, Z=6..68.6mm -->
  <!-- py: Y=1.76 -> 1.76*3.5+610=616.2, w=48*3.5=168 -->
  <!-- pz: Z=68.6 -> 310.9, Z=6 -> 530. h=219.1 -->
  <rect x="616.2" y="310.9" width="168" height="219.1" class="phantom"/>
  <!-- Motor: Y=52..118.24mm, Z=19.8..54.8mm (centered at Z=37.3, r=17.5) -->
  <!-- py: Y=52 -> 52*3.5+610=792, w=66.24*3.5=231.8 -->
  <!-- pz: Z=54.8 -> 551-54.8*3.5=358.7, Z=19.8 -> 551-19.8*3.5=481.7. h=123 -->
  <rect x="792" y="358.7" width="231.8" height="123" class="phantom"/>

  <!-- Side view dimensions -->
  <!-- Depth 120mm -->
  <line x1="610" y1="557" x2="610" y2="566" class="dim"/>
  <line x1="1030" y1="557" x2="1030" y2="566" class="dim"/>
  <line x1="610" y1="562" x2="1030" y2="562" class="dim" marker-start="url(#ah-rev)" marker-end="url(#ah)"/>
  <text x="820" y="575" class="dimtext">120</text>

  <!-- Height 6mm -->
  <line x1="1036" y1="530" x2="1045" y2="530" class="dim"/>
  <line x1="1036" y1="551" x2="1045" y2="551" class="dim"/>
  <line x1="1040" y1="525" x2="1040" y2="556" class="dim" marker-start="url(#ah-rev)" marker-end="url(#ah)"/>
  <text x="1040" y="522" class="dimtext">6</text>

  <!-- ===== NOTES ===== -->
  <text x="60" y="610" class="note" font-weight="bold">NOTES:</text>
  <text x="60" y="624" class="note">1. MATERIAL: PETG, 3D PRINTED (FLAT/HORIZONTAL ORIENTATION FOR SCREW BOSS STRENGTH)</text>
  <text x="60" y="638" class="note">2. ALL DIMENSIONS IN MM</text>
  <text x="60" y="652" class="note">3. 4x PUMP MOUNTING BOSSES: &#x2300;8mm OD, 6mm HEIGHT, &#x2300;4.0mm PILOT HOLE FOR M3 x 5mm BRASS HEAT-SET INSERTS</text>
  <text x="60" y="666" class="note">4. MOUNTING HOLE PATTERN: 49.45mm CENTER-TO-CENTER (CALIPER-VERIFIED), ONE AXIS PER PUMP BRACKET</text>
  <text x="60" y="680" class="note">5. 4x M3 CORNER THROUGH-HOLES (&#x2300;3.4mm) FOR MOUNTING TRAY TO OUTER SHELL LEDGES</text>
  <text x="60" y="694" class="note">6. WIRE ROUTING CHANNEL: 5mm WIDE x 3mm DEEP U-CHANNEL ALONG LEFT EDGE</text>
  <text x="60" y="708" class="note">7. PUMP PHANTOMS (BLUE) SHOW KAMOER KPHM400-SW3B25 ENVELOPE (62.6mm SQ HEAD, ~35mm DIA MOTOR)</text>
  <text x="60" y="722" class="note">8. PUMPS SIDE-BY-SIDE, MOTORS FACING REAR, TUBES EXIT FRONT</text>
  <text x="60" y="736" class="note">9. C-CLIPS FOR TUBING STRAIN RELIEF NOT SHOWN (POSITIONS TBD BASED ON TUBE ROUTING)</text>
  <text x="60" y="750" class="note">10. OPTIONAL RUBBER GROMMET ISOLATORS BETWEEN PUMP BRACKETS AND BOSSES (TRY RIGID FIRST)</text>

  <!-- ===== TITLE BLOCK ===== -->
  <rect x="700" y="800" width="330" height="120" class="frame"/>
  <line x1="700" y1="822" x2="1030" y2="822" class="frame"/>
  <line x1="700" y1="844" x2="1030" y2="844" class="frame"/>
  <line x1="700" y1="866" x2="1030" y2="866" class="frame"/>
  <line x1="700" y1="888" x2="1030" y2="888" class="frame"/>
  <line x1="840" y1="800" x2="840" y2="920" class="frame"/>

  <text x="710" y="817" class="titletext">TITLE:</text>
  <text x="850" y="817" class="title">PUMP TRAY</text>
  <text x="710" y="839" class="titletext">PROJECT:</text>
  <text x="850" y="839" class="titletext">SODA FLAVOR INJECTOR — PUMP CARTRIDGE</text>
  <text x="710" y="861" class="titletext">MATERIAL:</text>
  <text x="850" y="861" class="titletext">PETG (3D PRINTED)</text>
  <text x="710" y="883" class="titletext">SCALE:</text>
  <text x="850" y="883" class="titletext">3.5:1 (ALL VIEWS)</text>
  <text x="710" y="905" class="titletext">DIMS:</text>
  <text x="850" y="905" class="titletext">138W x 120D x 6H mm</text>
</svg>
