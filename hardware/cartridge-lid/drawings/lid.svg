<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 780" width="1050" height="780" font-family="Arial, Helvetica, sans-serif">
  <title>Lid — Engineering Drawing</title>
  <style>
    .outline { fill: none; stroke: #000; stroke-width: 1.5; }
    .thin { fill: none; stroke: #000; stroke-width: 0.8; }
    .hidden { fill: none; stroke: #000; stroke-width: 0.8; stroke-dasharray: 2,2; }
    .phantom { fill: none; stroke: #000; stroke-width: 0.6; stroke-dasharray: 10,3,2,3; }
    .center { fill: none; stroke: #000; stroke-width: 0.4; stroke-dasharray: 12,3,2,3; }
    .dim { fill: none; stroke: #333; stroke-width: 0.5; }
    .dim-text { font-size: 10px; fill: #333; text-anchor: middle; }
    .dim-text-s { font-size: 9px; fill: #333; text-anchor: middle; }
    .label { font-size: 11px; fill: #000; font-weight: bold; text-anchor: middle; }
    .note { font-size: 9px; fill: #555; }
    .title-text { font-size: 16px; fill: #000; font-weight: bold; text-anchor: middle; }
    .subtitle { font-size: 11px; fill: #444; text-anchor: middle; }
    .arrow { fill: #333; stroke: none; }
    .cutout-fill { fill: #f0f0f0; stroke: #000; stroke-width: 0.8; }
  </style>

  <!--
    SCALE: S = 3.5 px/mm
    LAYOUT (third-angle projection):
      Front view (upper-left): looking along -Y, shows X(horiz) x Z(vert)
      Side view (upper-right): looking along -X, shows Y(horiz) x Z(vert), Z-aligned with Front
      Top view (lower-left): looking along -Z, shows X(horiz) x Y(vert), X-aligned with Front

    Lid dimensions: 148W x 130D x 3H mm
      Front: 148*3.5=518 x 3*3.5=10.5
      Side:  130*3.5=455 x 3*3.5=10.5
      Top:   518 x 455

    Pogo PCB cutout: 15W x 30L mm thru-cut
      Centered at X=74mm (cartridge center), Y=100mm (near rear)
      X range: 66.5..81.5mm, Y range: 85..115mm

    Screw holes: 6x M3 clearance (3.4mm dia = 11.9px, r=5.95px)
      Positions (mm): front pair (37,10) (111,10), rear pair (37,120) (111,120),
      sides (10,65) (138,65)

    Origins:
      Front: Fx=80, Fy=120
      Side:  Sx=600 (80+518+2 gap), Sy=120 (Z-aligned)
      Top:   Tx=80, Ty=195 (120+10.5+65 gap for labels+dims)
  -->

  <!-- Title block -->
  <text x="525" y="28" class="title-text">Lid</text>
  <text x="525" y="44" class="subtitle">148W x 130D x 3H mm — PETG — Qty 1</text>
  <text x="525" y="58" class="subtitle">Scale: 3.5 px/mm — Dimensions in mm</text>
  <line x1="50" y1="65" x2="1000" y2="65" stroke="#999" stroke-width="0.5"/>

  <!-- ============================================================ -->
  <!-- FRONT VIEW (looking along -Y): X (horiz) x Z (vert)         -->
  <!-- Origin Fx=80, Fy=120. Size: 518 x 10.5 px                   -->
  <!-- ============================================================ -->

  <text x="339" y="100" class="label">FRONT VIEW</text>
  <text x="339" y="109" class="note" text-anchor="middle" style="font-size:7px">(looking along -Y)</text>

  <!-- Lid outline: 518 wide x 10.5 tall -->
  <rect x="80" y="120" width="518" height="10.5" class="outline"/>

  <!-- Hidden screw holes (front edge pair): circles viewed end-on = rectangles -->
  <!-- Hole at X=37mm: Fx + 37*3.5 = 80 + 129.5 = 209.5 center, dia 3.4mm = 11.9px -->
  <!-- Left edge: 209.5 - 5.95 = 203.55, right: 209.5 + 5.95 = 215.45 -->
  <line x1="203.5" y1="120" x2="203.5" y2="130.5" class="hidden"/>
  <line x1="215.5" y1="120" x2="215.5" y2="130.5" class="hidden"/>
  <!-- Hole at X=111mm: Fx + 111*3.5 = 80 + 388.5 = 468.5 center -->
  <line x1="462.5" y1="120" x2="462.5" y2="130.5" class="hidden"/>
  <line x1="474.5" y1="120" x2="474.5" y2="130.5" class="hidden"/>

  <!-- Hidden side screw holes (at Y=65mm, seen end-on through depth) -->
  <!-- X=10mm: Fx + 10*3.5 = 80 + 35 = 115 center -->
  <line x1="109" y1="120" x2="109" y2="130.5" class="hidden"/>
  <line x1="121" y1="120" x2="121" y2="130.5" class="hidden"/>
  <!-- X=138mm: Fx + 138*3.5 = 80 + 483 = 563 center -->
  <line x1="557" y1="120" x2="557" y2="130.5" class="hidden"/>
  <line x1="569" y1="120" x2="569" y2="130.5" class="hidden"/>

  <!-- Pogo cutout visible as gap (thru-cut, seen from front) -->
  <!-- X=66.5..81.5mm => Fx + 232.75 = 312.75 and Fx + 285.25 = 365.25 -->
  <line x1="312.8" y1="120" x2="312.8" y2="130.5" class="thin"/>
  <line x1="365.2" y1="120" x2="365.2" y2="130.5" class="thin"/>

  <!-- Front view dimensions -->
  <!-- Width: 148mm -->
  <line x1="80" y1="145" x2="80" y2="136" class="dim"/>
  <line x1="598" y1="145" x2="598" y2="136" class="dim"/>
  <line x1="80" y1="142" x2="598" y2="142" class="dim"/>
  <polygon points="80,142 86,139.5 86,144.5" class="arrow"/>
  <polygon points="598,142 592,139.5 592,144.5" class="arrow"/>
  <text x="339" y="153" class="dim-text">148</text>

  <!-- Height: 3mm — shown on side view right edge instead (views share Z) -->

  <!-- Pogo cutout width: 15mm -->
  <line x1="312.8" y1="113" x2="312.8" y2="118" class="dim"/>
  <line x1="365.2" y1="113" x2="365.2" y2="118" class="dim"/>
  <line x1="312.8" y1="115" x2="365.2" y2="115" class="dim"/>
  <polygon points="312.8,115 318.8,112.5 318.8,117.5" class="arrow"/>
  <polygon points="365.2,115 359.2,112.5 359.2,117.5" class="arrow"/>
  <text x="339" y="111" class="dim-text-s">15 cutout</text>

  <!-- ============================================================ -->
  <!-- SIDE VIEW (looking along -X): Y (horiz) x Z (vert)          -->
  <!-- Origin Sx=648, Sy=120. Size: 455 x 10.5 px. Z-aligned.     -->
  <!-- ============================================================ -->

  <text x="827" y="100" class="label">SIDE VIEW</text>
  <text x="827" y="109" class="note" text-anchor="middle" style="font-size:7px">(looking along -X)</text>

  <!-- Lid outline -->
  <rect x="600" y="120" width="455" height="10.5" class="outline"/>

  <!-- Hidden screw holes at Y=10mm and Y=120mm -->
  <!-- Y=10: Sx + 10*3.5 = 600 + 35 = 635 center -->
  <line x1="629" y1="120" x2="629" y2="130.5" class="hidden"/>
  <line x1="641" y1="120" x2="641" y2="130.5" class="hidden"/>
  <!-- Y=120: Sx + 120*3.5 = 600 + 420 = 1020 center -->
  <line x1="1014" y1="120" x2="1014" y2="130.5" class="hidden"/>
  <line x1="1026" y1="120" x2="1026" y2="130.5" class="hidden"/>

  <!-- Hidden side screw hole at Y=65mm center -->
  <!-- Y=65: Sx + 65*3.5 = 600 + 227.5 = 827.5 center -->
  <line x1="821.5" y1="120" x2="821.5" y2="130.5" class="hidden"/>
  <line x1="833.5" y1="120" x2="833.5" y2="130.5" class="hidden"/>

  <!-- Pogo cutout: Y=85..115mm => Sx + 297.5 = 897.5, Sx + 402.5 = 1002.5 -->
  <line x1="897.5" y1="120" x2="897.5" y2="130.5" class="hidden"/>
  <line x1="1002.5" y1="120" x2="1002.5" y2="130.5" class="hidden"/>

  <!-- Side view dimensions -->
  <!-- Depth: 130mm -->
  <line x1="600" y1="145" x2="600" y2="136" class="dim"/>
  <line x1="1055" y1="145" x2="1055" y2="136" class="dim"/>
  <line x1="600" y1="142" x2="1055" y2="142" class="dim"/>
  <polygon points="600,142 606,139.5 606,144.5" class="arrow"/>
  <polygon points="1055,142 1049,139.5 1049,144.5" class="arrow"/>
  <text x="827" y="153" class="dim-text">130</text>

  <!-- Pogo cutout length: 30mm -->
  <line x1="897.5" y1="113" x2="897.5" y2="118" class="dim"/>
  <line x1="1002.5" y1="113" x2="1002.5" y2="118" class="dim"/>
  <line x1="897.5" y1="115" x2="1002.5" y2="115" class="dim"/>
  <polygon points="897.5,115 903.5,112.5 903.5,117.5" class="arrow"/>
  <polygon points="1002.5,115 996.5,112.5 996.5,117.5" class="arrow"/>
  <text x="950" y="111" class="dim-text-s">30 cutout</text>

  <!-- Height: 3mm (right side of side view, arrows point outward) -->
  <line x1="1067" y1="120" x2="1085" y2="120" class="dim"/>
  <line x1="1067" y1="130.5" x2="1085" y2="130.5" class="dim"/>
  <line x1="1079" y1="114" x2="1079" y2="137" class="dim"/>
  <polygon points="1079,114 1076.5,120 1081.5,120" class="arrow"/>
  <polygon points="1079,137 1076.5,130.5 1081.5,130.5" class="arrow"/>
  <text x="1093" y="128" class="dim-text">3</text>

  <!-- ============================================================ -->
  <!-- TOP VIEW (looking along -Z): X (horiz) x Y (vert)           -->
  <!-- Origin Tx=80, Ty=195. Size: 518 x 455 px.                   -->
  <!-- X-aligned with Front view.                                   -->
  <!-- ============================================================ -->

  <text x="339" y="188" class="label">TOP VIEW</text>

  <!-- Lid outline -->
  <rect x="80" y="195" width="518" height="455" class="outline"/>

  <!-- Pogo PCB cutout: 15W x 30L mm -->
  <!-- X: 66.5..81.5mm => Tx + 232.75 = 312.75, Tx + 285.25 = 365.25 -->
  <!-- Y: 85..115mm => Ty + 297.5 = 492.5, Ty + 402.5 = 597.5 -->
  <rect x="312.8" y="492.5" width="52.5" height="105" class="cutout-fill"/>

  <!-- 6x M3 screw clearance holes: 3.4mm dia = 5.95px radius -->

  <!-- Front-left: (37, 10) => (Tx + 129.5, Ty + 35) = (209.5, 230) -->
  <circle cx="209.5" cy="230" r="5.95" class="thin"/>
  <line x1="205" y1="230" x2="214" y2="230" class="center"/>
  <line x1="209.5" y1="225.5" x2="209.5" y2="234.5" class="center"/>

  <!-- Front-right: (111, 10) => (Tx + 388.5, Ty + 35) = (468.5, 230) -->
  <circle cx="468.5" cy="230" r="5.95" class="thin"/>
  <line x1="464" y1="230" x2="473" y2="230" class="center"/>
  <line x1="468.5" y1="225.5" x2="468.5" y2="234.5" class="center"/>

  <!-- Rear-left: (37, 120) => (Tx + 129.5, Ty + 420) = (209.5, 615) -->
  <circle cx="209.5" cy="615" r="5.95" class="thin"/>
  <line x1="205" y1="615" x2="214" y2="615" class="center"/>
  <line x1="209.5" y1="610.5" x2="209.5" y2="619.5" class="center"/>

  <!-- Rear-right: (111, 120) => (Tx + 388.5, Ty + 420) = (468.5, 615) -->
  <circle cx="468.5" cy="615" r="5.95" class="thin"/>
  <line x1="464" y1="615" x2="473" y2="615" class="center"/>
  <line x1="468.5" y1="610.5" x2="468.5" y2="619.5" class="center"/>

  <!-- Left-center: (10, 65) => (Tx + 35, Ty + 227.5) = (115, 422.5) -->
  <circle cx="115" cy="422.5" r="5.95" class="thin"/>
  <line x1="110.5" y1="422.5" x2="119.5" y2="422.5" class="center"/>
  <line x1="115" y1="418" x2="115" y2="427" class="center"/>

  <!-- Right-center: (138, 65) => (Tx + 483, Ty + 227.5) = (563, 422.5) -->
  <circle cx="563" cy="422.5" r="5.95" class="thin"/>
  <line x1="558.5" y1="422.5" x2="567.5" y2="422.5" class="center"/>
  <line x1="563" y1="418" x2="563" y2="427" class="center"/>

  <!-- Phantom shell interior outline (4mm wall inset) -->
  <!-- Interior: X=4..144mm, Y=4..126mm -->
  <!-- px: Tx + 14 = 94, Ty + 14 = 209, width = 140*3.5 = 490, height = 122*3.5 = 427 -->
  <rect x="94" y="209" width="490" height="427" class="phantom"/>

  <!-- Top view dimensions -->
  <!-- Width: 148mm -->
  <line x1="80" y1="665" x2="80" y2="655" class="dim"/>
  <line x1="598" y1="665" x2="598" y2="655" class="dim"/>
  <line x1="80" y1="662" x2="598" y2="662" class="dim"/>
  <polygon points="80,662 86,659.5 86,664.5" class="arrow"/>
  <polygon points="598,662 592,659.5 592,664.5" class="arrow"/>
  <text x="339" y="673" class="dim-text">148</text>

  <!-- Depth: 130mm -->
  <line x1="610" y1="195" x2="623" y2="195" class="dim"/>
  <line x1="610" y1="650" x2="623" y2="650" class="dim"/>
  <line x1="617" y1="195" x2="617" y2="650" class="dim"/>
  <polygon points="617,195 614.5,201 619.5,201" class="arrow"/>
  <polygon points="617,650 614.5,644 619.5,644" class="arrow"/>
  <text x="617" y="428" class="dim-text" transform="rotate(-90, 617, 428)">130</text>

  <!-- Screw hole inset from front: 10mm -->
  <line x1="55" y1="195" x2="68" y2="195" class="dim"/>
  <line x1="55" y1="230" x2="68" y2="230" class="dim"/>
  <line x1="62" y1="195" x2="62" y2="230" class="dim"/>
  <polygon points="62,195 59.5,201 64.5,201" class="arrow"/>
  <polygon points="62,230 59.5,224 64.5,224" class="arrow"/>
  <text x="50" y="216" class="dim-text-s" transform="rotate(-90, 50, 216)">10</text>

  <!-- Screw X from left edge: 37mm -->
  <line x1="80" y1="683" x2="80" y2="678" class="dim"/>
  <line x1="209.5" y1="683" x2="209.5" y2="678" class="dim"/>
  <line x1="80" y1="681" x2="209.5" y2="681" class="dim"/>
  <polygon points="80,681 86,678.5 86,683.5" class="arrow"/>
  <polygon points="209.5,681 203.5,678.5 203.5,683.5" class="arrow"/>
  <text x="145" y="692" class="dim-text-s">37</text>

  <!-- Screw pair spacing: 74mm (111 - 37) -->
  <line x1="209.5" y1="700" x2="209.5" y2="695" class="dim"/>
  <line x1="468.5" y1="700" x2="468.5" y2="695" class="dim"/>
  <line x1="209.5" y1="698" x2="468.5" y2="698" class="dim"/>
  <polygon points="209.5,698 215.5,695.5 215.5,700.5" class="arrow"/>
  <polygon points="468.5,698 462.5,695.5 462.5,700.5" class="arrow"/>
  <text x="339" y="709" class="dim-text-s">74</text>

  <!-- Side screw inset from left: 10mm -->
  <line x1="80" y1="440" x2="80" y2="435" class="dim"/>
  <line x1="115" y1="440" x2="115" y2="435" class="dim"/>
  <line x1="80" y1="438" x2="115" y2="438" class="dim"/>
  <polygon points="80,438 86,435.5 86,440.5" class="arrow"/>
  <polygon points="115,438 109,435.5 109,440.5" class="arrow"/>
  <text x="97" y="449" class="dim-text-s">10</text>

  <!-- Pogo cutout Y center from front: 100mm -->
  <line x1="42" y1="195" x2="42" y2="545" class="dim"/>
  <polygon points="42,195 39.5,201 44.5,201" class="arrow"/>
  <polygon points="42,545 39.5,539 44.5,539" class="arrow"/>
  <text x="34" y="375" class="dim-text-s" transform="rotate(-90, 34, 375)">100</text>

  <!-- Pogo cutout length callout: 30mm -->
  <line x1="370" y1="492.5" x2="380" y2="492.5" class="dim"/>
  <line x1="370" y1="597.5" x2="380" y2="597.5" class="dim"/>
  <line x1="375" y1="492.5" x2="375" y2="597.5" class="dim"/>
  <polygon points="375,492.5 372.5,498.5 377.5,498.5" class="arrow"/>
  <polygon points="375,597.5 372.5,591.5 377.5,591.5" class="arrow"/>
  <text x="388" y="549" class="dim-text-s">30</text>

  <!-- Feature callouts -->
  <line x1="230" y1="230" x2="260" y2="253" class="dim"/>
  <text x="262" y="256" class="note" style="font-size:8px">M3 clearance 3.4mm dia (6x)</text>

  <line x1="365.2" y1="545" x2="400" y2="535" class="dim"/>
  <text x="402" y="533" class="note" style="font-size:8px">Pogo PCB cutout</text>
  <text x="402" y="543" class="note" style="font-size:8px">15W x 30L mm (thru)</text>

  <!-- Legend and Notes block (right of top view) -->
  <text x="660" y="205" class="note" style="font-size:10px; font-weight:bold">LEGEND</text>
  <line x1="660" y1="220" x2="710" y2="220" class="dim" stroke-dasharray="10,3,2,3"/>
  <text x="715" y="224" class="note">Shell interior (phantom)</text>
  <line x1="660" y1="238" x2="710" y2="238" class="hidden"/>
  <text x="715" y="242" class="note">Hidden feature</text>
  <line x1="660" y1="256" x2="710" y2="256" class="center"/>
  <text x="715" y="260" class="note">Center line</text>

  <text x="660" y="295" class="note" style="font-size:10px; font-weight:bold">NOTES</text>
  <text x="660" y="312" class="note">1. Material: PETG</text>
  <text x="660" y="326" class="note">2. Flat plate, 3mm thick</text>
  <text x="660" y="340" class="note">3. Closes open top of outer shell</text>
  <text x="660" y="354" class="note">4. 6x M3 clearance holes (3.4mm dia)</text>
  <text x="660" y="368" class="note">   2 front, 2 rear, 1 per side</text>
  <text x="660" y="382" class="note">5. Pogo PCB cutout: 15W x 30L mm</text>
  <text x="660" y="396" class="note">   thru-cut, centered at X=74mm</text>
  <text x="660" y="410" class="note">   Y=85..115mm (near rear)</text>
  <text x="660" y="424" class="note">6. Must not interfere with pogo</text>
  <text x="660" y="438" class="note">   pin contact on shell top face</text>
  <text x="660" y="452" class="note">7. Screws or snap-clips onto shell</text>
  <text x="660" y="466" class="note">   top edges (attachment TBD)</text>
  <text x="660" y="480" class="note">8. Shell wall thickness: 4mm</text>
  <text x="660" y="494" class="note">   (phantom outline shows interior)</text>
  <text x="660" y="508" class="note">9. Hole count (4-6) and attachment</text>
  <text x="660" y="522" class="note">   method TBD; 6 shown as baseline</text>
  <text x="660" y="536" class="note">10. Print flat for uniform thickness</text>

</svg>
