; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions_esp32.csv
board_build.filesystem = littlefs
board_build.embed_txtfiles = images/factory_manifest.json
extra_scripts = pre:pre_build.py
lib_deps =
    bblanchon/ArduinoJson
    PowerBroker2/SerialTransfer

[env:rp2040_display]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = pico
framework = arduino
board_build.core = earlephilhower
board_build.filesystem_size = 1.5m
monitor_speed = 115200
extra_scripts = pre:pre_build.py
build_src_filter = -<*> +<../src_display/*>
lib_deps =
    moononournation/GFX Library for Arduino
    PowerBroker2/SerialTransfer

[env:esp32s3_config]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-s3-devkitc1-n8r8
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions_s3.csv
board_build.filesystem = littlefs
extra_scripts = pre:pre_build.py
build_src_filter = -<*> +<../src_config/*>
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DLV_CONF_INCLUDE_SIMPLE
    -DARDUINO_LOOP_STACK_SIZE=16384
    -Isrc_config
lib_deps =
    moononournation/GFX Library for Arduino
    lvgl/lvgl@^8.4.0
    PowerBroker2/SerialTransfer
