# Daemon JVM criteria. Pins the JDK major version Gradle uses to run the
# build daemon, independent of JAVA_HOME or whichever JVM started the
# Gradle client. Locks the IDE and CLI to the same JDK so builds are
# reproducible across machines (Android Studio Panda 1+ uses these
# criteria for new projects by default, and AGP 9.x requires JDK 17).
#
# Auto-provisioning download URLs are intentionally omitted — local
# auto-detection finds JDK 17 on every dev machine we currently target
# (Android Studio's bundled JDK qualifies). If we ever need a contributor
# to be able to build without a local JDK 17, run:
#   ./gradlew updateDaemonJvm --jvm-version=17
# which will populate per-platform download URLs.
toolchainVersion=17
