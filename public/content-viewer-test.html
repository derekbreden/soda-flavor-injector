<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>ContentViewer test</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #fff;
      min-height: 100vh;
      padding: 40px 24px;
    }
    h1 { font-size: 22px; margin: 0 0 6px; font-weight: 600; }
    p.lede { color: #999; margin: 0 0 24px; font-size: 14px; }
    .row { display: flex; flex-direction: column; gap: 12px; max-width: 360px; }
    button {
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid #3a3a5a;
      background: #232342;
      color: #fff;
      font: inherit;
      cursor: pointer;
      text-align: left;
    }
    button:hover { background: #2a2a4a; }
    code { background: #232342; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
  </style>
</head>
<body>
  <h1>ContentViewer test</h1>
  <p class="lede">Loads <code>pan-zoom.js</code> and <code>content-viewer.js</code> from <code>/public</code>. Tap a button.</p>
  <div class="row">
    <button id="btn-image">Open with image (post-images PNG)</button>
    <button id="btn-svg">Open with inline SVG (800x600 demo)</button>
    <button id="btn-text">Open with long text (verify scroll/pan)</button>
  </div>

  <script src="/pan-zoom.js"></script>
  <script src="/content-viewer.js"></script>
  <script>
    function openWithImage() {
      const img = document.createElement("img");
      img.src = "/post-images/2026-04-25-carbonator-flow.png";
      img.alt = "carbonator flow";
      img.draggable = false;
      img.style.display = "block";
      img.style.maxWidth = "none";
      img.style.maxHeight = "none";
      img.style.width = "auto";
      img.style.height = "auto";
      const wrapper = document.createElement("div");
      wrapper.style.cssText = "overflow:hidden;position:relative;width:100%;height:100%;";
      wrapper.appendChild(img);
      const pz = PanZoom.wrap(img, { container: wrapper, initialFit: true });
      ContentViewer.open({
        content: wrapper,
        filename: img.alt,
        onClose: () => pz.destroy(),
      });
    }

    function openWithSvg() {
      const svgNs = "http://www.w3.org/2000/svg";
      const svg = document.createElementNS(svgNs, "svg");
      svg.setAttribute("viewBox", "0 0 800 600");
      svg.setAttribute("width", "800");
      svg.setAttribute("height", "600");
      svg.style.display = "block";
      svg.innerHTML = `
        <defs>
          <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
            <stop offset="0%" stop-color="#232342"/>
            <stop offset="100%" stop-color="#1a1a2e"/>
          </linearGradient>
        </defs>
        <rect x="0" y="0" width="800" height="600" fill="url(#g)"/>
        <circle cx="200" cy="200" r="80" fill="#4488ff" opacity="0.85"/>
        <circle cx="600" cy="400" r="120" fill="#e64c80" opacity="0.85"/>
        <rect x="350" y="100" width="100" height="100" fill="#5fb56f" opacity="0.85"/>
        <text x="400" y="320" text-anchor="middle" fill="#fff" font-size="36" font-family="sans-serif">Pinch / wheel to zoom</text>
        <text x="400" y="370" text-anchor="middle" fill="#999" font-size="20" font-family="sans-serif">Drag to pan</text>
        <text x="100" y="550" fill="#999" font-size="14" font-family="sans-serif">label TL</text>
        <text x="700" y="550" fill="#999" font-size="14" font-family="sans-serif" text-anchor="end">label BR</text>
      `;
      const wrapper = document.createElement("div");
      wrapper.style.cssText = "overflow:hidden;position:relative;width:100%;height:100%;";
      wrapper.appendChild(svg);
      const pz = PanZoom.wrap(svg, { container: wrapper, initialFit: true });
      ContentViewer.open({
        content: wrapper,
        filename: "demo.svg",
        onClose: () => pz.destroy(),
      });
    }

    function openWithText() {
      const inner = document.createElement("div");
      inner.style.cssText = "width:600px;padding:24px;font:14px/1.5 -apple-system,sans-serif;color:#fff;";
      const paras = [];
      for (let i = 1; i <= 40; i++) {
        paras.push("<p style='margin:0 0 12px;'>Paragraph " + i + ". Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam.</p>");
      }
      inner.innerHTML = "<h2 style='margin:0 0 16px;'>Long text content</h2>" + paras.join("");
      const wrapper = document.createElement("div");
      wrapper.style.cssText = "overflow:hidden;position:relative;width:100%;height:100%;background:#232342;";
      wrapper.appendChild(inner);
      const pz = PanZoom.wrap(inner, { container: wrapper, initialFit: false, minScale: 0.2, maxScale: 4 });
      ContentViewer.open({
        content: wrapper,
        filename: "lorem.txt",
        onClose: () => pz.destroy(),
      });
    }

    document.getElementById("btn-image").addEventListener("click", openWithImage);
    document.getElementById("btn-svg").addEventListener("click", openWithSvg);
    document.getElementById("btn-text").addEventListener("click", openWithText);
  </script>
</body>
</html>
