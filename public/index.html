<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Home Soda Machine</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/dev/pwa-icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="64x64" href="/dev/pwa-icons/favicon-64.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/dev/pwa-icons/apple-touch-icon-152.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/dev/pwa-icons/apple-touch-icon-167.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/dev/pwa-icons/apple-touch-icon-180.png" />
    <link rel="apple-touch-icon" href="/dev/pwa-icons/apple-touch-icon-180.png" />
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="apple-mobile-web-app-title" content="Home Soda Machine" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #1a1a2e;
        --surface: #232342;
        --border: #3a3a5a;
        --text: #ffffff;
        --text-2: #999999;
        --text-3: #595959;
        --accent: #4488ff;
        --ok: #5fb56f;
        --err: #d97070;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 16px;
        line-height: 1.5;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }
      .site-nav {
        display: flex;
        gap: 1.5rem;
        padding: calc(env(safe-area-inset-top, 0px) + 0.625rem) 1.25rem 0.625rem;
        font-size: 0.875rem;
        border-bottom: 1px solid var(--border);
        background: var(--bg);
        position: sticky;
        top: 0;
        z-index: 10;
      }
      .site-nav a {
        color: var(--text-2);
        text-decoration: none;
        letter-spacing: 0.01em;
      }
      .site-nav a:hover { color: var(--text); }
      .site-nav a.active { color: var(--text); font-weight: 600; }
      main {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 2rem 1.5rem;
        text-align: center;
      }
      .icon {
        width: 96px;
        height: 96px;
        margin-bottom: 1.5rem;
        border-radius: 22px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.35);
      }
      h1 {
        font-size: clamp(1.75rem, 5vw, 2.5rem);
        font-weight: 600;
        margin: 0 0 0.5rem;
        letter-spacing: -0.02em;
        color: var(--text);
      }
      .tagline {
        color: var(--text-2);
        max-width: 30rem;
        margin: 0 0 2rem;
      }
      form {
        display: flex;
        gap: 0.5rem;
        width: 100%;
        max-width: 24rem;
        flex-wrap: wrap;
      }
      input[type="email"] {
        flex: 1 1 14rem;
        min-width: 0;
        padding: 0.75rem 1rem;
        font-size: 1rem;
        background: var(--surface);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 6px;
      }
      input[type="email"]::placeholder { color: var(--text-3); }
      input[type="email"]:focus {
        outline: none;
        border-color: var(--accent);
      }
      button {
        padding: 0.75rem 1.25rem;
        font-size: 1rem;
        background: var(--accent);
        color: #ffffff;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 500;
      }
      button:hover { background: #5599ff; }
      button:disabled { opacity: 0.6; cursor: default; }
      .status {
        min-height: 1.5rem;
        margin-top: 1rem;
        font-size: 0.9rem;
        color: var(--text-2);
      }
      .status.ok { color: var(--ok); }
      .status.err { color: var(--err); }
    </style>
  </head>
  <body>
    <nav class="site-nav" aria-label="Primary">
      <a href="/" class="active">Home</a>
      <a href="/blog">Updates</a>
      <a href="/dev">Prints</a>
      <a href="/dev/diagrams">Diagrams</a>
    </nav>
    <main>
      <img class="icon" src="/dev/pwa-icons/icon-192.png" alt="Home Soda Machine" />
      <h1>Home Soda Machine</h1>
      <p class="tagline">
        this is a real project, no timeline, I'll bother you exactly
        once when pre-orders open, never otherwise
      </p>
      <form id="signup">
        <input
          type="email"
          name="email"
          placeholder="you@example.com"
          required
          autocomplete="email"
        />
        <button type="submit">Notify me</button>
      </form>
      <div id="status" class="status" aria-live="polite"></div>
    </main>
    <script>
      const form = document.getElementById("signup");
      const status = document.getElementById("status");
      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const email = form.elements.email.value.trim();
        const button = form.querySelector("button");
        button.disabled = true;
        status.className = "status";
        status.textContent = "Submitting…";
        try {
          const r = await fetch("/api/subscribe", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ email }),
          });
          if (r.ok) {
            status.className = "status ok";
            status.textContent = "Thanks — we'll be in touch.";
            form.reset();
          } else {
            const data = await r.json().catch(() => ({}));
            status.className = "status err";
            status.textContent = data.error || "Something went wrong.";
          }
        } catch {
          status.className = "status err";
          status.textContent = "Network error. Try again.";
        } finally {
          button.disabled = false;
        }
      });
    </script>
  </body>
</html>
