name: SodaMachine
options:
  bundleIdPrefix: com.derekbreden
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

targets:
  SodaMachine:
    type: application
    platform: iOS
    sources:
      - SodaMachine
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.derekbreden.SodaMachine
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_KEY_NSBluetoothAlwaysUsageDescription: "This app uses Bluetooth to connect to your Home Soda Machine for managing display images, maintenance, and usage statistics."
        INFOPLIST_KEY_UILaunchStoryboardName: LaunchScreen
        INFOPLIST_KEY_UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: "Soda Machine"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
