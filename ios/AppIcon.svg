<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>

    <!-- Liquid gradient -->
    <linearGradient id="liquid" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="50%" stop-color="#c23373"/>
      <stop offset="100%" stop-color="#7b2ff7"/>
    </linearGradient>

    <!-- Glass highlight -->
    <linearGradient id="glassHighlight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="40%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>

    <!-- Bubble glow -->
    <radialGradient id="bubbleGlow">
      <stop offset="0%" stop-color="rgba(255,255,255,0.5)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.1)"/>
    </radialGradient>

    <!-- Clip for liquid inside glass -->
    <clipPath id="glassClip">
      <path d="M310 247 L340 747 Q345 777 380 777 L644 777 Q679 777 684 747 L714 247 Z"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="#1a1a2e"/>

  <!-- Glass body - slightly tapered tumbler shape -->
  <path d="M310 247 L340 747 Q345 777 380 777 L644 777 Q679 777 684 747 L714 247 Z"
        fill="rgba(255,255,255,0.06)"
        stroke="rgba(255,255,255,0.25)"
        stroke-width="4"/>

  <!-- Liquid fill -->
  <g clip-path="url(#glassClip)">
    <!-- Main liquid body -->
    <rect x="300" y="347" width="424" height="440" fill="url(#liquid)"/>

    <!-- Liquid surface wave -->
    <path d="M300 347 Q400 327 512 352 Q624 377 724 342 L724 367 Q624 397 512 372 Q400 347 300 367 Z"
          fill="rgba(255,255,255,0.12)"/>

    <!-- Bubbles inside liquid -->
    <circle cx="440" cy="567" r="42" fill="url(#bubbleGlow)" stroke="rgba(255,255,255,0.2)" stroke-width="2.5"/>
    <circle cx="580" cy="487" r="35" fill="url(#bubbleGlow)" stroke="rgba(255,255,255,0.2)" stroke-width="2.5"/>
    <circle cx="500" cy="707" r="30" fill="url(#bubbleGlow)" stroke="rgba(255,255,255,0.18)" stroke-width="2"/>
    <circle cx="620" cy="667" r="26" fill="url(#bubbleGlow)" stroke="rgba(255,255,255,0.18)" stroke-width="2"/>
  </g>

  <!-- Rising bubbles above liquid surface -->
  <circle cx="470" cy="297" r="18" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="2"/>
  <circle cx="550" cy="267" r="14" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>

  <!-- Glass rim highlight -->
  <path d="M310 247 L714 247"
        stroke="rgba(255,255,255,0.35)"
        stroke-width="5"
        stroke-linecap="round"/>

  <!-- Glass left edge highlight (reflection) -->
  <path d="M314 257 L342 737"
        stroke="rgba(255,255,255,0.1)"
        stroke-width="8"
        stroke-linecap="round"/>

  <!-- Glass surface highlight overlay -->
  <path d="M310 247 L340 747 Q345 777 380 777 L644 777 Q679 777 684 747 L714 247 Z"
        fill="url(#glassHighlight)"/>
</svg>
